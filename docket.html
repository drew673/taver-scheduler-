<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f6f4">
<title>Taver Group — Site Docket</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --dk:#1a3a2a;--mid:#2d5a3d;--lt:#4a6741;--acc:#7fb069;--acc-light:#e8f5ea;
  --bg:#f4f6f4;--bg2:#ffffff;--bg3:#f0f4f0;
  --txt:#1a2a1a;--txt2:#4a5a4a;--mut:#7a907a;
  --bdr:#c8d8c8;--bdr2:#a8c0a8;
  --danger:#c0392b;--danger-bg:#fdf0f0;
  --green:#1a7a3a;--green-bg:#eaf5ec;
  --radius:8px;--radius-lg:12px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;min-height:100vh}
input,select,textarea{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,122,74,.1)}
label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px}
.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Header */
.header{background:linear-gradient(135deg,var(--dk) 0%,var(--mid) 100%);color:#fff;padding:20px 20px 18px;display:flex;align-items:center;gap:14px}
.header-logo{width:44px;height:44px;background:rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-text h1{font-size:17px;font-weight:800;margin-bottom:2px}
.header-text p{font-size:12px;color:#a8c8a8}

/* Job info card */
.job-card{background:var(--bg2);border-bottom:3px solid var(--mid);padding:14px 20px;display:flex;flex-direction:column;gap:4px}
.job-name{font-size:17px;font-weight:700;color:var(--dk)}
.job-meta{font-size:12px;color:var(--mut);display:flex;gap:12px;flex-wrap:wrap}
.shift-badge{display:inline-flex;align-items:center;gap:6px;background:var(--acc-light);color:var(--mid);border:1px solid var(--bdr2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;margin-top:4px}

/* Main */
.main{padding:16px;max-width:640px;margin:0 auto}
.section{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;padding-bottom:8px;border-bottom:1px solid var(--bdr);margin-bottom:14px}

/* Crew hours */
.crew-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:8px;flex-wrap:wrap}
.crew-name{font-weight:600;font-size:13px;color:var(--txt);flex:1;min-width:120px}
.crew-role{font-size:11px;color:var(--mut);min-width:80px}
.hours-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hours-input{width:70px!important;text-align:center;padding:7px 8px!important;font-size:14px!important;font-weight:600}
.hours-lbl{font-size:12px;color:var(--mut)}

/* Assets */
.asset-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.asset-row input:first-child{flex:2}
.asset-row input:last-of-type{width:70px!important;flex-shrink:0}
.asset-remove{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}

/* Signature */
.sig-wrap{border:1px solid var(--bdr);border-radius:var(--radius);background:#fff;position:relative;margin-top:6px;touch-action:none}
.sig-canvas{display:block;width:100%;height:130px;cursor:crosshair;border-radius:var(--radius);touch-action:none}
.sig-clear{position:absolute;top:6px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--bdr);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--mut);font-family:inherit}
.sig-clear:hover{color:var(--danger)}
.sig-hint{font-size:11px;color:var(--mut);margin-top:4px;font-style:italic}

/* Buttons */
button{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-weight:600;font-size:14px;padding:10px 18px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--mid);border:1px solid var(--lt);color:#fff;width:100%;justify-content:center;padding:14px}
.btn-p:hover{background:var(--lt)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-s{background:var(--bg2);border:1px solid var(--bdr2);color:var(--txt)}
.btn-s:hover{background:var(--bg3)}
.btn-add{background:var(--acc-light);border:1px solid var(--bdr2);color:var(--mid);font-size:13px;padding:7px 14px}

/* States */
.loading{text-align:center;padding:60px 20px;color:var(--mut)}
.loading-logo{width:60px;height:60px;margin:0 auto 16px;background:var(--dk);border-radius:10px;display:flex;align-items:center;justify-content:center}
.loading-dots{display:flex;gap:6px;justify-content:center;margin-top:12px}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pulse 1.2s ease infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.error-state{text-align:center;padding:60px 20px}
.error-state h2{color:var(--danger);margin-bottom:8px}
.error-state p{color:var(--mut);font-size:13px}
.success-state{text-align:center;padding:60px 20px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-state h2{color:var(--green);font-size:22px;margin-bottom:8px}
.success-state p{color:var(--mut);font-size:13px;line-height:1.6}

/* Optional field toggle */
.optional-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--mut);margin-bottom:10px;user-select:none}
.toggle-switch{width:36px;height:20px;background:var(--bdr);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch.on{background:var(--acc)}
.toggle-knob{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on .toggle-knob{left:18px}
.optional-content{display:none}
.optional-content.visible{display:block}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="loading-logo">
      <svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="5" fill="#0a1410"/><text x="18" y="26" text-anchor="middle" fill="#7fb069" font-size="22" font-weight="800" font-family="Arial">T</text></svg>
    </div>
    <div style="font-weight:700;color:var(--dk);font-size:16px">Loading docket...</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>

      <div class="loading-dot"></div>

</div>

<script>

// ── Helpers ───────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(d){return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});}
function fmtFull(d){return d.toLocaleDateString("en-AU",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}

async function sbGet(path){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"}
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function sbPost(path,body,extra={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal",...extra},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}

async function uploadDocket(docket){
  const blob=new Blob([JSON.stringify(docket)],{type:"application/json"});
  const r=await fetch(`${SB_URL}/storage/v1/object/dockets/${docket.id}.json`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
    body:blob
  });
  if(!r.ok)throw new Error(await r.text());
}

function makeSigPad(canvas){
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);
  let drawing=false,lx=0,ly=0;
  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  }
  canvas.addEventListener("mousedown",e=>{drawing=true;const p=getPos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener("mousemove",e=>{if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener("mouseup",()=>drawing=false);
  canvas.addEventListener("mouseleave",()=>drawing=false);
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=getPos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchmove",e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchend",()=>drawing=false);
  return{
    clear:()=>ctx.clearRect(0,0,canvas.width,canvas.height),
    isEmpty:()=>!ctx.getImageData(0,0,canvas.width,canvas.height).data.some(v=>v!==0),
    toDataURL:()=>canvas.toDataURL("image/png")
  };
}

function makeToggle(label,onToggle){
  const wrap=document.createElement("div");
  wrap.className="optional-toggle";
  const sw=document.createElement("div");sw.className="toggle-switch";
  const knob=document.createElement("div");knob.className="toggle-knob";
  sw.appendChild(knob);
  const lbl=document.createElement("span");lbl.textContent=label;
  let on=false;
  wrap.appendChild(sw);wrap.appendChild(lbl);
  wrap.addEventListener("click",()=>{
    on=!on;sw.className="toggle-switch"+(on?" on":"");
    onToggle(on);
  });
  return wrap;
}

// ── Load job + shift from URL params ─────────────────────────────────
const params=new URLSearchParams(window.location.search);
const JOB_ID=params.get("job");
const SHIFT_ID=params.get("shift");

async function loadData(){
  if(!JOB_ID||!SHIFT_ID){
    showError("Invalid link","This docket link is missing job or shift information. Please contact Taver Group for a new link.");
    return;
  }
  try{
    const[jobRows,shiftRows,paxRows]=await Promise.all([
      sbGet(`jobs?id=eq.${JOB_ID}&select=*`),
      sbGet(`shifts?id=eq.${SHIFT_ID}&select=*`),
      sbGet(`personnel?shift_id=eq.${SHIFT_ID}&select=*&order=role`)
    ]);
    if(!jobRows||jobRows.length===0){showError("Job not found","This docket link may have expired or the job has been removed.");return;}
    if(!shiftRows||shiftRows.length===0){showError("Shift not found","This docket link may have expired or the shift has been removed.");return;}
    const job={...jobRows[0],siteAddress:jobRows[0].site_address,mapLink:jobRows[0].map_link,clientContact:jobRows[0].client_contact,clientPhone:jobRows[0].client_phone,jobNumber:jobRows[0].job_number||""};
    const shift={...shiftRows[0],startTime:shiftRows[0].start_time,endTime:shiftRows[0].end_time,dayLabel:shiftRows[0].day_label};
    const personnel=paxRows.map(p=>({...p,riwNumber:p.riw_number,shiftStart:p.shift_start,shiftEnd:p.shift_end}));
    buildDocketForm(job,shift,personnel);
  }catch(e){
    console.error(e);
    showError("Connection error","Could not load docket details. Please check your connection and try again.\n\n"+e.message);
  }
}

function showError(title,msg){
  document.getElementById("root").innerHTML=`
    <div class="error-state" style="padding:40px 24px">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h2 style="color:var(--danger);margin-bottom:8px">${title}</h2>
      <p style="color:var(--mut);font-size:13px;white-space:pre-line">${msg}</p>
    </div>`;
}

function showSuccess(docketRef){
  document.getElementById("root").innerHTML=`
    <div class="header">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="4" fill="rgba(255,255,255,.15)"/><text x="14" y="20" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" font-family="Arial">T</text></svg>
      </div>
      <div class="header-text"><h1>Taver Group</h1><p>Site Docket</p></div>
    </div>
    <div class="success-state">
      <div class="success-icon">✅</div>
      <h2>Docket Submitted</h2>
      <p>Thank you. Your docket has been received by Taver Group.<br><br>Reference: <strong>${docketRef}</strong></p>
    </div>`;
}

// ── Build the docket form ─────────────────────────────────────────────
function buildDocketForm(job, shift, personnel){
  const root=document.getElementById("root");
  root.innerHTML="";

  // Header
  const header=document.createElement("div");
  header.className="header";
  header.innerHTML=`
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="4" fill="rgba(255,255,255,.15)"/><text x="14" y="20" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" font-family="Arial">T</text></svg>
    </div>
    <div class="header-text"><h1>Taver Group</h1><p>Site Docket — please complete and sign</p></div>`;
  root.appendChild(header);

  // Job info bar
  const jobCard=document.createElement("div");
  jobCard.className="job-card";
  const shiftDate=new Date(shift.date+"T12:00:00");
  const dayName=shiftDate.toLocaleDateString("en-AU",{weekday:"long"});
  const dateStr=shiftDate.toLocaleDateString("en-AU",{day:"2-digit",month:"long",year:"numeric"});
  jobCard.innerHTML=`
    <div class="job-name">${job.jobNumber?`<span style="font-size:13px;font-weight:700;color:var(--mid);margin-right:8px;background:var(--acc-light);border:1px solid var(--bdr2);border-radius:4px;padding:1px 8px">${job.jobNumber}</span>`:""}${job.name}${job.po?" — "+job.po:""}</div>
    <div class="job-meta">
      ${job.client?`<span>Client: ${job.client}</span>`:""}
      ${job.siteAddress?`<span>📍 ${job.siteAddress}</span>`:""}
      ${job.clientContact?`<span>Client contact: ${job.clientContact}${job.clientPhone?" — "+job.clientPhone:""}</span>`:""}
    </div>
    <div style="margin-top:10px;background:var(--dk);border-radius:8px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:11px;color:#a8c8a8;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Shift Date</div>
        <div style="font-size:20px;font-weight:800;color:#fff;line-height:1.1">${dayName}</div>
        <div style="font-size:14px;color:#a8c8a8;margin-top:1px">${dateStr}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#a8c8a8;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Shift Time</div>
        <div style="font-size:18px;font-weight:800;color:#7fb069">${shift.startTime} – ${shift.endTime}</div>
      </div>
    </div>`;
  root.appendChild(jobCard);

  const main=document.createElement("div");
  main.className="main";
  root.appendChild(main);

  // ── Works completed ─────────────────────────────────────────────────
  const worksSection=document.createElement("div");
  worksSection.className="section";
  worksSection.innerHTML=`<div class="section-title">Works Completed <span style="color:var(--danger)">*</span></div>`;
  const worksInput=document.createElement("textarea");
  worksInput.placeholder="Describe the works carried out on this shift...";
  worksInput.style.cssText="width:100%;min-height:90px;font-size:14px;font-family:inherit;resize:vertical;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;outline:none";
  worksSection.appendChild(worksInput);
  main.appendChild(worksSection);

  // ── Crew hours ──────────────────────────────────────────────────────
  const hoursSection=document.createElement("div");
  hoursSection.className="section";
  hoursSection.innerHTML=`<div class="section-title">Hours Worked <span style="color:var(--danger)">*</span></div>`;
  const namedCrew=personnel.filter(p=>p.name);
  const hoursMap={};

  // Lunch break deduction (shared across all crew)
  const lunchWrap=document.createElement("div");
  lunchWrap.style.cssText="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff8e1;border:1px solid #f9a825;border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap";
  lunchWrap.innerHTML=`<span style="font-size:13px;color:#7a5500;flex:1">Lunch break taken?</span>`;
  const lunchSel=document.createElement("select");
  lunchSel.style.cssText="width:auto!important;min-width:160px;font-size:13px;padding:6px 10px";
  [["0","No lunch break"],["0.5","30 min break"],["1","1 hour break"]].forEach(([v,l])=>{
    const o=document.createElement("option");o.value=v;o.textContent=l;lunchSel.appendChild(o);
  });
  lunchWrap.appendChild(lunchSel);
  hoursSection.appendChild(lunchWrap);

  // Net hours summary (updates dynamically)
  const netSummary=document.createElement("div");
  netSummary.style.cssText="font-size:12px;color:var(--mut);margin-bottom:10px;padding:0 2px";
  hoursSection.appendChild(netSummary);

  function updateNetSummary(){
    const lunch=parseFloat(lunchSel.value)||0;
    const inputs=Object.values(hoursMap).filter(i=>i&&i.value);
    if(inputs.length===0){netSummary.textContent="";return;}
    const total=inputs.reduce((a,i)=>a+(parseFloat(i.value)||0),0);
    const net=Math.max(0,total-lunch*inputs.length);
    if(lunch>0){
      netSummary.innerHTML=`Gross: ${total.toFixed(1)} hrs &nbsp;–&nbsp; Lunch: ${(lunch*inputs.length).toFixed(1)} hrs &nbsp;=&nbsp; <strong style="color:var(--mid)">Net: ${net.toFixed(1)} hrs</strong>`;
    } else {
      netSummary.innerHTML=`Total: <strong style="color:var(--mid)">${total.toFixed(1)} hrs</strong>`;
    }
  }
  lunchSel.addEventListener("change",updateNetSummary);

  if(namedCrew.length===0){
    const noCrewMsg=document.createElement("p");
    noCrewMsg.style.cssText="color:var(--mut);font-size:13px;font-style:italic";
    noCrewMsg.textContent="No named crew assigned to this shift — enter hours below.";
    hoursSection.appendChild(noCrewMsg);
    const totalWrap=document.createElement("div");
    totalWrap.className="field";totalWrap.style.marginTop="10px";
    const totalLbl=document.createElement("label");totalLbl.textContent="Total shift hours";
    const totalInput=document.createElement("input");
    totalInput.type="number";totalInput.min="0";totalInput.max="24";totalInput.step="0.5";totalInput.placeholder="e.g. 10";
    totalInput.addEventListener("input",updateNetSummary);
    totalWrap.appendChild(totalLbl);totalWrap.appendChild(totalInput);
    hoursSection.appendChild(totalWrap);
    hoursMap["_total"]=totalInput;
  } else {
    namedCrew.forEach(p=>{
      const row=document.createElement("div");
      row.className="crew-row";
      let autoHours="";
      const st=p.shiftStart||shift.startTime;
      const et=p.shiftEnd||shift.endTime;
      if(st&&et){
        const diff=(new Date("2000-01-01T"+et)-new Date("2000-01-01T"+st))/3600000;
        if(diff>0)autoHours=diff.toFixed(1);
      }
      row.innerHTML=`
        <span class="crew-name">${p.name}</span>
        <span class="crew-role">${p.role}</span>
        <div class="hours-wrap">
          <input type="number" class="hours-input" min="0" max="24" step="0.5" value="${autoHours}" placeholder="hrs">
          <span class="hours-lbl">hrs</span>
        </div>`;
      const inp=row.querySelector("input");
      inp.addEventListener("input",updateNetSummary);
      hoursMap[p.id]=inp;
      hoursSection.appendChild(row);
    });
    updateNetSummary();
  }
  main.appendChild(hoursSection);

  // ── Travel hours (optional toggle) ──────────────────────────────────
  const travelSection=document.createElement("div");
  travelSection.className="section";
  travelSection.innerHTML=`<div class="section-title">Allowances</div>`;

  // Travel hours
  const travelToggle=makeToggle("Travel hours applicable",on=>{travelContent.className="optional-content"+(on?" visible":"");});
  travelSection.appendChild(travelToggle);
  const travelContent=document.createElement("div");travelContent.className="optional-content";
  const travelField=document.createElement("div");travelField.className="field";
  const travelLbl=document.createElement("label");travelLbl.textContent="Travel hours";
  const travelInput=document.createElement("input");travelInput.type="number";travelInput.min="0";travelInput.max="24";travelInput.step="0.5";travelInput.placeholder="e.g. 2.5";
  travelField.appendChild(travelLbl);travelField.appendChild(travelInput);
  travelContent.appendChild(travelField);
  travelSection.appendChild(travelContent);

  // LAFHA
  const lafhaToggle=makeToggle("LAFHA applicable",on=>{lafhaContent.className="optional-content"+(on?" visible":"");});
  travelSection.appendChild(lafhaToggle);
  const lafhaContent=document.createElement("div");lafhaContent.className="optional-content";
  const lafhaField=document.createElement("div");lafhaField.className="field";
  const lafhaLbl=document.createElement("label");lafhaLbl.textContent="LAFHA days";
  const lafhaInput=document.createElement("input");lafhaInput.type="number";lafhaInput.min="0";lafhaInput.step="1";lafhaInput.placeholder="Number of days";
  lafhaField.appendChild(lafhaLbl);lafhaField.appendChild(lafhaInput);
  lafhaContent.appendChild(lafhaField);
  travelSection.appendChild(lafhaContent);
  main.appendChild(travelSection);

  // ── Additional assets ───────────────────────────────────────────────
  const assetsSection=document.createElement("div");
  assetsSection.className="section";
  const assetsToggle=makeToggle("Additional assets / equipment used",on=>{assetsContent.className="optional-content"+(on?" visible":"");});
  assetsSection.innerHTML=`<div class="section-title">Additional Assets</div>`;
  assetsSection.appendChild(assetsToggle);
  const assetsContent=document.createElement("div");assetsContent.className="optional-content";
  const assetRows=[];
  function addAsset(desc="",qty=""){
    const row=document.createElement("div");row.className="asset-row";
    const dInput=document.createElement("input");dInput.type="text";dInput.placeholder="Asset / equipment description";dInput.value=desc;
    const qInput=document.createElement("input");qInput.type="text";qInput.placeholder="Qty";qInput.value=qty;qInput.style.width="70px";
    const rem=document.createElement("button");rem.className="asset-remove";rem.textContent="×";rem.onclick=()=>{row.remove();assetRows.splice(assetRows.indexOf(asset),1);};
    const asset={desc:dInput,qty:qInput};assetRows.push(asset);
    row.appendChild(dInput);row.appendChild(qInput);row.appendChild(rem);
    assetsContent.appendChild(row);
  }
  addAsset();
  const addAssetBtn=document.createElement("button");
  addAssetBtn.className="btn-add";addAssetBtn.textContent="+ Add Asset";
  addAssetBtn.style.marginTop="4px";
  addAssetBtn.onclick=()=>addAsset();
  assetsContent.appendChild(addAssetBtn);
  assetsSection.appendChild(assetsContent);
  main.appendChild(assetsSection);

  // ── Comments ────────────────────────────────────────────────────────
  const commentsSection=document.createElement("div");
  commentsSection.className="section";
  commentsSection.innerHTML=`<div class="section-title">Comments / Variations</div>`;
  const commentsInput=document.createElement("textarea");
  commentsInput.placeholder="Any variations, issues, or additional notes...";
  commentsInput.style.cssText="width:100%;min-height:70px;font-size:14px;font-family:inherit;resize:vertical;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;outline:none";
  commentsSection.appendChild(commentsInput);
  main.appendChild(commentsSection);

  // ── Client signature ─────────────────────────────────────────────────
  const clientSigSection=document.createElement("div");
  clientSigSection.className="section";
  clientSigSection.innerHTML=`<div class="section-title">Client Authorisation <span style="color:var(--danger)">*</span></div>`;
  const clientNameField=document.createElement("div");clientNameField.className="field";
  const clientNameLbl=document.createElement("label");clientNameLbl.textContent="Client representative name";
  const clientNameInput=document.createElement("input");clientNameInput.type="text";clientNameInput.placeholder="Full name";
  clientNameField.appendChild(clientNameLbl);clientNameField.appendChild(clientNameInput);
  clientSigSection.appendChild(clientNameField);
  const clientSigLbl=document.createElement("label");clientSigLbl.textContent="Client signature";clientSigLbl.style.marginTop="4px";
  clientSigSection.appendChild(clientSigLbl);
  const clientSigWrap=document.createElement("div");clientSigWrap.className="sig-wrap";
  const clientCanvas=document.createElement("canvas");clientCanvas.className="sig-pad-canvas";clientCanvas.width=600;clientCanvas.height=130;
  const clientClearBtn=document.createElement("button");clientClearBtn.className="sig-clear";clientClearBtn.textContent="Clear";
  clientSigWrap.appendChild(clientCanvas);clientSigWrap.appendChild(clientClearBtn);
  clientSigSection.appendChild(clientSigWrap);
  const clientHint=document.createElement("p");clientHint.className="sig-hint";clientHint.textContent="Draw signature with finger or mouse";
  clientSigSection.appendChild(clientHint);
  main.appendChild(clientSigSection);
  const clientSig=makeSigPad(clientCanvas);
  clientClearBtn.onclick=()=>clientSig.clear();

  // ── Supervisor signature ─────────────────────────────────────────────
  const supSigSection=document.createElement("div");
  supSigSection.className="section";
  supSigSection.innerHTML=`<div class="section-title">Taver Supervisor <span style="color:var(--danger)">*</span></div>`;
  // Auto-fill supervisor name
  const sup=namedCrew.find(p=>p.role==="Superintendent"||p.role==="Foreman");
  const supNameField=document.createElement("div");supNameField.className="field";
  const supNameLbl=document.createElement("label");supNameLbl.textContent="Supervisor name";
  const supNameInput=document.createElement("input");supNameInput.type="text";supNameInput.placeholder="Full name";supNameInput.value=sup?.name||"";
  supNameField.appendChild(supNameLbl);supNameField.appendChild(supNameInput);
  supSigSection.appendChild(supNameField);
  const supSigLbl=document.createElement("label");supSigLbl.textContent="Supervisor signature";supSigLbl.style.marginTop="4px";
  supSigSection.appendChild(supSigLbl);
  const supSigWrap=document.createElement("div");supSigWrap.className="sig-wrap";
  const supCanvas=document.createElement("canvas");supCanvas.className="sig-pad-canvas";supCanvas.width=600;supCanvas.height=130;
  const supClearBtn=document.createElement("button");supClearBtn.className="sig-clear";supClearBtn.textContent="Clear";
  supSigWrap.appendChild(supCanvas);supSigWrap.appendChild(supClearBtn);
  supSigSection.appendChild(supSigWrap);
  const supHint=document.createElement("p");supHint.className="sig-hint";supHint.textContent="Draw signature with finger or mouse";
  supSigSection.appendChild(supHint);
  main.appendChild(supSigSection);
  const supSig=makeSigPad(supCanvas);
  supClearBtn.onclick=()=>supSig.clear();

  // ── Submit ───────────────────────────────────────────────────────────
  const submitSection=document.createElement("div");
  submitSection.style.padding="4px 0 32px";
  const submitBtn=document.createElement("button");
  submitBtn.className="btn-p";submitBtn.textContent="Submit Docket";
  submitBtn.onclick=async()=>{
    // Validate required fields
    if(!worksInput.value.trim()){
      worksInput.focus();
      worksInput.style.borderColor="var(--danger)";
      alert("Please describe the works completed.");
      return;
    }
    if(!clientNameInput.value.trim()){
      clientNameInput.focus();
      alert("Please enter the client representative name.");
      return;
    }
    if(clientSig.isEmpty()){
      alert("Please obtain the client signature.");
      return;
    }
    if(!supNameInput.value.trim()){
      supNameInput.focus();
      alert("Please enter the supervisor name.");
      return;
    }
    if(supSig.isEmpty()){
      alert("Please obtain the supervisor signature.");
      return;
    }

    submitBtn.disabled=true;
    submitBtn.textContent="Submitting...";

    try{
      // Collect crew hours with lunch deduction
      const lunchDeduction=parseFloat(lunchSel.value)||0;
      const crewHours=namedCrew.map(p=>({
        id:p.id,name:p.name,role:p.role,
        hoursGross:parseFloat(hoursMap[p.id]?.value||0)||0,
        lunchDeduction,
        hoursNet:Math.max(0,(parseFloat(hoursMap[p.id]?.value||0)||0)-lunchDeduction)
      }));
      if(hoursMap["_total"]){
        const gross=parseFloat(hoursMap["_total"]?.value||0)||0;
        crewHours.push({id:"total",name:"Total",role:"All crew",hoursGross:gross,lunchDeduction,hoursNet:Math.max(0,gross-lunchDeduction)});
      }

      const docket={
        id:uid(),
        jobId:JOB_ID,shiftId:SHIFT_ID,
        createdAt:new Date().toISOString(),
        submittedFrom:"staff-link",
        jobName:job.name,jobNumber:job.jobNumber||"",jobPO:job.po||"",
        client:job.client||"",clientContact:job.clientContact||"",
        siteAddress:job.siteAddress||"",
        shiftDate:shift.date,shiftDay:shift.dayLabel,
        shiftStart:shift.startTime,shiftEnd:shift.endTime,
        worksCompleted:worksInput.value.trim(),
        crewHours,
        travelHours:parseFloat(travelInput.value||0)||0,
        lafha:parseFloat(lafhaInput.value||0)||0,
        additionalAssets:assetRows.filter(a=>a.desc.value.trim()).map(a=>({desc:a.desc.value,qty:a.qty.value})),
        comments:commentsInput.value.trim(),
        clientRepName:clientNameInput.value.trim(),
        clientSigData:clientSig.toDataURL(),
        supName:supNameInput.value.trim(),
        supSigData:supSig.toDataURL(),
      };

      await uploadDocket(docket);
      showSuccess("#"+docket.id.toUpperCase().slice(-6));

    }catch(e){
      console.error(e);
      submitBtn.disabled=false;
      submitBtn.textContent="Submit Docket";
      alert("Submission failed — please check your connection and try again.\n\n"+e.message);
    }
  };
  submitSection.appendChild(submitBtn);
  main.appendChild(submitSection);
}

// ── Boot ─────────────────────────────────────────────────────────────
loadData();
</script>
