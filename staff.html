<title>SiteRunner Live — My Shifts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --dk:#141920;--mid:#1e2730;--lt:#4a6741;--acc:#ff8040;--acc-light:#e8f5ea;
  --bg:#f4f6f4;--bg2:#ffffff;--bg3:#f0f4f0;
  --txt:#1a2a1a;--txt2:#4a5a4a;--mut:#7a907a;
  --bdr:#c8d8c8;--bdr2:#a8c0a8;
  --danger:#c0392b;--danger-bg:#fdf0f0;
  --green:#1a7a3a;--green-bg:#fff3ee;--amber:#d4870a;
  --radius:8px;--radius-lg:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-weight:600;font-size:14px;padding:10px 18px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-p{background:var(--mid);color:#fff;width:100%;justify-content:center;padding:14px;font-size:15px}
.btn-p:hover{background:var(--lt)}
.btn-s{background:var(--bg2);border:1px solid var(--bdr2);color:var(--txt);padding:8px 14px;font-size:13px}
.btn-d{background:var(--danger-bg);border:1px solid #e8b0aa;color:var(--danger);padding:6px 12px;font-size:12px}
input{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:12px 14px;font-size:16px;font-family:inherit;outline:none;width:100%;transition:border-color .15s}
input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,122,74,.1)}

/* Auth screens */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#141920;position:relative;overflow:hidden}
.auth-wrap::before{content:"";position:absolute;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(circle,rgba(255,85,0,.12) 0%,transparent 70%);pointer-events:none}
.auth-wrap::after{content:"";position:absolute;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(255,85,0,.07) 0%,transparent 70%);pointer-events:none}
.auth-brand{text-align:center;margin-bottom:32px;position:relative;z-index:1}
.auth-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1}
.auth-card input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;padding:14px 16px;font-size:15px;font-family:inherit;width:100%;outline:none;margin-bottom:12px;transition:border .15s}
.auth-card input::placeholder{color:rgba(255,255,255,.3)}
.auth-card input:focus{border-color:#ff5500;background:rgba(255,85,0,.06)}
.auth-logo{text-align:center;margin-bottom:16px}
.auth-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);text-align:center;margin-bottom:24px;letter-spacing:.3px}
.auth-sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:24px;line-height:1.5}
.auth-btn{width:100%;margin-top:4px;padding:15px;background:#ff5500;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.5px}
.auth-btn:hover{background:#cc4400;transform:translateY(-1px)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-powered{text-align:center;margin-top:24px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.5px;position:relative;z-index:1}
.auth-msg{font-size:13px;text-align:center;margin-top:12px;min-height:18px;font-weight:600;padding:10px;border-radius:8px}
.auth-msg.success{background:var(--green-bg);color:var(--green)}
.auth-msg.error{background:var(--danger-bg);color:var(--danger)}

/* Top bar */
.topbar{background:linear-gradient(90deg,#141920 0%,#1e2730 100%);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(255,85,0,.25);box-shadow:0 2px 16px rgba(0,0,0,.3)}
.topbar-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
.topbar-user{font-size:12px;color:#ffb380;display:flex;align-items:center;gap:10px}
.signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 10px;font-size:11px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:600}
.signout-btn:hover{background:rgba(255,255,255,.2)}

/* Nav tabs */
.nav-tabs{background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.nav-tab.active{color:var(--mid);border-bottom-color:var(--mid)}

/* Main */
.main{padding:16px;max-width:700px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-body{padding:12px 16px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:48px 20px;color:var(--mut);font-size:13px;line-height:1.8}
.empty-icon{font-size:48px;margin-bottom:12px}
.section-label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.shift-time{font-size:18px;font-weight:800;color:var(--mid)}
.shift-date{font-size:13px;color:var(--mut);margin-top:1px}
.info-row{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin-top:6px}
.crew-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bdr);border-radius:20px;padding:3px 10px;font-size:12px;margin:3px}
.crew-chip.me{background:var(--acc-light);border-color:var(--acc);color:var(--mid);font-weight:700}
.stat-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:800;color:var(--mid)}
.stat-lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Loading */
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg)}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:pulse 1.2s ease infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* Today hero */
.today-hero{background:linear-gradient(135deg,var(--dk) 0%,var(--mid) 100%);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;color:#fff}
.today-day{font-size:24px;font-weight:800;line-height:1.1}
.today-date{font-size:13px;color:#a8c8a8;margin-top:2px}
.today-time{font-size:28px;font-weight:800;color:var(--acc);margin-top:8px}
</style>
</head>

<div id="root">

// ── Supabase Auth helpers ─────────────────────────────────────────────
async function sbAuth(path,body){
  const r=await fetch(`${SB_URL}/auth/v1/${path}`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  return r.json();
}

async function sbGet(path,token){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+(token||SB_KEY),"Content-Type":"application/json"}
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function getSession(){
  const stored=localStorage.getItem("taver_staff_session");
  if(!stored)return null;
  try{
    const s=JSON.parse(stored);
    // Check if token is still valid (expires_at is unix timestamp)
    if(s.expires_at&&Date.now()/1000>s.expires_at-60){
      // Try to refresh
      const ref=await sbAuth("token?grant_type=refresh_token",{refresh_token:s.refresh_token});
      if(ref.access_token){
        localStorage.setItem("taver_staff_session",JSON.stringify(ref));
        return ref;
      }
      localStorage.removeItem("taver_staff_session");
      return null;
    }
    return s;
  }catch{localStorage.removeItem("taver_staff_session");return null;}
}

function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmt(d){return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"});}
function fmtFull(d){return d.toLocaleDateString("en-AU",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});}

// ── Load staff's shifts ───────────────────────────────────────────────
async function loadMyData(token,staffName){
  try{
    // Load all jobs and find shifts where this person is listed
    const jobs=await sbGet("jobs?select=*",token);
    const shifts=await sbGet("shifts?select=*&order=date",token);
    const personnel=await sbGet(`personnel?select=*`,token);

    // Find all personnel entries matching this person's name
    const myName=staffName.trim().toLowerCase();
    const myPersonnel=personnel.filter(p=>p.name&&p.name.trim().toLowerCase()===myName);
    const myShiftIds=new Set(myPersonnel.map(p=>p.shift_id));

    // Build shift objects with job context
    const result=[];
    myShiftIds.forEach(shiftId=>{
      const shift=shifts.find(s=>s.id===shiftId);
      if(!shift)return;
      const job=jobs.find(j=>j.id===shift.job_id);
      if(!job)return;
      const myEntry=myPersonnel.find(p=>p.shift_id===shiftId);
      const allCrew=personnel.filter(p=>p.shift_id===shiftId);
      result.push({
        job:{id:job.id,name:job.name,jobNumber:job.job_number||"",po:job.po||"",client:job.client||"",
          siteAddress:job.site_address||"",mapLink:job.map_link||"",
          clientContact:job.client_contact||"",clientPhone:job.client_phone||"",
          color:job.color||"#2d7a4a",status:job.status||"confirmed"},
        shift:{id:shift.id,date:shift.date,dayLabel:shift.day_label,startTime:shift.start_time,endTime:shift.end_time},
        myEntry:{role:myEntry?.role||"",shiftStart:myEntry?.shift_start||shift.start_time,shiftEnd:myEntry?.shift_end||shift.end_time},
        crew:allCrew
      });
    });

    // Sort by date
    result.sort((a,b)=>a.shift.date.localeCompare(b.shift.date));
    return result;
  }catch(e){console.error("loadMyData error:",e);return [];}
}

async function loadMyTimesheets(token,staffName){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/timesheets`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({limit:1000,offset:0,prefix:""})
    });
    if(!r.ok)return[];
    const files=await r.json();
    const results=[];
    await Promise.all((files||[]).map(async f=>{
      try{
        const dr=await fetch(`${SB_URL}/storage/v1/object/public/timesheets/${f.name}`);
        if(!dr.ok)return;
        const ts=await dr.json();
        // Check if this person submitted or is in this timesheet
        const myName=staffName.trim().toLowerCase();
        const hasMe=(ts.entries||[]).some(e=>e.personName&&e.personName.trim().toLowerCase()===myName);
        if(hasMe)results.push(ts);
      }catch{}
    }));
    results.sort((a,b)=>(b.submittedAt||"").localeCompare(a.submittedAt||""));
    return results;
  }catch(e){console.error("loadMyTimesheets:",e);return[];}
}

    <div class="topbar-user">
      <span>${profile?.name||""}</span>
      ${ADMIN_EMAILS.includes((profile?.email||"").toLowerCase())?`<a href="/index.html" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 10px;font-size:11px;border-radius:4px;text-decoration:none;font-weight:600">Admin App</a>`:""}
      <button class="signout-btn" id="change-pin-btn" style="margin-right:6px">🔑 PIN</button>
      <button class="signout-btn" id="signout-btn">Sign out</button>
    </div>`;
  root.appendChild(topbar);
  document.getElementById("signout-btn").onclick=signOut;
  document.getElementById("change-pin-btn").onclick=showChangePIN;

  // Nav tabs
  const nav=document.createElement("div");nav.className="nav-tabs";
  const tabs=[{id:"today",l:"☀️ Today"},{id:"shifts",l:"📅 My Shifts"},{id:"timesheets",l:"⏱ Timesheets"},{id:"dockets",l:"✍️ Dockets"},{id:"forms",l:"📝 Forms"}];
  tabs.forEach(t=>{
    const tab=document.createElement("div");
    tab.className="nav-tab"+(currentView===t.id?" active":"");
    tab.textContent=t.l;
    tab.onclick=()=>{currentView=t.id;renderApp();};
    nav.appendChild(tab);
  });
  root.appendChild(nav);

  const main=document.createElement("div");main.className="main";

  // ── Today view ───────────────────────────────────────────────────────
  if(currentView==="today"){
    const dayName=now.toLocaleDateString("en-AU",{weekday:"long"});
    const dateStr=now.toLocaleDateString("en-AU",{day:"2-digit",month:"long",year:"numeric"});
    const timeStr=now.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});

    const hero=document.createElement("div");hero.className="today-hero";
    hero.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:11px;color:#ffb380;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">My Daily Briefing</div>
          <div class="today-day">${dayName}</div>
          <div class="today-date">${dateStr}</div>
        </div>
        <div style="text-align:right">
          <div class="today-time">${timeStr}</div>
          <div style="font-size:11px;color:#ffb380;margin-top:4px">AEST</div>
        </div>
      </div>`;
    main.appendChild(hero);

    const todayShifts=myShifts.filter(s=>s.shift.date===todayStr);
    const upcoming=myShifts.filter(s=>s.shift.date>todayStr).slice(0,3);

    if(todayShifts.length===0){
      const empty=document.createElement("div");
      empty.className="card";empty.style.padding="32px 20px";empty.style.textAlign="center";
      empty.innerHTML=`<div style="font-size:42px;margin-bottom:12px">🌅</div><div style="font-size:16px;font-weight:700;color:var(--dk);margin-bottom:6px">No shifts today</div><div style="font-size:13px;color:var(--mut)">Enjoy the day off</div>`;
      main.appendChild(empty);
    } else {
      const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent="On Site Today";
      main.appendChild(lbl);
      todayShifts.forEach(s=>main.appendChild(buildShiftCard(s,true)));
    }

    if(upcoming.length>0){
      const lbl2=document.createElement("div");lbl2.className="section-label";lbl2.style.marginTop="16px";lbl2.textContent="Coming Up";
      main.appendChild(lbl2);
      upcoming.forEach(s=>main.appendChild(buildShiftCard(s,false)));
    }

    // Pending timesheets alert
    const myPending=myTimesheets.filter(t=>t.status==="pending");
    if(myPending.length>0){
      const alert=document.createElement("div");
      alert.style.cssText="background:#fff8e1;border:1px solid #f9a825;border-radius:var(--radius);padding:12px 16px;margin-top:14px;display:flex;gap:10px;align-items:center;cursor:pointer";
      alert.innerHTML=`<span style="font-size:20px">⏱</span><div style="flex:1"><div style="font-weight:700;color:#7a5500;font-size:13px">${myPending.length} timesheet${myPending.length!==1?"s":""} pending approval</div><div style="font-size:12px;color:#7a5500">Tap to view</div></div><span style="color:#7a5500">→</span>`;
      alert.onclick=()=>{currentView="timesheets";renderApp();};
      main.appendChild(alert);
    }
  }

  // ── My Shifts view ───────────────────────────────────────────────────
  if(currentView==="shifts"){
    const now2=new Date();const todayStr2=ds(now2);
    const past=myShifts.filter(s=>s.shift.date<todayStr2);
    const future=myShifts.filter(s=>s.shift.date>=todayStr2);

    if(myShifts.length===0){
      const empty=document.createElement("div");empty.className="empty";
      empty.innerHTML=`<div class="empty-icon">📅</div>No shifts assigned yet.<br>Contact Taver Group if you think this is an error.`;
      main.appendChild(empty);
    } else {
      // Stats row
      const stats=document.createElement("div");
      stats.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px";
      [[myShifts.length,"Total Shifts"],[future.length,"Upcoming"],[past.length,"Completed"]].forEach(([n,l])=>{
        const s=document.createElement("div");s.className="stat-box";
        s.innerHTML=`<div class="stat-num">${n}</div><div class="stat-lbl">${l}</div>`;
        stats.appendChild(s);
      });
      main.appendChild(stats);

      if(future.length>0){
        const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent="Upcoming Shifts";
        main.appendChild(lbl);
        future.forEach(s=>main.appendChild(buildShiftCard(s,s.shift.date===todayStr2)));
      }
      if(past.length>0){
        const lbl=document.createElement("div");lbl.className="section-label";lbl.style.marginTop="16px";lbl.textContent="Past Shifts";
        main.appendChild(lbl);
        [...past].reverse().forEach(s=>main.appendChild(buildShiftCard(s,false,true)));
      }
    }
  }

  // ── Timesheets view ──────────────────────────────────────────────────
  if(currentView==="timesheets"){
    if(myTimesheets.length===0){
      const empty=document.createElement("div");empty.className="empty";
      empty.innerHTML=`<div class="empty-icon">⏱</div>No timesheets yet.<br>When Taver sends you a timesheet link,<br>complete it and it will appear here.`;
      main.appendChild(empty);
    } else {
      const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=`${myTimesheets.length} Timesheet${myTimesheets.length!==1?"s":""}`;
      main.appendChild(lbl);
      myTimesheets.forEach(ts=>{
        const card=document.createElement("div");card.className="card";
        const statusColor=ts.status==="approved"?"var(--green)":ts.status==="rejected"?"var(--danger)":"var(--amber)";
        const statusBg=ts.status==="approved"?"var(--green-bg)":ts.status==="rejected"?"var(--danger-bg)":"#fff8e1";
        const statusLabel=ts.status==="approved"?"✓ Approved":ts.status==="rejected"?"✕ Rejected":"⏱ Pending";
        const shiftDate=ts.shiftDate?new Date(ts.shiftDate+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}):"—";
        const myName=(profile?.name||"").trim().toLowerCase();
        const myEntry=(ts.entries||[]).find(e=>e.personName&&e.personName.trim().toLowerCase()===myName);

        card.innerHTML=`
          <div class="card-hdr" style="background:${statusBg}">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                <span style="font-weight:700;font-size:14px;color:var(--txt)">${ts.shiftDay||""} ${shiftDate}</span>
                <span style="background:${statusBg};color:${statusColor};border:1px solid ${statusColor}44;border-radius:4px;padding:1px 8px;font-size:11px;font-weight:700">${statusLabel}</span>
              </div>
              <div style="font-size:12px;color:var(--mut)">${ts.jobName||""}${ts.jobNumber?" ("+ts.jobNumber+")":""}</div>
              ${myEntry?`<div style="font-size:12px;color:var(--mid);margin-top:4px;font-weight:600">
                Your hours: ${myEntry.actualStart}–${myEntry.actualEnd}
                · Net: ${myEntry.netHours?.toFixed(1)||"—"} hrs
                ${myEntry.lunchHrs>0?" · Lunch: "+myEntry.lunchHrs+"h":""}
                ${myEntry.travelHrs>0?" · Travel: "+myEntry.travelHrs+"h":""}
              </div>`:""}
            </div>
          </div>
          <div style="padding:10px 16px;font-size:12px;color:var(--mut)">
            Submitted: ${ts.submittedAt?new Date(ts.submittedAt).toLocaleString("en-AU",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—"}
          </div>`;
        main.appendChild(card);
      });
    }

let confirmationCache={}; // shiftId -> {status, updatedAt}

async function loadConfirmations(){
  try{
    const name=encodeURIComponent(profile.name);
    const r=await fetch(`${SB_URL}/rest/v1/shift_confirmations?staff_name=ilike.${name}&select=*`,{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    });
    if(!r.ok){console.warn("Confirmations not available yet:",r.status);return;}
    const rows=await r.json();
    confirmationCache={};
    (rows||[]).forEach(row=>{confirmationCache[row.shift_id]=row;});
    console.log("Loaded",Object.keys(confirmationCache).length,"confirmations");
  }catch(e){console.warn("loadConfirmations failed (table may not exist yet):",e);}
}

async function setConfirmation(shift, job, status){
  const existing=confirmationCache[shift.id];
  const id=existing?.id||(Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  const row={id,shift_id:shift.id,job_id:job.id,staff_name:profile.name,status,updated_at:new Date().toISOString()};
  try{
    const r=await fetch(`${SB_URL}/rest/v1/shift_confirmations`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(row)
    });
    if(!r.ok)throw new Error(await r.text());
    confirmationCache[shift.id]=row;
    // Status saved to Supabase — admin sees it in real time
  }catch(e){console.error("setConfirmation error:",e);alert("Failed to save — try again");}
}

function buildShiftCard(s, isToday, isPast){
  const {job,shift,myEntry,crew}=s;
  const shiftDate=new Date(shift.date+"T12:00:00");
  const namedCrew=crew.filter(p=>p.name&&p.name.trim());
  const confirmation=confirmationCache[shift.id];
  const confStatus=confirmation?.status||"pending";

  const card=document.createElement("div");card.className="card";

  // Colour bar
  const bar=document.createElement("div");
  bar.style.cssText=`height:4px;background:${job.color};width:100%`;
  if(isPast)bar.style.opacity="0.4";
  card.appendChild(bar);

  const body=document.createElement("div");body.className="card-body";

  // Date + time header
  const dRow=document.createElement("div");
  dRow.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px";
  const dLeft=document.createElement("div");
  dLeft.innerHTML=`
    <div style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px">${isToday?"TODAY — On Site Now":fmtFull(shiftDate)}</div>
    <div style="font-size:18px;font-weight:800;color:${isPast?"var(--mut)":"var(--mid)"}">${myEntry.shiftStart} – ${myEntry.shiftEnd}</div>
    <div style="font-size:11px;color:var(--mut);margin-top:2px">My times · Shift: ${shift.startTime}–${shift.endTime}</div>`;
  const dRight=document.createElement("div");dRight.style.textAlign="right";
  if(job.jobNumber){
    const jn=document.createElement("div");
    jn.style.cssText="background:var(--mid);color:#fff;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:800;letter-spacing:.5px";
    jn.textContent=job.jobNumber;dRight.appendChild(jn);
  }
  dRow.appendChild(dLeft);dRow.appendChild(dRight);
  body.appendChild(dRow);

  // Job + site
  const jRow=document.createElement("div");jRow.style.cssText="margin-bottom:8px";
  jRow.innerHTML=`<div style="font-weight:700;font-size:15px;color:var(--dk);margin-bottom:3px">${job.name}${job.po?" — "+job.po:""}</div>`;
  if(job.client){const c=document.createElement("div");c.style.cssText="font-size:12px;color:var(--mut)";c.textContent="Client: "+job.client;jRow.appendChild(c);}
  if(job.siteAddress){
    const sRow=document.createElement("div");sRow.style.cssText="font-size:12px;color:var(--mut);display:flex;align-items:center;gap:6px;margin-top:2px";
    sRow.innerHTML=`📍 ${job.siteAddress}`;
    if(job.mapLink){
      const ml=document.createElement("a");ml.href=job.mapLink;ml.target="_blank";
      ml.style.cssText="color:var(--mid);font-weight:700;text-decoration:none;font-size:11px;background:var(--acc-light);border:1px solid var(--bdr2);border-radius:4px;padding:1px 6px";
      ml.textContent="Map →";sRow.appendChild(ml);
    }
    jRow.appendChild(sRow);
  }
  if(job.clientContact){
    const cRow=document.createElement("div");cRow.style.cssText="font-size:12px;color:var(--mut);margin-top:2px";
    cRow.textContent=`Site contact: ${job.clientContact}${job.clientPhone?" — "+job.clientPhone:""}`;
    jRow.appendChild(cRow);
  }
  body.appendChild(jRow);

  // Role badge
  const rBadge=document.createElement("div");
  rBadge.style.cssText="margin-bottom:10px";
  rBadge.innerHTML=`<span style="background:var(--acc-light);color:var(--mid);border:1px solid var(--bdr2);border-radius:4px;padding:3px 10px;font-size:12px;font-weight:700">My role: ${myEntry.role}</span>`;
  body.appendChild(rBadge);

  // Crew list
  if(namedCrew.length>1){
    const cRow=document.createElement("div");cRow.style.cssText="margin-bottom:4px";
    const cLbl=document.createElement("div");cLbl.style.cssText="font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px";cLbl.textContent="Crew on this shift";
    cRow.appendChild(cLbl);
    const chips=document.createElement("div");chips.style.cssText="display:flex;flex-wrap:wrap;gap:4px";
    const myName=(profile?.name||"").trim().toLowerCase();
    namedCrew.forEach(p=>{
      const isMe=p.name.trim().toLowerCase()===myName;
      const chip=document.createElement("span");
      chip.className="crew-chip"+(isMe?" me":"");
      chip.textContent=(isMe?"👤 ":"")+p.name+(p.role?" ("+p.role+")":"");
      chips.appendChild(chip);
    });
    cRow.appendChild(chips);
    body.appendChild(cRow);
  }

  card.appendChild(body); // ← attach all the shift details to the card

  // ── Confirm / Decline buttons ─────────────────────────────────────
  const todayStr=ds(new Date());
  const showConfirmation=shift.date>=todayStr; // show on today and future
  if(showConfirmation){
    const confWrap=document.createElement("div");
    confWrap.style.cssText="padding:10px 14px;border-top:1px solid var(--bdr);background:var(--bg3);display:flex;align-items:center;gap:8px;flex-wrap:wrap";

    if(confStatus==="pending"){
      // Shift details summary
      const shiftSummary=document.createElement("div");
      shiftSummary.style.cssText="width:100%;margin-bottom:10px;padding:8px 10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius)";
      const shiftDateFmt=new Date(shift.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
      shiftSummary.innerHTML=`
        <div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:4px">Can you make this shift?</div>
        <div style="font-size:12px;color:var(--mut);line-height:1.7">
          <span style="display:block">📋 <strong>${job.name}</strong>${job.jobNumber?" — "+job.jobNumber:""}</span>
          <span style="display:block">📅 ${shiftDateFmt}</span>
          <span style="display:block">🕐 ${myEntry.shiftStart} – ${myEntry.shiftEnd}</span>
          ${job.siteAddress?`<span style="display:block">📍 ${job.siteAddress}</span>`:""}
          <span style="display:block">👤 My role: ${myEntry.role}</span>
        </div>`;
      confWrap.appendChild(shiftSummary);
      const btnRow=document.createElement("div");
      btnRow.style.cssText="display:flex;gap:8px;width:100%";
      const confirmBtn=document.createElement("button");
      confirmBtn.style.cssText="flex:1;background:#fff3ee;color:#1a6b2e;border:1px solid #a9d5b0;border-radius:6px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit";
      confirmBtn.textContent="✓ Yes, I can make it";
      confirmBtn.onclick=async()=>{
        confirmBtn.disabled=true;declineBtn.disabled=true;
        confirmBtn.textContent="Saving...";
        await setConfirmation(shift,job,"confirmed");
        renderApp();
      };
      const declineBtn=document.createElement("button");
      declineBtn.style.cssText="flex:1;background:#fdf0f0;color:#c0392b;border:1px solid #f5c6c2;border-radius:6px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit";
      declineBtn.textContent="✗ No, I can't make it";
      declineBtn.onclick=async()=>{
        confirmBtn.disabled=true;declineBtn.disabled=true;
        declineBtn.textContent="Saving...";
        await setConfirmation(shift,job,"declined");
        renderApp();
      };
      btnRow.appendChild(confirmBtn);
      btnRow.appendChild(declineBtn);
      confWrap.appendChild(btnRow);
    } else if(confStatus==="confirmed"){
      confWrap.innerHTML=`
        <span style="font-size:16px">✅</span>
        <span style="font-size:13px;font-weight:700;color:#1a6b2e;flex:1">You confirmed this shift</span>
        <button onclick="this.disabled=true" style="background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr)" id="change-${shift.id}">Change response</button>`;
      confWrap.querySelector(`#change-${shift.id}`).onclick=async()=>{
        await setConfirmation(shift,job,"pending");
        delete confirmationCache[shift.id];
        renderApp();
      };
    } else if(confStatus==="declined"){
      confWrap.innerHTML=`
        <span style="font-size:16px">❌</span>
        <span style="font-size:13px;font-weight:700;color:#c0392b;flex:1">You declined this shift</span>
        <button style="background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:4px;border:1px solid var(--bdr)" id="change2-${shift.id}">Change response</button>`;
      confWrap.querySelector(`#change2-${shift.id}`).onclick=async()=>{
        await setConfirmation(shift,job,"pending");
        delete confirmationCache[shift.id];
        renderApp();
      };
    }
    card.appendChild(confWrap);
  }

  // ── Quick action buttons — always visible ────────────────────────
  const actionBar=document.createElement("div");
  actionBar.style.cssText="padding:8px 14px;border-top:1px solid var(--bdr);display:flex;gap:8px;background:var(--bg2)";

  const tsBtn=document.createElement("button");
  tsBtn.style.cssText="flex:1;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);border-radius:var(--radius);padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px";
  tsBtn.innerHTML="⏱ Timesheet";
  tsBtn.onclick=()=>showCreateTimesheet(s);
  actionBar.appendChild(tsBtn);

  const dktBtn=document.createElement("button");
  dktBtn.style.cssText="flex:1;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt);border-radius:var(--radius);padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px";
  dktBtn.innerHTML="✍️ Docket";
  dktBtn.onclick=()=>showCreateDocket(s);
  actionBar.appendChild(dktBtn);

  card.appendChild(actionBar);

  return card;
}

      const r=await fetch(`${SB_URL}/rest/v1/staff?name=ilike.${encodedName}&select=id,name,role,pin`,{
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
      });
      if(!r.ok){
        const errText=await r.text();
        console.error("Staff lookup failed:",r.status,errText);
        msgEl.className="auth-msg error";msgEl.textContent="Connection error — please try again";
        loginBtn.disabled=false;loginBtn.textContent="Sign In";
        return;
      }
      const staff=await r.json();
      console.log("Staff found:",staff?.length,"matches");
      // Find one where PIN matches
      const DEFAULT_PIN = "1234"; // fallback if no personal PIN set
      const match=staff.find(s=>{
        const staffPin=(s.pin||"").trim()||DEFAULT_PIN;
        return staffPin===pin.trim();
      });
      if(!match){
        msgEl.className="auth-msg error";
        msgEl.textContent="Name or PIN not recognised — check with Taver Group";
        loginBtn.disabled=false;loginBtn.textContent="Sign In";
        pinInput.value="";pinInput.focus();
        return;
      }
      const staffMember=match;
      // Store PIN session
      const pinSession={
        staffId:staffMember.id,
        name:staffMember.name,
        role:staffMember.role||"",
        exp:Date.now()+30*24*60*60*1000, // kept for backwards compat
        permanent:true // no expiry enforced
      };
      localStorage.setItem("taver_pin_session",JSON.stringify(pinSession));
      profile={name:staffMember.name,role:staffMember.role||""};
      // Load data and render
      showLoadingScreen();
      [myShifts,myTimesheets]=await Promise.all([
        loadMyData(SB_KEY,staffMember.name),
        loadMyTimesheets(SB_KEY,staffMember.name)
      ]);
      await loadConfirmations();
      renderApp();
    }catch(e){
      console.error(e);
      msgEl.className="auth-msg error";msgEl.textContent="Connection error — try again";
      loginBtn.disabled=false;loginBtn.textContent="Sign In";
    }
  }

  loginBtn.onclick=attemptLogin;
  pinInput.onkeydown=e=>{if(e.key==="Enter")attemptLogin();};
  nameInput.onkeydown=e=>{if(e.key==="Enter")pinInput.focus();};
  nameInput.focus();
}

// ── Load my dockets ───────────────────────────────────────────────────
async function loadMyDockets(staffName){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/dockets`,{
      method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({limit:1000,offset:0,prefix:""})
    });
    if(!r.ok)return[];
    const files=await r.json();
    const results=[];
    const myName=staffName.trim().toLowerCase();
    await Promise.all((files||[]).map(async f=>{
      try{
        const dr=await fetch(`${SB_URL}/storage/v1/object/public/dockets/${f.name}`);
        if(!dr.ok)return;
        const d=await dr.json();
        // Show if submitted by this person (superintendent) or they are in crew
        const isTheirJob=myShifts.some(s=>s.job.id===d.jobId);
        if(isTheirJob)results.push(d);
      }catch{}
    }));
    results.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
    return results;
  }catch{return[];}
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function showModal(title, buildFn){
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding:0";

function mkSigPad(canvas){
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);
  let drawing=false,lx=0,ly=0;
  function pos(e){const r=canvas.getBoundingClientRect();const sx=canvas.width/r.width,sy=canvas.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
  canvas.addEventListener("mousedown",e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener("mousemove",e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener("mouseup",()=>drawing=false);canvas.addEventListener("mouseleave",()=>drawing=false);
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchmove",e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchend",()=>drawing=false);
  return{clear:()=>{ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);},isEmpty:()=>!ctx.getImageData(0,0,canvas.width,canvas.height).data.some((v,i)=>i%4!==3&&v!==255),toDataURL:()=>canvas.toDataURL("image/png")};
}

function showCreateTimesheet(preSelected){

        const o=document.createElement("option");o.value=s.shift.id;

        const opt=document.createElement("option");opt.value="";opt.textContent="— Select shift —";shiftSel.appendChild(opt);
        myShifts.filter(s=>s.job.id===jobSel.value).forEach(s=>{
          const o=document.createElement("option");o.value=s.shift.id;
          const d=new Date(s.shift.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short"});
          o.textContent=`${d} ${s.shift.startTime}–${s.shift.endTime}`;
          shiftSel.appendChild(o);
        });
      });
    }

    // Actual times — pre-fill from shift if pre-selected
    const timeRow=document.createElement("div");timeRow.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:10px";
    const startIn=mkInput("time","Start",preSelected?preSelected.myEntry.shiftStart||preSelected.shift.startTime:"06:00");
    const endIn=mkInput("time","End",preSelected?preSelected.myEntry.shiftEnd||preSelected.shift.endTime:"14:00");
    timeRow.appendChild(mkField("Actual start",startIn));
    timeRow.appendChild(mkField("Actual finish",endIn));
    sheet.appendChild(timeRow);

    // Lunch
    const lunchSel=mkSelect([["0","No lunch break"],["0.5","30 min"],["1","1 hour"],["1.5","1.5 hours"],["2","2 hours"]]);
    sheet.appendChild(mkField("Lunch break",lunchSel));

    // Travel + LAFHA
    const travelIn=mkInput("number","0");travelIn.min="0";travelIn.step="0.5";
    sheet.appendChild(mkField("Travel hours (if applicable)",travelIn));
    const lafhaSel=mkSelect([["no","No"],["yes","Yes"]]);
    sheet.appendChild(mkField("LAFHA",lafhaSel));

    // Notes
    const notesIn=document.createElement("textarea");
    notesIn.placeholder="Any variations or additional notes...";
    notesIn.style.cssText="width:100%;min-height:60px;font-size:14px;font-family:inherit;resize:vertical;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;outline:none";
    sheet.appendChild(mkField("Notes",notesIn));

    // Signature
    const sigLbl=document.createElement("label");sigLbl.textContent="Your signature";sigLbl.style.cssText="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px";
    sheet.appendChild(sigLbl);
    const sigWrap=document.createElement("div");sigWrap.style.cssText="border:1px solid var(--bdr);border-radius:var(--radius);background:#fff;position:relative;margin-bottom:14px";
    const canvas=document.createElement("canvas");canvas.width=600;canvas.height=120;canvas.style.cssText="display:block;width:100%;height:120px;cursor:crosshair;touch-action:none;border-radius:var(--radius)";
    const clearBtn=document.createElement("button");clearBtn.textContent="Clear";clearBtn.style.cssText="position:absolute;top:6px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--bdr);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--mut)";
    sigWrap.appendChild(canvas);sigWrap.appendChild(clearBtn);

    const sig=mkSigPad(canvas);clearBtn.onclick=()=>sig.clear();

    // Submit
    const submitBtn=document.createElement("button");submitBtn.className="btn-p";submitBtn.textContent="Submit Timesheet";
    submitBtn.onclick=async()=>{
      if(!jobSel.value||!shiftSel.value){alert("Please select a job and shift");return;}
      if(sig.isEmpty()){alert("Please sign before submitting");return;}
      submitBtn.disabled=true;submitBtn.textContent="Submitting...";

      const selectedShift=myShifts.find(s=>s.shift.id===shiftSel.value);
      const lunch=parseFloat(lunchSel.value)||0;
      const grossH=(new Date("2000-01-01T"+endIn.value)-new Date("2000-01-01T"+startIn.value))/3600000;
      const netH=Math.max(0,grossH-lunch);

      const ts={
        id:uid(),
        jobId:selectedShift.job.id,shiftId:selectedShift.shift.id,
        jobName:selectedShift.job.name,jobNumber:selectedShift.job.jobNumber||"",
        jobPO:selectedShift.job.po||"",client:selectedShift.job.client||"",
        siteAddress:selectedShift.job.siteAddress||"",
        shiftDate:selectedShift.shift.date,shiftDay:selectedShift.shift.dayLabel,
        shiftStart:selectedShift.shift.startTime,shiftEnd:selectedShift.shift.endTime,
        submittedAt:new Date().toISOString(),
        status:"pending",
        entries:[{
          personId:"staff-manual",personName:profile.name,role:profile.role||"",
          actualStart:startIn.value,actualEnd:endIn.value,
          lunchHrs:lunch,netHours:netH,
          travelHrs:parseFloat(travelIn.value)||0,
          lafha:lafhaSel.value==="yes",
          notes:notesIn.value.trim(),
          signature:sig.toDataURL(),status:"pending"
        }]
      };

      try{
        const blob=new Blob([JSON.stringify(ts)],{type:"application/json"});
        const r=await fetch(`${SB_URL}/storage/v1/object/timesheets/${ts.id}.json`,{
          method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},body:blob
        });
        if(!r.ok)throw new Error(await r.text());
        myTimesheets.unshift(ts);
        close();renderApp();
        alert("Timesheet submitted successfully ✓");
      }catch(e){
        submitBtn.disabled=false;submitBtn.textContent="Submit Timesheet";
        alert("Failed to submit — check connection and try again.\n"+e.message);
      }
    };
    sheet.appendChild(submitBtn);
  });
}

        saveDraftBtn.textContent="💾 Save Draft";
        saveDraftBtn.style.background="";
        saveDraftBtn.style.color="";
        saveDraftBtn.style.borderColor="";
      },2000);
    };

    const submitBtn=document.createElement("button");submitBtn.className="btn-p";submitBtn.textContent="Submit Docket";
    submitBtn.style.cssText+="flex:2";
    submitBtn.onclick=async()=>{
      if(!jobSel.value||!shiftSel.value){alert("Please select a job and shift");return;}
      if(!worksIn.value.trim()){alert("Please describe the works completed");return;}
      if(!clientNameIn.value.trim()){alert("Please enter the client representative name");return;}
      if(cSig.isEmpty()){alert("Please obtain the client signature");return;}
      if(!supNameIn.value.trim()){alert("Please enter the supervisor name");return;}
      if(sSig.isEmpty()){alert("Please sign as supervisor");return;}
      submitBtn.disabled=true;submitBtn.textContent="Submitting...";

      const selectedShift=myShifts.find(s=>s.shift.id===shiftSel.value);
      const lunch=parseFloat(lunchSel.value)||0;
      const grossH=parseFloat(hoursIn.value)||0;
      const netH=Math.max(0,grossH-lunch);

      const docket={
        id:uid(),
        jobId:selectedShift.job.id,shiftId:selectedShift.shift.id,
        createdAt:new Date().toISOString(),
        submittedFrom:"staff-portal",
        jobName:selectedShift.job.name,jobNumber:selectedShift.job.jobNumber||"",
        jobPO:selectedShift.job.po||"",client:selectedShift.job.client||"",
        siteAddress:selectedShift.job.siteAddress||"",
        shiftDate:selectedShift.shift.date,shiftDay:selectedShift.shift.dayLabel,
        shiftStart:selectedShift.shift.startTime,shiftEnd:selectedShift.shift.endTime,
        worksCompleted:worksIn.value.trim(),
        crewHours:[{id:"manual",name:profile.name,role:profile.role||"",hours:grossH,lunchHrs:lunch,hoursNet:netH}],
        travelHours:parseFloat(travelIn.value)||0,
        lafha:lafhaSel.value==="yes",
        comments:commentsIn.value.trim(),
        clientRepName:clientNameIn.value.trim(),
        clientSigData:cSig.toDataURL(),
        supName:supNameIn.value.trim(),
        supSigData:sSig.toDataURL(),
      };

      try{
        const blob=new Blob([JSON.stringify(docket)],{type:"application/json"});
        const r=await fetch(`${SB_URL}/storage/v1/object/dockets/${docket.id}.json`,{
          method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},body:blob
        });
        if(!r.ok)throw new Error(await r.text());
        // Clear draft on successful submit
        const draftKey="docket_draft_"+profile.name.replace(/\s+/g,"_");
        localStorage.removeItem(draftKey);
        close();currentView="dockets";renderApp();
        alert("Docket submitted successfully ✓");
      }catch(e){
        submitBtn.disabled=false;submitBtn.textContent="Submit Docket";
        alert("Failed to submit — check connection and try again.\n"+e.message);
      }
    };

    btnRow.appendChild(saveDraftBtn);
    btnRow.appendChild(submitBtn);
    sheet.appendChild(btnRow);

    // ── Auto-restore draft if one exists ─────────────────────────────
    const draftKey="docket_draft_"+profile.name.replace(/\s+/g,"_");
    const savedDraft=localStorage.getItem(draftKey);
    if(savedDraft&&!preSelected){
      try{
        const draft=JSON.parse(savedDraft);
        const savedDate=new Date(draft.savedAt).toLocaleString("en-AU",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
        const banner=document.createElement("div");
        banner.style.cssText="background:var(--amber-bg);border:1px solid #f0d080;border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--amber);display:flex;align-items:center;justify-content:space-between;gap:8px";
        banner.innerHTML=`<span>📋 Draft saved ${savedDate}</span>`;
        const restoreBtn=document.createElement("button");
        restoreBtn.style.cssText="background:var(--amber);color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap";
        restoreBtn.textContent="Restore";
        restoreBtn.onclick=()=>{
          // Restore job selection
          if(draft.jobId){
            jobSel.value=draft.jobId;
            jobSel.dispatchEvent(new Event("change"));
            setTimeout(()=>{
              if(draft.shiftId) shiftSel.value=draft.shiftId;
            },100);
          }
          worksIn.value=draft.worksCompleted||"";
          hoursIn.value=draft.hours||"";
          lunchSel.value=draft.lunch||"0";
          travelIn.value=draft.travel||"0";
          lafhaSel.value=draft.lafha||"no";
          commentsIn.value=draft.comments||"";
          clientNameIn.value=draft.clientName||"";
          supNameIn.value=draft.supName||"";
          banner.remove();
          toast("Draft restored ✓");
        };
        const discardBtn=document.createElement("button");
        discardBtn.style.cssText="background:transparent;border:none;color:var(--mut);font-size:18px;cursor:pointer;padding:0 4px;line-height:1";
        discardBtn.textContent="×";
        discardBtn.onclick=()=>{localStorage.removeItem(draftKey);banner.remove();};
        banner.appendChild(restoreBtn);
        banner.appendChild(discardBtn);
        sheet.insertBefore(banner,sheet.firstChild);
      }catch(e){localStorage.removeItem(draftKey);}
    }
  });
}

    const sigLbl=document.createElement("label");sigLbl.textContent="Signature *";sigLbl.style.cssText="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:5px";
    sheet.appendChild(sigLbl);
    const sigWrap=document.createElement("div");sigWrap.style.cssText="border:1px solid var(--bdr);border-radius:var(--radius);background:#fff;position:relative;margin-bottom:14px";
    const canvas=document.createElement("canvas");canvas.width=600;canvas.height=120;canvas.style.cssText="display:block;width:100%;height:120px;cursor:crosshair;touch-action:none;border-radius:var(--radius)";
    const clearBtn=document.createElement("button");clearBtn.textContent="Clear";clearBtn.style.cssText="position:absolute;top:6px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--bdr);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--mut)";
    sigWrap.appendChild(canvas);sigWrap.appendChild(clearBtn);
    sheet.appendChild(sigWrap);
    const sig=mkSigPad(canvas);clearBtn.onclick=()=>sig.clear();

    // Submit
    const submitBtn=document.createElement("button");submitBtn.className="btn-p";submitBtn.textContent="Submit SWMS Sign-Off";
    submitBtn.onclick=async()=>{
      if(!jobSel.value||!shiftSel.value){alert("Please select a job and shift");return;}
      if(!tradeIn.value.trim()){alert("Please enter your trade / role");return;}
      const uncheckedAck=ackChecks.filter(cb=>!cb.checked);
      if(uncheckedAck.length>0){alert("Please confirm all acknowledgements before signing");return;}
      if(sig.isEmpty()){alert("Please sign before submitting");return;}
      submitBtn.disabled=true;submitBtn.textContent="Submitting...";

      const selectedShift=myShifts.find(s=>s.shift.id===shiftSel.value);
      const ppeConfirmed=Object.entries(ppeChecks).filter(([k,v])=>v.checked).map(([k])=>k);

      const record={
        id:uid(),
        type:"swms-signoff",
        swmsRef:"TG-017",
        swmsTitle:"Welding and Rerailing Activities",
        jobId:selectedShift.job.id,shiftId:selectedShift.shift.id,
        jobName:selectedShift.job.name,jobNumber:selectedShift.job.jobNumber||"",
        shiftDate:selectedShift.shift.date,shiftDay:selectedShift.shift.dayLabel,
        submittedBy:profile.name,trade:tradeIn.value.trim(),
        submittedAt:new Date().toISOString(),
        status:"pending",
        ppeConfirmed,
        acknowledgementsConfirmed:ackChecks.every(cb=>cb.checked),
        signature:sig.toDataURL()
      };

      try{
        const blob=new Blob([JSON.stringify(record)],{type:"application/json"});
        const r=await fetch(`${SB_URL}/storage/v1/object/reports/${record.id}.json`,{
          method:"POST",
          headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
          body:blob
        });
        if(!r.ok)throw new Error(await r.text());
        close();renderApp();
        alert("SWMS Sign-Off submitted ✓");
      }catch(e){
        submitBtn.disabled=false;submitBtn.textContent="Submit SWMS Sign-Off";
        alert("Failed to submit — check connection.\n"+e.message);
      }
    };
    sheet.appendChild(submitBtn);
  });
}

// ── Change PIN ────────────────────────────────────────────────────────
function showChangePIN(){
  showModal("Change My PIN",(sheet,close)=>{
    sheet.appendChild(Object.assign(document.createElement("div"),{
      style:"font-size:13px;color:var(--mut);margin-bottom:16px;line-height:1.6",
      textContent:"Set a personal PIN that only you know. Must be 4-6 digits."
    }));

    const newPin=mkInput("tel","New PIN (4-6 digits)");
    newPin.maxLength=6;
    newPin.style.cssText+="letter-spacing:6px;font-size:22px;font-weight:700;width:160px";
    newPin.addEventListener("input",()=>newPin.value=newPin.value.replace(/[^0-9]/g,""));

    const confirmPin=mkInput("tel","Confirm new PIN");
    confirmPin.maxLength=6;
    confirmPin.style.cssText+="letter-spacing:6px;font-size:22px;font-weight:700;width:160px";
    confirmPin.addEventListener("input",()=>confirmPin.value=confirmPin.value.replace(/[^0-9]/g,""));

    sheet.appendChild(mkField("New PIN",newPin));
    sheet.appendChild(mkField("Confirm PIN",confirmPin));

    const errEl=document.createElement("div");
    errEl.style.cssText="color:var(--danger);font-size:12px;margin-bottom:8px;min-height:16px";
    sheet.appendChild(errEl);

    const saveBtn=document.createElement("button");
    saveBtn.className="btn-p";saveBtn.textContent="Save PIN";
    saveBtn.onclick=async()=>{
      const p1=newPin.value.trim();
      const p2=confirmPin.value.trim();
      if(p1.length<4){errEl.textContent="PIN must be at least 4 digits";return;}
      if(p1!==p2){errEl.textContent="PINs don't match — try again";confirmPin.value="";confirmPin.focus();return;}
      saveBtn.disabled=true;saveBtn.textContent="Saving...";
      // Update in Supabase
      try{
        const r=await fetch(`${SB_URL}/rest/v1/staff?name=eq.${encodeURIComponent(profile.name)}`,{
          method:"PATCH",
          headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
          body:JSON.stringify({pin:p1})
        });
        if(!r.ok)throw new Error(await r.text());
        close();
        alert(`✓ PIN updated to ${p1} — use this next time you log in`);
      }catch(e){
        errEl.textContent="Failed to save — try again";
        saveBtn.disabled=false;saveBtn.textContent="Save PIN";
      }
    };
    sheet.appendChild(saveBtn);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────
async function boot(){
  // Check for stored PIN session
  try{
    const stored=localStorage.getItem("taver_pin_session");
    if(stored){
      const s=JSON.parse(stored);
      if(s.name){  // permanent session — only cleared on sign out
        profile={name:s.name,role:s.role||""};
        showLoadingScreen();
        [myShifts,myTimesheets]=await Promise.all([
          loadMyData(SB_KEY,s.name),
          loadMyTimesheets(SB_KEY,s.name)
        ]);
        await loadConfirmations();
        renderApp();
        return;
      }
    }
  }catch{}
  // No valid session — show PIN login
  showLoginScreen();
}

boot();
</script>
