<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f6f4">
<title>Taver Group — Timesheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --dk:#1a3a2a;--mid:#2d5a3d;--lt:#4a6741;--acc:#7fb069;--acc-light:#e8f5ea;
  --bg:#f4f6f4;--bg2:#ffffff;--bg3:#f0f4f0;
  --txt:#1a2a1a;--txt2:#4a5a4a;--mut:#7a907a;
  --bdr:#c8d8c8;--bdr2:#a8c0a8;
  --danger:#c0392b;--green:#1a7a3a;--green-bg:#eaf5ec;--amber:#d4870a;
  --radius:8px;--radius-lg:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;min-height:100vh}
input,select,textarea{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(61,122,74,.1)}
label{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px}
.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.header{background:linear-gradient(135deg,var(--dk) 0%,var(--mid) 100%);color:#fff;padding:20px;display:flex;align-items:center;gap:14px}
.header-logo{width:44px;height:44px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-text h1{font-size:17px;font-weight:800;margin-bottom:2px}
.header-text p{font-size:12px;color:#a8c8a8}
.shift-bar{background:var(--dk);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.shift-day{font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.shift-date{font-size:13px;color:#a8c8a8;margin-top:1px}
.shift-time{font-size:18px;font-weight:800;color:var(--acc);text-align:right}
.shift-time-lbl{font-size:10px;color:#a8c8a8;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;text-align:right}
.job-meta{background:var(--bg2);border-bottom:2px solid var(--mid);padding:12px 20px;font-size:12px;color:var(--mut);display:flex;gap:14px;flex-wrap:wrap}
.main{padding:16px;max-width:640px;margin:0 auto}
.section{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;padding-bottom:8px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.name-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border:2px solid var(--mid);border-radius:var(--radius);margin-bottom:14px}
.name-avatar{width:40px;height:40px;border-radius:50%;background:var(--mid);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.name-info .name{font-size:15px;font-weight:700;color:var(--dk)}
.name-info .role{font-size:12px;color:var(--mut)}
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.time-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px;text-align:center}
.time-box label{margin-bottom:6px;font-size:10px}
.time-box input{border:none;background:transparent;font-size:22px;font-weight:800;text-align:center;color:var(--dk);padding:4px;width:100%}
.time-box input:focus{outline:none;color:var(--mid)}
.time-box .time-lbl{font-size:10px;color:var(--mut);margin-top:4px}
.scheduled-hint{font-size:11px;color:var(--mut);text-align:center;margin-bottom:12px;font-style:italic}
.hours-summary{background:var(--green-bg);border:1px solid #a8d8b0;border-radius:var(--radius);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.hours-total{font-size:20px;font-weight:800;color:var(--green)}
.hours-lbl{font-size:11px;color:var(--mut);margin-top:1px}
.toggle-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 0;user-select:none}
.toggle-sw{width:38px;height:22px;background:var(--bdr2);border-radius:11px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--acc)}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on .toggle-knob{left:18px}
.toggle-content{display:none;padding-top:10px;border-top:1px solid var(--bdr);margin-top:4px}
.toggle-content.show{display:block}
.sig-wrap{border:1px solid var(--bdr);border-radius:var(--radius);background:#fff;position:relative;margin-top:6px}
.sig-canvas{display:block;width:100%;height:120px;cursor:crosshair;touch-action:none}
.sig-clear{position:absolute;top:6px;right:8px;background:rgba(255,255,255,.9);border:1px solid var(--bdr);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--mut);font-family:inherit}
.sig-hint{font-size:11px;color:var(--mut);margin-top:4px;font-style:italic}
button{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-weight:600;font-size:14px;padding:10px 18px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--mid);border:1px solid var(--lt);color:#fff;width:100%;justify-content:center;padding:14px;font-size:15px}
.btn-p:hover{background:var(--lt)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.divider{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.loading{text-align:center;padding:60px 20px;color:var(--mut)}
.loading-dots{display:flex;gap:6px;justify-content:center;margin-top:14px}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:pulse 1.2s ease infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.success-wrap{text-align:center;padding:50px 24px}
.success-icon{font-size:60px;margin-bottom:16px}
.success-wrap h2{font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px}
.success-wrap p{font-size:13px;color:var(--mut);line-height:1.6}
.error-wrap{text-align:center;padding:50px 24px}
.error-wrap h2{color:var(--danger);margin-bottom:8px}
.error-wrap p{font-size:13px;color:var(--mut)}
@media(max-width:400px){.field-row{grid-template-columns:1fr}.time-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="root">
  <div class="loading">
    <div style="width:60px;height:60px;background:var(--dk);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="36" height="36" viewBox="0 0 36 36"><rect width="36" height="36" rx="5" fill="#0a1410"/><text x="18" y="26" text-anchor="middle" fill="#7fb069" font-size="22" font-weight="800" font-family="Arial">T</text></svg>
    </div>
    <div style="font-weight:700;color:var(--dk);font-size:15px">Loading timesheet...</div>
    <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  </div>
</div>
<script>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

async function sbGet(path){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function uploadTimesheet(ts){
  const blob=new Blob([JSON.stringify(ts)],{type:"application/json"});
  const r=await fetch(`${SB_URL}/storage/v1/object/timesheets/${ts.id}.json`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
    body:blob
  });
  if(!r.ok)throw new Error(await r.text());
}

function makeSigPad(canvas){
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvas.width,canvas.height);
  let drawing=false,lx=0,ly=0;
  function pos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  }
  canvas.addEventListener("mousedown",e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener("mousemove",e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener("mouseup",()=>drawing=false);
  canvas.addEventListener("mouseleave",()=>drawing=false);
  canvas.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchmove",e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener("touchend",()=>drawing=false);
  return{
    clear:()=>ctx.clearRect(0,0,canvas.width,canvas.height),
    isEmpty:()=>!ctx.getImageData(0,0,canvas.width,canvas.height).data.some(v=>v!==0),
    toDataURL:()=>canvas.toDataURL("image/png")
  };
}

function makeToggle(labelText, onToggle){
  const wrap=document.createElement("div");
  const row=document.createElement("div");row.className="toggle-row";
  const sw=document.createElement("div");sw.className="toggle-sw";
  const knob=document.createElement("div");knob.className="toggle-knob";sw.appendChild(knob);
  const lbl=document.createElement("span");lbl.textContent=labelText;lbl.style.cssText="font-size:13px;color:var(--txt2)";
  row.appendChild(sw);row.appendChild(lbl);wrap.appendChild(row);
  const content=document.createElement("div");content.className="toggle-content";wrap.appendChild(content);
  let on=false;
  row.addEventListener("click",()=>{on=!on;sw.className="toggle-sw"+(on?" on":"");content.className="toggle-content"+(on?" show":"");onToggle(on,content);});
  return{wrap,content};
}

function calcHours(start,end,lunchHrs){
  if(!start||!end)return 0;
  const diff=(new Date("2000-01-01T"+end)-new Date("2000-01-01T"+start))/3600000;
  return Math.max(0,diff-(lunchHrs||0));
}

// ── Load data and build form ──────────────────────────────────────────
const params=new URLSearchParams(window.location.search);
const JOB_ID=params.get("job");
const SHIFT_ID=params.get("shift");

async function boot(){
  if(!JOB_ID||!SHIFT_ID){showError("Invalid link","This timesheet link is missing required information.");return;}
  try{
    const[jobRows,shiftRows,paxRows]=await Promise.all([
      sbGet(`jobs?id=eq.${JOB_ID}&select=*`),
      sbGet(`shifts?id=eq.${SHIFT_ID}&select=*`),
      sbGet(`personnel?shift_id=eq.${SHIFT_ID}&select=*&order=role`)
    ]);
    if(!jobRows?.length){showError("Not found","This timesheet link may have expired.");return;}
    if(!shiftRows?.length){showError("Not found","Shift not found.");return;}
    const job={...jobRows[0],siteAddress:jobRows[0].site_address,mapLink:jobRows[0].map_link,clientContact:jobRows[0].client_contact,clientPhone:jobRows[0].client_phone};
    const shift={...shiftRows[0],startTime:shiftRows[0].start_time,endTime:shiftRows[0].end_time,dayLabel:shiftRows[0].day_label};
    const personnel=paxRows.map(p=>({...p,shiftStart:p.shift_start,shiftEnd:p.shift_end}));
    buildForm(job,shift,personnel);
  }catch(e){
    console.error(e);
    showError("Connection error","Could not load timesheet. Check connection and try again.\n\n"+e.message);
  }
}

function showError(title,msg){
  document.getElementById("root").innerHTML=`<div class="error-wrap"><div style="font-size:48px;margin-bottom:16px">⚠️</div><h2>${title}</h2><p style="white-space:pre-line">${msg}</p></div>`;
}

function buildForm(job,shift,personnel){
  const root=document.getElementById("root");root.innerHTML="";
  const namedCrew=personnel.filter(p=>p.name);
  const shiftDate=new Date(shift.date+"T12:00:00");
  const dayName=shiftDate.toLocaleDateString("en-AU",{weekday:"long"});
  const dateStr=shiftDate.toLocaleDateString("en-AU",{day:"2-digit",month:"long",year:"numeric"});

  // Header
  root.innerHTML=`
    <div class="header">
      <div class="header-logo"><svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="4" fill="rgba(255,255,255,.15)"/><text x="14" y="20" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" font-family="Arial">T</text></svg></div>
      <div class="header-text"><h1>Taver Group</h1><p>Timesheet — complete and sign</p></div>
    </div>
    <div class="shift-bar">
      <div><div class="shift-day">${dayName}</div><div class="shift-date">${dateStr}</div></div>
      <div><div class="shift-time-lbl">Scheduled</div><div class="shift-time">${shift.startTime} – ${shift.endTime}</div></div>
    </div>
    <div class="job-meta">
      <span>${job.jobNumber?`<strong style="color:var(--mid)">${job.jobNumber}</strong> — `:""}<strong>${job.name}</strong>${job.po?" | "+job.po:""}</span>
      ${job.client?`<span>Client: ${job.client}</span>`:""}
      ${job.siteAddress?`<span>📍 ${job.siteAddress}</span>`:""}
    </div>`;

  const main=document.createElement("div");main.className="main";root.appendChild(main);

  // ── Intro ──────────────────────────────────────────────────────────
  const intro=document.createElement("div");
  intro.style.cssText="background:var(--acc-light);border:1px solid var(--bdr2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--mid);margin-bottom:14px;line-height:1.5";
  intro.innerHTML=`Please complete your timesheet below. Enter your <strong>actual</strong> start and finish times for this shift.`;
  main.appendChild(intro);

  // ── Per-person entries ─────────────────────────────────────────────
  const entries=[]; // will hold {personId, personName, role, ...input refs}

  if(namedCrew.length===0){
    const msg=document.createElement("div");
    msg.style.cssText="background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:20px;text-align:center;color:var(--mut);font-size:13px;margin-bottom:14px";
    msg.textContent="No crew assigned to this shift yet. Contact Taver Group.";
    main.appendChild(msg);
  }

  namedCrew.forEach(person=>{
    const sec=document.createElement("div");sec.className="section";

    // Person header
    const nameCard=document.createElement("div");nameCard.className="name-card";
    const av=document.createElement("div");av.className="name-avatar";
    av.textContent=person.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
    const ni=document.createElement("div");ni.className="name-info";
    ni.innerHTML=`<div class="name">${person.name}</div><div class="role">${person.role}</div>`;
    nameCard.appendChild(av);nameCard.appendChild(ni);
    sec.appendChild(nameCard);

    // Scheduled hint
    const hint=document.createElement("div");hint.className="scheduled-hint";
    hint.textContent=`Scheduled: ${person.shiftStart||shift.startTime} – ${person.shiftEnd||shift.endTime}`;
    sec.appendChild(hint);

    // Actual times
    const timeGrid=document.createElement("div");timeGrid.className="time-grid";
    const startBox=document.createElement("div");startBox.className="time-box";
    startBox.innerHTML=`<label>Actual Start</label>`;
    const startIn=document.createElement("input");startIn.type="time";startIn.value=person.shiftStart||shift.startTime;
    startBox.appendChild(startIn);
    const endBox=document.createElement("div");endBox.className="time-box";
    endBox.innerHTML=`<label>Actual Finish</label>`;
    const endIn=document.createElement("input");endIn.type="time";endIn.value=person.shiftEnd||shift.endTime;
    endBox.appendChild(endIn);
    timeGrid.appendChild(startBox);timeGrid.appendChild(endBox);
    sec.appendChild(timeGrid);

    // Lunch toggle
    let lunchHrs=0;
    const {wrap:lunchWrap,content:lunchContent}=makeToggle("Lunch break taken",(on,content)=>{
      if(on&&!content.hasChildNodes()){
        const lSel=document.createElement("select");
        [["0.5","30 min"],["1","1 hour"],["1.5","1.5 hours"],["2","2 hours"]].forEach(([v,l])=>{
          const o=document.createElement("option");o.value=v;o.textContent=l;lSel.appendChild(o);
        });
        lSel.addEventListener("change",()=>{lunchHrs=parseFloat(lSel.value)||0;updateSummary();});
        content.appendChild(lSel);
        lunchHrs=0.5;updateSummary();
      } else if(!on){lunchHrs=0;updateSummary();}
    });
    sec.appendChild(lunchWrap);

    // Hours summary
    const sumBox=document.createElement("div");sumBox.className="hours-summary";
    sumBox.innerHTML=`<div><div class="hours-total" id="ht-${person.id}">—</div><div class="hours-lbl">Net hours this shift</div></div><div style="font-size:12px;color:var(--mut);text-align:right">excl. lunch</div>`;
    sec.appendChild(sumBox);

    function updateSummary(){
      const net=calcHours(startIn.value,endIn.value,lunchHrs);
      const el=document.getElementById("ht-"+person.id);
      if(el)el.textContent=net>0?net.toFixed(1)+" hrs":"—";
    }
    startIn.addEventListener("change",updateSummary);
    endIn.addEventListener("change",updateSummary);
    updateSummary();

    // Travel toggle
    let travelHrs=0;
    const {wrap:travelWrap,content:travelContent}=makeToggle("Travel hours applicable",(on,content)=>{
      if(on&&!content.hasChildNodes()){
        const tIn=document.createElement("input");tIn.type="number";tIn.min="0";tIn.max="12";tIn.step="0.5";tIn.placeholder="Hours e.g. 2.5";
        tIn.style.marginTop="6px";
        tIn.addEventListener("input",()=>travelHrs=parseFloat(tIn.value)||0);
        content.appendChild(tIn);
        entries.find(e=>e.personId===person.id)&&(entries.find(e=>e.personId===person.id).travelIn=tIn);
      }else if(!on)travelHrs=0;
    });
    sec.appendChild(travelWrap);

    // LAFHA toggle
    let lafha=0;
    const {wrap:lafhaWrap,content:lafhaContent}=makeToggle("LAFHA applicable",(on,content)=>{
      if(on&&!content.hasChildNodes()){
        const lIn=document.createElement("input");lIn.type="number";lIn.min="0";lIn.step="1";lIn.placeholder="Number of days";
        lIn.style.marginTop="6px";
        lIn.addEventListener("input",()=>lafha=parseFloat(lIn.value)||0);
        content.appendChild(lIn);
      }else if(!on)lafha=0;
    });
    sec.appendChild(lafhaWrap);

    // Notes
    sec.appendChild(document.createElement("hr")).className="divider";
    const notesLbl=document.createElement("label");notesLbl.textContent="Notes / variations (optional)";notesLbl.style.marginBottom="6px";
    const notesIn=document.createElement("textarea");notesIn.placeholder="Any issues, variations or additional information...";
    notesIn.style.cssText="width:100%;min-height:60px;font-size:14px;font-family:inherit;resize:vertical;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;outline:none";
    sec.appendChild(notesLbl);sec.appendChild(notesIn);

    // Signature
    sec.appendChild(document.createElement("hr")).className="divider";
    const sigLbl=document.createElement("label");sigLbl.textContent="Your signature *";sigLbl.style.cssText="margin-bottom:6px;display:block";
    sec.appendChild(sigLbl);
    const sigWrap=document.createElement("div");sigWrap.className="sig-wrap";
    const canvas=document.createElement("canvas");canvas.className="sig-canvas";canvas.width=600;canvas.height=120;
    const clearBtn=document.createElement("button");clearBtn.className="sig-clear";clearBtn.textContent="Clear";
    sigWrap.appendChild(canvas);sigWrap.appendChild(clearBtn);
    sec.appendChild(sigWrap);
    sec.appendChild(Object.assign(document.createElement("p"),{className:"sig-hint",textContent:"Sign with finger or mouse"}));
    const sig=makeSigPad(canvas);
    clearBtn.onclick=()=>sig.clear();

    main.appendChild(sec);

    entries.push({
      personId:person.id,personName:person.name,role:person.role,
      startIn,endIn,notesIn,sig,
      getLunch:()=>lunchHrs,
      getTravel:()=>travelHrs,
      getLafha:()=>lafha
    });
  });

  // ── Submit ──────────────────────────────────────────────────────────
  const submitWrap=document.createElement("div");submitWrap.style.padding="4px 0 40px";
  const submitBtn=document.createElement("button");submitBtn.className="btn-p";submitBtn.textContent="Submit Timesheet";
  submitBtn.onclick=async()=>{
    // Validate all signatures
    for(const e of entries){
      if(e.sig.isEmpty()){alert(`${e.personName} — please sign before submitting.`);return;}
    }
    if(entries.length===0){alert("No crew to submit timesheet for.");return;}

    submitBtn.disabled=true;submitBtn.textContent="Submitting...";
    try{
      const timesheetData=entries.map(e=>({
        personId:e.personId,personName:e.personName,role:e.role,
        actualStart:e.startIn.value,actualEnd:e.endIn.value,
        lunchHrs:e.getLunch(),
        netHours:calcHours(e.startIn.value,e.endIn.value,e.getLunch()),
        travelHrs:e.getTravel(),
        lafha:e.getLafha(),
        notes:e.notesIn.value.trim(),
        signature:e.sig.toDataURL(),
        status:"pending"
      }));

      const ts={
        id:uid(),
        jobId:JOB_ID,shiftId:SHIFT_ID,
        jobName:job.name,jobNumber:job.jobNumber||"",jobPO:job.po||"",
        client:job.client||"",siteAddress:job.siteAddress||"",
        shiftDate:shift.date,shiftDay:shift.dayLabel,
        shiftStart:shift.startTime,shiftEnd:shift.endTime,
        submittedAt:new Date().toISOString(),
        status:"pending",
        entries:timesheetData
      };

      await uploadTimesheet(ts);
      document.getElementById("root").innerHTML="";
      const wrap=document.createElement("div");
      wrap.innerHTML=`
        <div class="header">
          <div class="header-logo"><svg width="28" height="28" viewBox="0 0 28 28"><rect width="28" height="28" rx="4" fill="rgba(255,255,255,.15)"/><text x="14" y="20" text-anchor="middle" fill="#fff" font-size="16" font-weight="800" font-family="Arial">T</text></svg></div>
          <div class="header-text"><h1>Taver Group</h1><p>Timesheet</p></div>
        </div>
        <div class="success-wrap">
          <div class="success-icon">✅</div>
          <h2>Timesheet Submitted</h2>
          <p>Your timesheet has been received by Taver Group.<br><br>
          <strong>${timesheetData.length} crew member${timesheetData.length!==1?"s":""}</strong> — ${shift.dayLabel} ${dateStr}<br>
          Reference: <strong>${ts.id.toUpperCase().slice(-6)}</strong></p>
        </div>`;
      document.getElementById("root").appendChild(wrap);
    }catch(e){
      console.error(e);
      submitBtn.disabled=false;submitBtn.textContent="Submit Timesheet";
      alert("Submission failed — check connection and try again.\n\n"+e.message);
    }
  };
  submitWrap.appendChild(submitBtn);
  main.appendChild(submitWrap);
}

boot();
</script>
