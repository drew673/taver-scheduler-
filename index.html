      // Drop target
      cell.addEventListener('dragover',e=>{e.preventDefault();cell.style.background='rgba(255,85,0,.1)';});
      cell.addEventListener('dragleave',()=>{cell.style.background=isToday?'rgba(255,85,0,.04)':'';});
      cell.addEventListener('drop',e=>{
        e.preventDefault();
        cell.style.background=isToday?'rgba(255,85,0,.04)':'';
        if(!dragData) return;
        // Can only drop on same date/shift
        if(dragData.dateStr!==dateStr){toast('Can only reassign within the same shift');return;}
        // Find the target shift
        const targetShifts=getShiftsForStaffDate(staff.name,dateStr);
        if(targetShifts.length>0){toast(staff.name+' is already on a shift this day');return;}
        // Reassign
        const {job,shift,pIdx}=dragData;
        const foundShift=job.shifts.find(s=>s.id===shift.id);
        if(foundShift){
          const oldName=foundShift.personnel[pIdx].name;
          foundShift.personnel[pIdx].name=staff.name;
          foundShift.personnel[pIdx].role=staff.role||foundShift.personnel[pIdx].role;
          foundShift.personnel[pIdx].phone=staff.phone||foundShift.personnel[pIdx].phone;
          saveData();
          pushJobToSupabase(job);
          toast(oldName+' → '+staff.name+' ✓');
          render();
        }
      });

      // Shift blocks
      const shifts=getShiftsForStaffDate(staff.name,dateStr);
      shifts.forEach(({job,shift,personnel,pIdx})=>{
        const block=el('div',{style:{
          background:'var(--acc-light)',border:'1px solid var(--bdr2)',
          borderLeft:'3px solid var(--acc)',borderRadius:4,
          padding:'3px 5px',marginBottom:2,cursor:'grab',
          fontSize:10,lineHeight:1.4
        }});
        block.setAttribute('draggable','true');
        block.addEventListener('dragstart',e=>{
          dragData={job,shift,personnel,pIdx,dateStr,staffName:staff.name};
          block.style.opacity='.5';
        });
        block.addEventListener('dragend',()=>{block.style.opacity='1';dragData=null;});

        if(cols<=7){
          block.innerHTML=`<div style="font-weight:700;color:var(--acc);font-size:9px">${job.jobNumber||''}</div>`+
            `<div style="color:var(--txt);font-weight:600;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${job.name}</div>`+
            `<div style="color:var(--mut);font-size:9px">${job.client||''}</div>`+
            `<div style="color:var(--mut);font-size:9px">${personnel.role||''}</div>`+
            `<div style="color:var(--acc);font-size:9px;font-weight:600">${shift.startTime}–${shift.endTime}</div>`;
        } else if(cols<=14){
          block.innerHTML=`<div style="font-weight:700;color:var(--acc);font-size:9px">${job.jobNumber||''}</div>`+
            `<div style="color:var(--txt);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${job.name}</div>`+
            `<div style="color:var(--acc);font-size:9px">${shift.startTime}–${shift.endTime}</div>`;
        } else {
          block.style.background='var(--acc)';
          block.style.borderLeft='none';
          block.innerHTML=`<div style="color:#fff;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${job.jobNumber||job.name.slice(0,6)}</div>`;
        }

        // Click for detail panel
        block.addEventListener('click',e=>{
          e.stopPropagation();
          showShiftDetailPanel({job,shift,personnel,pIdx});
        });

        cell.appendChild(block);
      });

      cellsWrap.appendChild(cell);
    }
    row.appendChild(cellsWrap);
    bodyWrap.appendChild(row);
  });

  if(allStaff.length===0){
    const empty=el('div',{style:{padding:32,textAlign:'center',color:'var(--mut)',fontSize:13}});
    empty.textContent='No staff allocated yet — add staff to jobs to see them here.';
    bodyWrap.appendChild(empty);
  }

  container.appendChild(bodyWrap);
  main.appendChild(container);

  // Legend
  const legend=el('div',{style:{display:'flex',gap:16,marginTop:10,flexWrap:'wrap',fontSize:11,color:'var(--mut)'}});
  legend.appendChild(el('span',{},'Drag shift blocks to reassign staff · Click for shift details'));
  main.appendChild(legend);
}

// ── Shift detail panel ────────────────────────────────────────────────
function showShiftDetailPanel({job,shift,personnel,pIdx}){
  modal('Shift Detail',(body,close)=>{
    // Job info
    const jobHdr=el('div',{style:{background:'var(--dk)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:14}});
    jobHdr.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--acc);letter-spacing:1px;margin-bottom:2px">${job.jobNumber||''}</div>`+
      `<div style="font-size:15px;font-weight:800;color:#fff;margin-bottom:2px">${job.name}</div>`+
      `${job.client?`<div style="font-size:12px;color:rgba(255,255,255,.5)">${job.client}</div>`:''}`+
      `${job.siteAddress?`<div style="font-size:12px;color:rgba(255,255,255,.5)">${job.siteAddress}</div>`:''}`;
    body.appendChild(jobHdr);

    // Shift info
    const shiftDate=new Date(shift.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    body.appendChild(el('div',{style:{fontSize:13,color:'var(--txt)',marginBottom:12}},
      `${shiftDate} · ${shift.startTime}–${shift.endTime}`));

    // Personnel slot
    const pCard=el('div',{style:{background:'var(--bg3)',border:'1px solid var(--bdr)',borderRadius:'var(--radius)',padding:'12px 14px',marginBottom:14}});
    const pTop=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}});
    const pInfo=el('div');
    pInfo.appendChild(el('div',{style:{fontSize:13,fontWeight:700,color:'var(--txt)'}},personnel.name||'TBA'));
    pInfo.appendChild(el('div',{style:{fontSize:12,color:'var(--mut)'}},personnel.role||''));
    pInfo.appendChild(el('div',{style:{fontSize:12,color:'var(--mut)'}},personnel.phone||''));
    pTop.appendChild(pInfo);

    // Reassign dropdown
    const reassignSel=el('select',{style:{fontSize:12,padding:'4px 8px',borderRadius:'var(--radius)',border:'1px solid var(--bdr)',background:'var(--bg2)',color:'var(--txt)'}});
    const defOpt=el('option',{value:''},'Reassign...');reassignSel.appendChild(defOpt);
    (state.staff||[]).sort((a,b)=>a.name.localeCompare(b.name)).forEach(s=>{
      const o=el('option',{value:s.name},s.name+(s.role?' ('+s.role+')':''));
      reassignSel.appendChild(o);
    });
    reassignSel.addEventListener('change',()=>{
      if(!reassignSel.value) return;
      const foundShift=job.shifts.find(s=>s.id===shift.id);
      if(foundShift&&foundShift.personnel[pIdx]){
        const newStaff=state.staff.find(s=>s.name===reassignSel.value);
        foundShift.personnel[pIdx].name=reassignSel.value;
        if(newStaff){foundShift.personnel[pIdx].role=newStaff.role||foundShift.personnel[pIdx].role;foundShift.personnel[pIdx].phone=newStaff.phone||foundShift.personnel[pIdx].phone;}
        saveData();pushJobToSupabase(job);
        close();render();
        toast('Reassigned to '+reassignSel.value+' ✓');
      }
    });
    pTop.appendChild(reassignSel);
    pCard.appendChild(pTop);
    body.appendChild(pCard);

    // Action buttons
    const actRow=el('div',{style:{display:'flex',gap:8}});
    actRow.appendChild(btn('Open Job','btn-s',()=>{close();state.selectedJobId=job.id;state.view='list';render();}));
    actRow.appendChild(btn('Close','btn-p',close));
    body.appendChild(actRow);
  });
}

function buildWeekGrid(week){
  const jobs=state.jobs.filter(j=>j.week===week);
  const scroll=el("div",{className:"week-grid-scroll"});
  const grid=el("div",{className:"week-grid"});

  // Header row — Mon to Sun
  const hdr=el("div",{className:"wg-header"});
  hdr.appendChild(el("div",{className:"wg-day-hdr",style:{fontSize:10,fontWeight:700,color:"var(--mut)",padding:"5px 8px"}},"Job"));
  DAY_OFF.forEach(d=>{
    const dd=getDayDate(week,d.o);
    const isToday=ds(dd)===todayDs();
    const isWeekend=(d.l==="Sat"||d.l==="Sun");
    const cell=el("div",{className:`wg-day-hdr${isToday?" today":""}`,style:{background:isWeekend&&!isToday?"rgba(0,0,0,.025)":""}});
    cell.innerHTML=`<span style="font-weight:${isWeekend?"800":"700"};color:${isToday?"var(--acc)":isWeekend?"var(--mid)":"var(--mut)"}">${d.l}</span><br><span style="font-size:9px;font-weight:400;color:${isToday?"var(--acc)":"var(--mut)"}">${fmt(dd)}</span>`;
    hdr.appendChild(cell);
  });
  grid.appendChild(hdr);

  if(jobs.length===0){
    const g=el("div",{style:{gridColumn:"1/-1",padding:"18px",textAlign:"center",color:"var(--mut)",fontSize:12,background:"var(--bg3)",borderRadius:"var(--radius)"}});
    g.textContent="No jobs this week";
    const wrap=el("div",{style:{display:"grid",gridTemplateColumns:"90px repeat(7,1fr)",gap:2}});
    wrap.appendChild(el("div"));wrap.appendChild(g);
    grid.appendChild(wrap);
  }else{
    jobs.forEach(job=>{
      const row=el("div",{className:"wg-row"});

      // Job label cell
      const nc=el("div",{className:"wg-job-label",onClick:()=>{state.selectedJobId=job.id;render();},style:{flexDirection:"column",alignItems:"flex-start",gap:2,padding:"6px 7px"}});
      const jobBar=el("div",{style:{display:"flex",alignItems:"center",gap:5,width:"100%"}});
      jobBar.appendChild(el("div",{style:{width:3,height:"100%",minHeight:14,borderRadius:2,background:job.color,flexShrink:0,alignSelf:"stretch"}}));
      const jobNameEl=el("span",{style:{fontSize:10,fontWeight:800,color:job.color,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}},job.name);
      jobBar.appendChild(jobNameEl);
      nc.appendChild(jobBar);
      if(job.po){nc.appendChild(el("span",{style:{fontSize:9,color:"var(--mut)",marginLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:"100%"}},job.po));}
      if(job.client){nc.appendChild(el("span",{style:{fontSize:9,color:"var(--mut)",marginLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",width:"100%"}},job.client));}
      row.appendChild(nc);

      DAY_OFF.forEach(d=>{
        const dd=getDayDate(week,d.o);
        const dayS=ds(dd);
        const shifts=(job.shifts||[]).filter(s=>s.date===dayS);
        const isWeekend=(d.l==="Sat"||d.l==="Sun");
        const cell=el("div",{className:"wg-cell",style:{background:isWeekend?"rgba(45,90,61,.04)":"var(--bg3)",minHeight:56}});

        if(shifts.length===0){
          // empty day — subtle dot
          const dot=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",minHeight:50}});
          dot.appendChild(el("div",{style:{width:5,height:5,borderRadius:"50%",background:"var(--bdr)"}}));
          cell.appendChild(dot);
        }else{
          shifts.forEach(shift=>{
            const filledPax=(shift.personnel||[]).filter(p=>p.name).length;
            const totalPax=(shift.personnel||[]).length;
            const unfilledPax=totalPax-filledPax;
            const conflictCount=(shift.personnel||[]).filter(p=>p.name&&checkPersonConflicts(p.name,shift.date,job.id).length>0).length;
            const hasConflict=conflictCount>0;
            const pct=totalPax>0?Math.round((filledPax/totalPax)*100):0;
            const barColor=pct===100?"var(--green)":pct>=60?"var(--amber)":"var(--danger)";

            const chip=el("div",{className:"wg-chip",
              style:{background:hasConflict?"#fff8e1":job.color+"14",border:`1px solid ${hasConflict?"#f9a825":job.color+"55"}`,marginBottom:2,cursor:"pointer"},
              onClick:()=>{state.selectedJobId=job.id;render();}});
            chip.addEventListener("mouseenter",()=>chip.style.background=hasConflict?"#fff3e0":job.color+"28");
            chip.addEventListener("mouseleave",()=>chip.style.background=hasConflict?"#fff8e1":job.color+"14");

            // Shift time + conflict flag
            const topLine=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4,marginBottom:2}});
            topLine.appendChild(el("span",{style:{fontSize:10,fontWeight:800,color:job.color,whiteSpace:"nowrap"}},`${shift.startTime}–${shift.endTime}`));
            if(hasConflict) topLine.appendChild(el("span",{style:{fontSize:9,color:"#c07a00",fontWeight:700}},"⚠"));
            chip.appendChild(topLine);

            // Job name + status badge
            const nameLine=el("div",{style:{display:"flex",alignItems:"center",gap:4,marginBottom:2,justifyContent:"space-between"}});
            const jNameSpan=el("span",{style:{fontSize:10,fontWeight:700,color:"var(--txt)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}});
            jNameSpan.textContent=(job.jobNumber?job.jobNumber+" ":"")+job.name;
            nameLine.appendChild(jNameSpan);
            const st=getStatus(job);
            const stBadge=el("span",{style:{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,background:st.bg,color:st.color,border:"1px solid "+st.border,flexShrink:0,whiteSpace:"nowrap"}},st.label);
            nameLine.appendChild(stBadge);
            chip.appendChild(nameLine);

            // Pax summary line
            const paxLine=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:3,marginBottom:3}});
            const paxLeft=el("span",{style:{fontSize:9,color:"var(--txt2)"}});
            paxLeft.innerHTML=`<span style="font-weight:700;color:var(--txt)">${filledPax}</span>/${totalPax} pax`;
            paxLine.appendChild(paxLeft);
            if(unfilledPax>0){
              paxLine.appendChild(el("span",{style:{fontSize:9,color:"var(--danger)",fontWeight:700}},`${unfilledPax} TBA`));
            }
            chip.appendChild(paxLine);

            // Staffing bar
            if(totalPax>0){
              const bar=el("div",{style:{height:3,background:"var(--bg3)",borderRadius:2,overflow:"hidden",marginBottom:4}});
              bar.appendChild(el("div",{style:{height:"100%",width:pct+"%",background:barColor,borderRadius:2}}));
              chip.appendChild(bar);
            }

            // Role summary — first 4 named people
            const namedCrew=(shift.personnel||[]).filter(p=>p.name).slice(0,4);
            if(namedCrew.length>0){
              const crewDiv=el("div",{style:{display:"flex",flexDirection:"column",gap:1,borderTop:"1px solid "+job.color+"22",paddingTop:3,marginTop:1}});
              namedCrew.forEach(p=>{
                const prow=el("div",{style:{display:"flex",alignItems:"center",gap:3,overflow:"hidden"}});
                prow.appendChild(el("div",{style:{width:4,height:4,borderRadius:"50%",background:job.color,flexShrink:0}}));
                const ptext=el("span",{style:{fontSize:9,color:"var(--txt2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});
                ptext.textContent=p.name;
                prow.appendChild(ptext);
                crewDiv.appendChild(prow);
              });
              if((shift.personnel||[]).filter(p=>p.name).length>4){
                crewDiv.appendChild(el("span",{style:{fontSize:9,color:"var(--mut)",paddingLeft:7}},`+${(shift.personnel||[]).filter(p=>p.name).length-4} more`));
              }
              chip.appendChild(crewDiv);
            }

            // TBA slots list (unnamed)
            const tbaRoles=(shift.personnel||[]).filter(p=>!p.name).slice(0,3);
            if(tbaRoles.length>0){
              const tbaDiv=el("div",{style:{display:"flex",flexDirection:"column",gap:1,borderTop:"1px solid var(--bdr)",paddingTop:3,marginTop:1}});
              tbaRoles.forEach(p=>{
                const prow=el("div",{style:{display:"flex",alignItems:"center",gap:3}});
                prow.appendChild(el("div",{style:{width:4,height:4,borderRadius:"50%",background:"var(--bdr2)",flexShrink:0}}));
                prow.appendChild(el("span",{style:{fontSize:9,color:"var(--mut)",fontStyle:"italic"}},p.role+" — TBA"));
                tbaDiv.appendChild(prow);
              });
              if((shift.personnel||[]).filter(p=>!p.name).length>3){
                tbaDiv.appendChild(el("span",{style:{fontSize:9,color:"var(--mut)",paddingLeft:7}},`+${(shift.personnel||[]).filter(p=>!p.name).length-3} more TBA`));
              }
              chip.appendChild(tbaDiv);
            }

            cell.appendChild(chip);
          });
        }
        row.appendChild(cell);
      });
      grid.appendChild(row);
    });
  }
  scroll.appendChild(grid);return scroll;
}

function buildJobDetail(job){
  const wrap=el("div",{style:{padding:18}});
  const topRow=el("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18,gap:12,flexWrap:"wrap"}});
  const info=el("div",{style:{flex:1}});
  const tr=el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}});
  tr.appendChild(el("div",{style:{width:14,height:14,borderRadius:"50%",background:job.color,flexShrink:0}}));
  if(job.jobNumber)tr.appendChild(badge(job.jobNumber,"var(--mid)"));
  tr.appendChild(el("span",{style:{fontSize:19,fontWeight:700,color:"var(--txt)"}},job.name));
  tr.appendChild(badge(weLabel(job.week),job.color));
  tr.appendChild(statusBadge(job));
  const totalPax=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.length||0),0);
  const filled=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.filter(p=>p.name).length||0),0);
  const mr=el("div",{style:{fontSize:12,color:"var(--mut)",display:"flex",gap:12,flexWrap:"wrap",marginTop:4}});

  if(job.po)mr.appendChild(el("span",{},"PO: "+job.po));
  if(job.client)mr.appendChild(el("span",{},"Client: "+job.client));
  if(job.clientContact){
    const cc=job.clientContact+(job.clientPhone?" — "+job.clientPhone:"");
    mr.appendChild(el("span",{},"Client contact: "+cc));
  }
  mr.appendChild(el("span",{},(job.shifts||[]).length+" shifts · "+totalPax+" slots · "+filled+" filled"));
  if(job.siteAddress){
    const ar=el("div",{style:{marginTop:4}});
    ar.appendChild(el("span",{style:{fontSize:12,color:"var(--mut)"}},"📍 "+job.siteAddress));
    if(job.mapLink)ar.appendChild(el("a",{href:job.mapLink,target:"_blank",style:{color:"var(--acc)",marginLeft:8,fontSize:12}},"Map ↗"));
    info.appendChild(tr);info.appendChild(mr);info.appendChild(ar);
  }else{info.appendChild(tr);info.appendChild(mr);}
  const br=el("div",{style:{display:"flex",gap:8,flexWrap:"wrap",flexShrink:0}});
  br.appendChild(btn("Edit","btn-s btn-sm",()=>modal("Edit Job",(b,close)=>buildJobForm(job,d=>updateJob(job.id,d),close)(b))));
  br.appendChild(btn("Clone Job","btn-s btn-sm",()=>showCloneJobModal(job)));
  br.appendChild(btn("Export PDF","btn-s btn-sm",()=>exportJobPDF(job)));
  br.appendChild(btn("📧 / 💬 Send","btn-s btn-sm",()=>showExportModal(job)));
  br.appendChild(btn("📤 Request Resources","btn-s btn-sm",()=>showResourceRequestModal(job)));
  topRow.appendChild(info);topRow.appendChild(br);
  // Status selector row
  const statusRow=el("div",{style:{marginBottom:16}});
  statusRow.appendChild(el("div",{style:{fontSize:11,fontWeight:700,color:"var(--mut)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:8}},"Job Status"));
  const statusSel=el("div",{className:"status-selector"});
  JOB_STATUSES.forEach(s=>{
    const isSelected=(job.status||"confirmed")===s.id;
    const opt=el("div",{
      className:"status-opt"+(isSelected?" selected":""),
      style:{background:s.bg,color:s.color,borderColor:isSelected?"var(--dk)":s.border},
      onClick:()=>{
        updateJob(job.id,{status:s.id});
        toast("Status updated to "+s.label);
      }
    },s.label);
    statusSel.appendChild(opt);
  });
  statusRow.appendChild(statusSel);
  wrap.appendChild(topRow);wrap.appendChild(statusRow);

  (job.shifts||[]).forEach(shift=>{
    const card=el("div",{className:"card"});
    const hdr=el("div",{className:"card-hdr",style:{background:job.color+"14"}});
    const hl=el("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flex:1}});
    hl.appendChild(el("span",{style:{fontWeight:700,fontSize:13,color:"var(--txt)"}},shift.dayLabel+" "+fmtFull(new Date(shift.date+"T12:00:00"))));
    hl.appendChild(badge(`${shift.startTime}–${shift.endTime}`,job.color));
    hl.appendChild(el("span",{style:{fontSize:12,color:"var(--mut)"}},shift.personnel.length+" pax"));
    const hr2=el("div",{style:{display:"flex",gap:5,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}});
    hr2.appendChild(btn("Edit","btn-g btn-xs",()=>modal("Edit Shift",(b,close)=>buildShiftForm(shift,d=>updateShift(job.id,shift.id,d),close)(b))));
    hr2.appendChild(btn("Clone","btn-g btn-xs",()=>showCloneShiftModal(job,shift)));
    hr2.appendChild(btn("Send","btn-g btn-xs",()=>showExportModal(job)));
    hr2.appendChild(btn("Remove","btn-d btn-xs",()=>{if(confirm("Remove shift?"))deleteShift(job.id,shift.id);}));
    hdr.appendChild(hl);hdr.appendChild(hr2);
    // Second row — docket actions always visible
    const hr3=el("div",{style:{display:"flex",gap:6,padding:"6px 14px 8px",borderTop:"1px solid "+job.color+"22",background:job.color+"08",flexWrap:"wrap"}});
    hr3.appendChild(btn("📋 Create Docket","btn-docket btn-sm",()=>showDocketModal(job,shift)));
    hr3.appendChild(btn("🔗 Share Docket Link","btn-s btn-sm",()=>{
      const url=`${window.location.origin}/docket.html?job=${job.id}&shift=${shift.id}`;
      navigator.clipboard.writeText(url)
        .then(()=>toast("Docket link copied — paste into SMS or WhatsApp",3000))
        .catch(()=>{prompt("Copy this link and send to staff:",url);});
    }));
    hr3.appendChild(btn("⏱ Share Timesheet Link","btn-s btn-sm",()=>{
      const url=`${window.location.origin}/timesheet.html?job=${job.id}&shift=${shift.id}`;
      navigator.clipboard.writeText(url)
        .then(()=>toast("Timesheet link copied — send to crew the day before",3000))
        .catch(()=>{prompt("Copy this timesheet link:",url);});
    }));
    card.appendChild(hdr);card.appendChild(hr3);
    // Timesheet status badge on shift card
    const pendingTS=(state.timesheets||[]).filter(t=>t.shiftId===shift.id&&t.status==="pending").length;
    const approvedTS=(state.timesheets||[]).filter(t=>t.shiftId===shift.id&&t.status==="approved").length;
    if(pendingTS>0||approvedTS>0){
      const tsBar=el("div",{style:{padding:"5px 14px",background:"#fff8e1",borderBottom:"1px solid var(--bdr)",fontSize:12,display:"flex",gap:10,alignItems:"center"}});
      if(pendingTS>0)tsBar.appendChild(el("span",{style:{color:"#c07a00",fontWeight:700}},"⏱ "+pendingTS+" timesheet"+(pendingTS!==1?"s":"")+" pending review"));
      if(approvedTS>0)tsBar.appendChild(el("span",{style:{color:"var(--green)",fontWeight:700}},"✓ "+approvedTS+" approved"));
      card.appendChild(tsBar);
    }
    const bd=el("div",{className:"card-body"});
    if(shift.personnel.length===0)bd.appendChild(el("div",{style:{color:"var(--mut)",fontSize:12,fontStyle:"italic",marginBottom:10}},"No personnel assigned yet"));
    shift.personnel.forEach(p=>{
      // Check conflicts and confirmation status
      const clashes=p.name?checkPersonConflicts(p.name,shift.date,job.id):[];
      const confStatus=p.name?getConfirmationStatus(shift.id,p.name):"pending";
      const confColor=confStatus==="confirmed"?"var(--green)":confStatus==="declined"?"var(--danger)":"var(--amber)";
      const confBg=confStatus==="confirmed"?"#f0faf2":confStatus==="declined"?"#fdf0f0":"#fffbf0";

// Dockets stored in state.dockets: [{id, jobId, shiftId, ...}]
// Already included in saveData via state object

function generateDocketNumber(job){
  // Format: TG-001-D001 (job number + docket sequence)
  const jobNum=(job.jobNumber||"TG-000").replace("TG-","");
  const existing=(state.dockets||[]).filter(d=>d.jobId===job.id).length;
  const seq=String(existing+1).padStart(3,"0");
  return `TG-${jobNum}-D${seq}`;
}

async function saveDocketToSupabase(docket){
  const blob=new Blob([JSON.stringify(docket)],{type:"application/json"});
  const res=await fetch(`${SB_URL}/storage/v1/object/dockets/${docket.id}.json`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
    body:blob
  });
  if(!res.ok){
    const t=await res.text();
    throw new Error(`Docket upload failed ${res.status}: ${t}`);
  }
  console.log("Docket saved to Supabase:",docket.id);
}

async function loadDocketsFromSupabase(){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/dockets`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({limit:1000,offset:0,prefix:"",sortBy:{column:"created_at",order:"desc"}})
    });
    if(!r.ok){console.warn("Docket list failed:",r.status);return;}
    const files=await r.json();
    if(!files||!Array.isArray(files)){return;}
    const dockets=[];
    // Fetch all in parallel for speed
    await Promise.all(files.map(async f=>{
      try{
        const dr=await fetch(`${SB_URL}/storage/v1/object/public/dockets/${f.name}?t=${Date.now()}`);
        if(dr.ok){const d=await dr.json();if(d&&d.id)dockets.push(d);}
      }catch(e){console.warn("Failed to fetch docket:",f.name,e);}
    }));
    // Sort newest first
    dockets.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
    state.dockets=dockets;
    saveLocalBackup();
    console.log("Loaded",dockets.length,"dockets from Supabase");
  }catch(e){console.error("loadDockets error:",e);}
}

function makeSigPad(canvasEl){
  const ctx=canvasEl.getContext("2d");
  // White background so JPEG compression doesn't show black
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,canvasEl.width,canvasEl.height);
  let drawing=false,lx=0,ly=0;
  function pos(e){
    const r=canvasEl.getBoundingClientRect();
    const scaleX=canvasEl.width/r.width,scaleY=canvasEl.height/r.height;
    if(e.touches){return{x:(e.touches[0].clientX-r.left)*scaleX,y:(e.touches[0].clientY-r.top)*scaleY};}
    return{x:(e.clientX-r.left)*scaleX,y:(e.clientY-r.top)*scaleY};
  }
  canvasEl.addEventListener("mousedown",e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
  canvasEl.addEventListener("mousemove",e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;});
  canvasEl.addEventListener("mouseup",()=>drawing=false);
  canvasEl.addEventListener("mouseleave",()=>drawing=false);
  canvasEl.addEventListener("touchstart",e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  canvasEl.addEventListener("touchmove",e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.strokeStyle="#111";ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvasEl.addEventListener("touchend",()=>drawing=false);
  return{
    clear:()=>ctx.clearRect(0,0,canvasEl.width,canvasEl.height),
    isEmpty:()=>{const d=ctx.getImageData(0,0,canvasEl.width,canvasEl.height).data;return !d.some(v=>v!==0);},
    toDataURL:()=>canvasEl.toDataURL("image/png")
  };
}

function buildDocketHistory(job, container){
  const jobDockets=(state.dockets||[]).filter(d=>d.jobId===job.id)
    .sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  if(jobDockets.length===0){
    const emptyMsg=el("div",{style:{fontSize:12,color:"var(--mut)",fontStyle:"italic",padding:"8px 0"}});
    emptyMsg.textContent="No dockets for this job yet — share a docket link from a shift or create one above";
    container.appendChild(emptyMsg);
    return;
  }
  jobDockets.forEach(d=>{
    const row=el("div",{className:"docket-history-item"});
    const info=el("div",{style:{flex:1,minWidth:0}});
    info.appendChild(el("div",{style:{fontWeight:700,fontSize:13,color:"var(--txt)"}},
      `${d.shiftDay||""} ${d.shiftDate?fmtFull(new Date(d.shiftDate+"T12:00:00")):"—"} — Docket #${(d.id||"").toUpperCase().slice(-6)}`));
    const meta=el("div",{style:{fontSize:11,color:"var(--mut)",marginTop:2,display:"flex",gap:10,flexWrap:"wrap"}});
    // Support both hours (internal) and hoursNet (staff link)
    const totalH=(d.crewHours||[]).reduce((a,c)=>a+(c.hoursNet||c.hours||0),0);
    meta.appendChild(el("span",{},totalH.toFixed(1)+" hrs"));
    if(d.travelHours) meta.appendChild(el("span",{},`Travel: ${d.travelHours} hrs`));
    if(d.lafha) meta.appendChild(el("span",{},`LAFHA: ${d.lafha} days`));
    if(d.clientRepName) meta.appendChild(el("span",{},`Signed: ${d.clientRepName}`));
    if(d.submittedFrom==="staff-link") meta.appendChild(el("span",{style:{color:"var(--mid)",fontWeight:700}},"via staff link"));
    meta.appendChild(el("span",{style:{color:d.clientSigData?"var(--green)":"var(--danger)",fontWeight:700}},d.clientSigData?"✓ Client signed":"✗ Unsigned"));
    info.appendChild(meta);
    row.appendChild(info);
    const acts=el("div",{style:{display:"flex",gap:6,flexShrink:0}});
    const shift=(job.shifts||[]).find(s=>s.id===d.shiftId)||{date:d.shiftDate,dayLabel:d.shiftDay,startTime:d.shiftStart,endTime:d.shiftEnd,personnel:[]};
    acts.appendChild(btn("View PDF","btn-s btn-sm",()=>exportDocketPDF(d,job,shift)));
    acts.appendChild(btn("✕","btn-d btn-xs",()=>{
      if(!confirm("Delete this docket?"))return;
      fetch(`${SB_URL}/storage/v1/object/dockets/${d.id}.json`,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}}).catch(()=>{});
      state.dockets=state.dockets.filter(x=>x.id!==d.id);
      saveData();container.innerHTML="";buildDocketHistory(job,container);
    }));
    row.appendChild(acts);
    container.appendChild(row);
  });
}

// Sync any named person from any shift into the staff directory
function syncStaffFromJobs(){
  state.jobs.forEach(job=>{
    (job.shifts||[]).forEach(shift=>{
      (shift.personnel||[]).forEach(p=>{
        if(!p.name||!p.name.trim()) return;
        const key=p.name.trim().toLowerCase();
        const existing=state.staff.find(s=>s.name.trim().toLowerCase()===key);
        if(!existing){
          // Add new staff member from shift data
          state.staff.push({
            id:uid(),
            name:p.name.trim(),
            phone:p.phone||"",
            company:p.company||"Taver Group",
            role:p.role||"",
            riw:p.riw||false,
            riwNumber:p.riwNumber||"",
            notes:"",
            addedFrom:"shift",
          });
        } else {
          // Update phone/riw if we now have better info
          if(p.phone&&!existing.phone) existing.phone=p.phone;
          if(p.riwNumber&&!existing.riwNumber) existing.riwNumber=p.riwNumber;
          if(p.riw&&!existing.riw) existing.riw=p.riw;
        }
      });
    });
  });
}

function buildStaffView(main){

  // Header row with search + add button
  const hdrRow=el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}});

  hdrRow.appendChild(searchInput);
  hdrRow.appendChild(btn("✉️ Invite","btn-s btn-sm",()=>{
    modal("Invite Staff to Portal",(body,close)=>{
      body.appendChild(el("div",{style:{fontSize:13,color:"var(--mut)",marginBottom:14,lineHeight:1.6}},
        "Enter the staff member's email. They'll receive a magic link to sign into the staff portal where they can view their shifts and timesheets."));
      const emailInput=el("input",{type:"email",placeholder:"staff@email.com"});
      body.appendChild(field("Email address",emailInput));
      const nameInput=el("input",{type:"text",placeholder:"e.g. Drew Little"});
      body.appendChild(field("Full name (to match their shifts)",nameInput));
      const msgEl=el("div",{style:{fontSize:13,marginTop:10,minHeight:18,fontWeight:600}});
      body.appendChild(msgEl);
      const row=el("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}});
      row.appendChild(btn("Cancel","btn-s",close));
      const sendBtn=btn("Send Invite","btn-p",async()=>{
        const email=emailInput.value.trim();
        if(!email||!email.includes("@")){emailInput.focus();return;}
        sendBtn.disabled=true;sendBtn.textContent="Sending...";
        try{
          const res=await sbAuthPost("magiclink",{email,options:{emailRedirectTo:"https://taverscheduler.pages.dev/staff.html"}});
          if(res.error){
            msgEl.style.color="var(--danger)";msgEl.textContent="Failed: "+res.error.message;
            sendBtn.disabled=false;sendBtn.textContent="Send Invite";
          } else {
            msgEl.style.color="var(--green)";
            msgEl.textContent="✓ Invite sent to "+email;
            sendBtn.textContent="Sent!";
            toast("Staff portal invite sent to "+email);
          }
        }catch(e){
          msgEl.style.color="var(--danger)";msgEl.textContent="Connection error — try again";
          sendBtn.disabled=false;sendBtn.textContent="Send Invite";
        }
      });
      row.appendChild(sendBtn);body.appendChild(row);emailInput.focus();
    });
  }));
  hdrRow.appendChild(btn("+ Add Staff","btn-p btn-sm",()=>modal("Add Staff Member",(b,close)=>buildStaffForm(null,data=>{
    const ns={id:uid(),addedFrom:"manual",...data};state.staff.push(ns);
    saveData();render();toast("Staff member added");pushStaffToSupabase(ns).then(()=>updateSyncDot());
  },close)(b))));
  main.appendChild(hdrRow);

  // Stats strip
  const statStrip=el("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}});
  const riwCount=sorted.filter(s=>s.riw).length;
  const companies=[...new Set(sorted.map(s=>s.company).filter(Boolean))];
  [
    {l:"Total staff",v:sorted.length,c:"var(--mid)"},
    {l:"RIW certified",v:riwCount,c:"var(--green)"},
    {l:"Companies",v:companies.length,c:"var(--blue)"},
  ].forEach(s=>{
    const c=el("div",{className:"stat",style:{minWidth:90}});
    c.appendChild(el("div",{className:"stat-val",style:{color:s.c}},String(s.v)));
    c.appendChild(el("div",{className:"stat-lbl"},s.l));
    statStrip.appendChild(c);
  });
  main.appendChild(statStrip);

  if(sorted.length===0){
    const empty=el("div",{className:"empty"});
    empty.innerHTML=`<div style="font-size:32px;margin-bottom:12px">👷</div>Staff are added automatically when you assign named crew to shifts.<br>You can also add staff manually using the button above.`;
    main.appendChild(empty);
    return;
  }

  // Filterable list
  const listWrap=el("div");
  main.appendChild(listWrap);

  function renderList(filter){
    listWrap.innerHTML="";
    const q=(filter||"").toLowerCase().trim();
    const filtered=sorted.filter(s=>
      !q||s.name.toLowerCase().includes(q)||
      (s.role||"").toLowerCase().includes(q)||
      (s.company||"").toLowerCase().includes(q)||
      (s.phone||"").includes(q)
    );

    if(filtered.length===0){
      listWrap.appendChild(el("div",{className:"empty"},"No staff match your search."));
      return;
    }

    filtered.forEach(person=>{
      // Count how many shifts this person appears in
      let shiftCount=0;
      state.jobs.forEach(j=>(j.shifts||[]).forEach(s=>{
        if((s.personnel||[]).some(p=>p.name&&p.name.trim().toLowerCase()===person.name.trim().toLowerCase())) shiftCount++;
      }));

      const card=el("div",{className:"staff-card"});

      // Avatar

      av.style.background=person.riw?"var(--mid)":"var(--mut)";
      av.textContent=person.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();

      nameRow.appendChild(el("span",{className:"badge",style:{background:"var(--acc-light)",color:"var(--mid)",border:"1px solid var(--bdr2)",fontSize:10}},person.role||"No role"));
      if(person.employmentType&&person.employmentType!=="Employee") nameRow.appendChild(el("span",{className:"badge",style:{background:"var(--bg3)",color:"var(--mut)",border:"1px solid var(--bdr)",fontSize:10}},person.employmentType));
      if(person.riw) nameRow.appendChild(el("span",{className:"badge",style:{background:"var(--green-bg)",color:"var(--green)",border:"1px solid #a8d8b0",fontSize:10}},person.riwNumber?"RIW — "+person.riwNumber:"RIW ✓"));
      if(person.riwExpiry){
        const exp=new Date(person.riwExpiry);const now=new Date();const daysLeft=Math.floor((exp-now)/86400000);
        if(daysLeft<90) nameRow.appendChild(el("span",{className:"badge",style:{background:daysLeft<30?"var(--danger-bg)":"var(--amber-bg)",color:daysLeft<30?"var(--danger)":"var(--amber)",border:`1px solid ${daysLeft<30?"#f5c6c2":"#f0d080"}`,fontSize:10}},`RIW exp ${exp.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"2-digit"})}`));
      }
      info.appendChild(nameRow);

      const meta=el("div",{className:"staff-meta"});
      if(person.company) meta.appendChild(el("span",{},person.company));
      if(person.phone) meta.appendChild(el("span",{},`📞 ${person.phone}`));
      if(person.email) meta.appendChild(el("span",{},`✉ ${person.email}`));
      if(person.licences) meta.appendChild(el("span",{},`🪪 ${person.licences}`));
      if(shiftCount>0) meta.appendChild(el("span",{},`📅 ${shiftCount} shift${shiftCount!==1?"s":""}`));
      if(person.ecName) meta.appendChild(el("span",{style:{color:"var(--danger)",fontSize:11}},`🆘 ${person.ecName}${person.ecPhone?" "+person.ecPhone:""}`));
      if(person.notes) meta.appendChild(el("span",{style:{fontStyle:"italic"}},person.notes));
      info.appendChild(meta);
      card.appendChild(info);

      // Actions
      const acts=el("div",{className:"staff-actions"});

      // WhatsApp / SMS quick send
      if(person.phone){
        const phone=person.phone.replace(/\s+/g,"");
        const waPhone=phone.startsWith("0")?"61"+phone.slice(1):phone.replace(/^\+/,"");
        acts.appendChild(btn("WA","btn-wa btn-xs",()=>window.open(`https://wa.me/${waPhone}`)));
        acts.appendChild(btn("SMS","btn-sms btn-xs",()=>window.open(`sms:${phone}`)));
      }
      acts.appendChild(btn("Edit","btn-s btn-xs",()=>modal("Edit Staff Member",(b,close)=>buildStaffForm(person,data=>{
        Object.assign(person,data);saveData();render();toast("Updated");pushStaffToSupabase(person).then(()=>updateSyncDot());
      },close)(b))));
      acts.appendChild(btn("✕","btn-d btn-xs",()=>{
        if(!confirm(`Remove ${person.name} from staff directory?`))return;
        deleteStaffFromSupabase(person.id);state.staff=state.staff.filter(s=>s.id!==person.id);
        saveData();render();toast("Removed from directory");
      }));
      card.appendChild(acts);
      listWrap.appendChild(card);
    });
  }

  searchInput.addEventListener("input",()=>renderList(searchInput.value));
  renderList("");
}

      // Week

function exportJobLogCSV(){
  const sorted=[...state.jobs].sort((a,b)=>{
    const na=parseInt((a.jobNumber||"0").replace(/\D/g,""))||0;
    const nb=parseInt((b.jobNumber||"0").replace(/\D/g,""))||0;
    return na-nb;
  });
  const rows=[["Job No.","Job Name","Status","Client","PO","Site Address","Map Link","Week","Shifts","Total Slots","Filled","Created"]];
  sorted.forEach(job=>{
    const totalPax=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.length||0),0);
    const filled=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.filter(p=>p.name).length||0),0);
    rows.push([
      job.jobNumber||"",job.name||"",getStatus(job).label,job.client||"",job.po||"",
      job.siteAddress||"",job.mapLink||"",weLabel(job.week),
      job.shifts?.length||0,totalPax,filled,
      job.createdAt?new Date(job.createdAt).toLocaleDateString("en-AU"):""
    ]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`taver-job-log-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast("Job log exported");
}

// ── Timesheets ────────────────────────────────────────────────────────
async function loadTimesheetsFromSupabase(){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/timesheets`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({limit:1000,offset:0,prefix:"",sortBy:{column:"created_at",order:"desc"}})
    });
    if(!r.ok){
      console.warn("Timesheets list failed:",r.status);
      return;
    }
    const files=await r.json();
    if(!files||!Array.isArray(files)||files.length===0){
      console.log("No timesheet files found");
      state.timesheets=[];
      return;
    }
    console.log("Found",files.length,"timesheet files:",files.map(f=>f.name));
    const timesheets=[];
    await Promise.all(files.map(async f=>{
      try{
        const url=`${SB_URL}/storage/v1/object/public/timesheets/${f.name}`;
        const dr=await fetch(url);
        if(dr.ok){
          const d=await dr.json();
          if(d&&d.id){timesheets.push(d);}
          else console.warn("Invalid timesheet data in",f.name);
        } else {
          console.warn("Failed to fetch",f.name,"status:",dr.status);
        }
      }catch(e){console.warn("Error fetching timesheet:",f.name,e);}
    }));
    timesheets.sort((a,b)=>(b.submittedAt||"").localeCompare(a.submittedAt||""));
    state.timesheets=timesheets;
    saveLocalBackup();
    console.log("Loaded",timesheets.length,"timesheets into state");
  }catch(e){console.error("loadTimesheets error:",e);}
}

async function updateTimesheetStatus(ts, status){
  ts.status=status;
  ts.reviewedAt=new Date().toISOString();
  // Update entries status too
  if(ts.entries)ts.entries.forEach(e=>e.status=status);
  // Re-upload updated JSON
  try{
    const blob=new Blob([JSON.stringify(ts)],{type:"application/json"});
    await fetch(`${SB_URL}/storage/v1/object/timesheets/${ts.id}.json`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
      body:blob
    });
  }catch(e){console.error("updateTimesheetStatus error:",e);}
  saveLocalBackup();
  render();
  toast(status==="approved"?"Timesheet approved ✓":"Timesheet rejected");
}

function exportTimesheetsCSV(timesheets){
  const rows=[["Ref","Job","Job No.","Client","Site","Shift Date","Shift Day","Scheduled Start","Scheduled End","Person","Role","Actual Start","Actual End","Net Hours","Lunch Hrs","Travel Hrs","LAFHA","Notes","Status","Submitted"]];
  timesheets.forEach(ts=>{
    (ts.entries||[]).forEach(e=>{
      rows.push([
        ts.id.toUpperCase().slice(-6),
        ts.jobName||"",ts.jobNumber||"",ts.client||"",ts.siteAddress||"",
        ts.shiftDate||"",ts.shiftDay||"",ts.shiftStart||"",ts.shiftEnd||"",
        e.personName||"",e.role||"",
        e.actualStart||"",e.actualEnd||"",
        e.netHours||0,e.lunchHrs||0,e.travelHrs||0,e.lafha||0,
        (e.notes||"").replace(/\n/g," "),
        ts.status||"pending",
        ts.submittedAt?new Date(ts.submittedAt).toLocaleDateString("en-AU"):""
      ]);
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`taver-timesheets-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast("Timesheets exported");
}

function buildTimesheetCard(ts, main){
  const statusColor=ts.status==="approved"?"var(--green)":ts.status==="rejected"?"var(--danger)":"var(--amber)";
  const statusBg=ts.status==="approved"?"var(--green-bg)":ts.status==="rejected"?"var(--danger-bg)":"#fff8e1";
  const statusLabel=ts.status==="approved"?"✓ Approved":ts.status==="rejected"?"✕ Rejected":"⏱ Pending";
  const totalNet=(ts.entries||[]).reduce((a,e)=>a+(e.netHours||0),0);
  const totalTravel=(ts.entries||[]).reduce((a,e)=>a+(e.travelHrs||0),0);
  const submittedDate=ts.submittedAt?new Date(ts.submittedAt).toLocaleString("en-AU",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—";

  const card=el("div",{className:"card",style:{marginBottom:10}});

  ctop.appendChild(el("span",{style:{fontSize:12,color:"var(--mut)"}},`${ts.shiftStart}–${ts.shiftEnd}`));
  ctop.appendChild(el("span",{className:"badge",style:{background:statusBg,color:statusColor,border:`1px solid ${statusColor}44`}},statusLabel));
  const cmeta=el("div",{style:{fontSize:12,color:"var(--mut)",marginTop:3,display:"flex",gap:12,flexWrap:"wrap"}});
  cmeta.appendChild(el("span",{},ts.jobName+(ts.jobNumber?" ("+ts.jobNumber+")":"")));
  if(ts.client)cmeta.appendChild(el("span",{},ts.client));
  cmeta.appendChild(el("span",{},`${(ts.entries||[]).length} crew · ${totalNet.toFixed(1)} hrs total`));
  if(totalTravel>0)cmeta.appendChild(el("span",{},`Travel: ${totalTravel} hrs`));
  cmeta.appendChild(el("span",{style:{fontSize:11}},`Submitted: ${submittedDate}`));
  cinfo.appendChild(ctop);cinfo.appendChild(cmeta);

  // Action buttons
  const cbtns=el("div",{style:{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}});
  if(ts.status==="pending"){
    const appBtn=btn("✓ Approve","btn-p btn-sm",async()=>{

    });
    appBtn.style.background="var(--green)";appBtn.style.borderColor="var(--green)";
    const rejBtn=btn("✕ Reject","btn-d btn-sm",async()=>{

      await updateTimesheetStatus(ts,"rejected");
    });
    cbtns.appendChild(appBtn);cbtns.appendChild(rejBtn);
  }

    const unapBtn=btn("Undo","btn-s btn-sm",async()=>await updateTimesheetStatus(ts,"pending"));

  chdr.appendChild(cinfo);chdr.appendChild(cbtns);
  card.appendChild(chdr);

  const tbody=el("div",{className:"card-body",style:{padding:"10px 14px"}});

    const row=el("div",{style:{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:"1px solid var(--bdr)",flexWrap:"wrap"}});

    groupCard.appendChild(groupHdr);

    // Docket rows
    group.dockets.forEach(d=>{
      const totalHours=(d.crewHours||[]).reduce((a,c)=>a+(c.hoursNet||c.hours||0),0);
      const hasClientSig=!!d.clientSigData;
      const hasSupSig=!!d.supSigData;
      const submittedDate=d.createdAt?new Date(d.createdAt).toLocaleString("en-AU",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
      const shiftDate=d.shiftDate?new Date(d.shiftDate+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}):"—";

      const row=el("div",{style:{padding:"12px 16px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}});

      // Left info
      const left=el("div",{style:{flex:1,minWidth:200}});
      const topLine=el("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}});
      topLine.appendChild(el("span",{style:{fontWeight:700,fontSize:13,color:"var(--txt)"}},`${d.shiftDay||""} ${shiftDate}`));

      // Signature status
      const sigRow=el("div",{style:{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}});
      sigRow.appendChild(el("span",{style:{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:3,background:hasClientSig?"var(--green-bg)":"var(--danger-bg)",color:hasClientSig?"var(--green)":"var(--danger)",border:`1px solid ${hasClientSig?"#a8d8b0":"#e8b0aa"}`}},hasClientSig?"✓ Client signed":"✗ Client unsigned"));
      sigRow.appendChild(el("span",{style:{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:3,background:hasSupSig?"var(--green-bg)":"var(--danger-bg)",color:hasSupSig?"var(--green)":"var(--danger)",border:`1px solid ${hasSupSig?"#a8d8b0":"#e8b0aa"}`}},hasSupSig?"✓ Supervisor signed":"✗ Supervisor unsigned"));

      const metaLine=el("div",{style:{fontSize:12,color:"var(--mut)",marginTop:4,display:"flex",gap:12,flexWrap:"wrap"}});
      metaLine.appendChild(el("span",{},`${(d.crewHours||[]).length} crew · ${totalHours.toFixed(1)} hrs total`));
      if(d.travelHours>0) metaLine.appendChild(el("span",{},`Travel: ${d.travelHours} hrs`));
      if(d.lafha>0) metaLine.appendChild(el("span",{},`LAFHA: ${d.lafha} days`));
      if(d.clientRepName) metaLine.appendChild(el("span",{},`Signed by: ${d.clientRepName}`));
      metaLine.appendChild(el("span",{style:{fontSize:11}},`Submitted: ${submittedDate}`));

      left.appendChild(topLine);left.appendChild(sigRow);left.appendChild(metaLine);

        works.textContent=d.worksCompleted.length>120?d.worksCompleted.slice(0,120)+"…":d.worksCompleted;
        left.appendChild(works);
      }

      // Right actions
      const acts=el("div",{style:{display:"flex",gap:6,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}});
      // Find matching job and shift
      const matchJob=state.jobs.find(j=>j.id===d.jobId)||{name:d.jobName,po:d.jobPO,client:d.client,siteAddress:d.siteAddress,clientContact:d.clientContact,clientPhone:d.clientPhone};
      const matchShift=(matchJob.shifts||[]).find(s=>s.id===d.shiftId)||{date:d.shiftDate,dayLabel:d.shiftDay,startTime:d.shiftStart,endTime:d.shiftEnd,personnel:[]};
      acts.appendChild(btn("View PDF","btn-s btn-sm",()=>exportDocketPDF(d,matchJob,matchShift)));
      acts.appendChild(btn("✕ Delete","btn-d btn-xs",async()=>{
        if(!confirm("Delete this docket permanently?"))return;
        // Remove from storage
        try{
          await fetch(`${SB_URL}/storage/v1/object/dockets/${d.id}.json`,{
            method:"DELETE",
            headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
          });
        }catch(e){console.error(e);}
        state.dockets=state.dockets.filter(x=>x.id!==d.id);
        saveLocalBackup();render();toast("Docket deleted");
      }));

      row.appendChild(left);row.appendChild(acts);
      groupCard.appendChild(row);
    });

    main.appendChild(groupCard);
  });
}

function exportDocketsCSV(dockets){
  const rows=[["Ref","Job","PO","Client","Shift Date","Shift Day","Start","End","Works Completed","Crew Count","Total Hours","Travel Hrs","LAFHA Days","Client Rep","Client Signed","Supervisor","Sup Signed","Comments","Submitted"]];
  dockets.forEach(d=>{
    const totalHours=(d.crewHours||[]).reduce((a,c)=>a+(c.hoursNet||c.hours||0),0);
    rows.push([
      d.id.toUpperCase().slice(-6),
      d.jobName||"",d.jobPO||"",d.client||"",
      d.shiftDate||"",d.shiftDay||"",d.shiftStart||"",d.shiftEnd||"",
      (d.worksCompleted||"").replace(/\n/g," "),
      (d.crewHours||[]).length,
      totalHours.toFixed(1),
      d.travelHours||0,d.lafha||0,
      d.clientRepName||"",
      d.clientSigData?"Yes":"No",
      d.supName||"",
      d.supSigData?"Yes":"No",
      (d.comments||"").replace(/\n/g," "),
      d.createdAt?new Date(d.createdAt).toLocaleDateString("en-AU"):""
    ]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`taver-dockets-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);
  toast("Dockets exported");
}

        attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom:18
      }).addTo(map);

      let bounds=[];
      let pending=todayShifts.length;
      if(pending===0)return;

      todayShifts.forEach(({job,shift})=>{
        const addr=job.siteAddress;
        if(!addr){pending--;return;}
        // Use Nominatim geocoding (free, no key)
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr+", Australia")}&limit=1`)
          .then(r=>r.json())
          .then(data=>{
            if(data&&data[0]){
              const lat=parseFloat(data[0].lat);
              const lng=parseFloat(data[0].lon);
              // Custom coloured marker
              const icon=L.divIcon({
                className:"",
                html:`<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${job.color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center">

                </div>`,
                iconSize:[32,32],iconAnchor:[16,32]
              });
              const marker=L.marker([lat,lng],{icon}).addTo(map);
              const crew=(shift.personnel||[]).filter(p=>p.name).map(p=>p.name).join(", ")||"No crew named";
              marker.bindPopup(`<strong style="font-size:13px">${job.name}</strong><br><span style="font-size:12px;color:#555">${job.jobNumber||""}</span><br><span style="font-size:11px">${addr}</span><br><span style="font-size:11px;color:#333"><b>Crew:</b> ${crew}</span><br><span style="font-size:11px">${shift.startTime}–${shift.endTime}</span>`);
              bounds.push([lat,lng]);
            }
            pending--;
            if(pending===0&&bounds.length>0){
              if(bounds.length===1){map.setView(bounds[0],13);}
              else{map.fitBounds(bounds,{padding:[30,30]});}
            }
          })
          .catch(()=>{pending--;});
      });
    }catch(e){console.error("Map error:",e);}
  },300);
}


// ── Reports ───────────────────────────────────────────────────────────
async function loadReportsFromSupabase(){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/reports`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({limit:1000,offset:0,prefix:""})
    });
    if(!r.ok){console.warn("Reports list failed:",r.status);return;}
    const files=await r.json();
    if(!files||!Array.isArray(files)||files.length===0){state.reports=[];return;}
    const reports=[];
    await Promise.all(files.map(async f=>{
      try{
        const dr=await fetch(`${SB_URL}/storage/v1/object/public/reports/${f.name}`);
        if(dr.ok){const d=await dr.json();if(d&&d.id)reports.push(d);}
      }catch{}
    }));
    reports.sort((a,b)=>(b.submittedAt||"").localeCompare(a.submittedAt||""));
    state.reports=reports;
    saveLocalBackup();
    console.log("Loaded",reports.length,"reports");
  }catch(e){console.error("loadReports error:",e);}
}

async function updateReportStatus(report,status){
  report.status=status;
  report.reviewedAt=new Date().toISOString();
  try{
    const blob=new Blob([JSON.stringify(report)],{type:"application/json"});
    await fetch(`${SB_URL}/storage/v1/object/reports/${report.id}.json`,{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","x-upsert":"true"},
      body:blob
    });
  }catch(e){console.error("updateReport error:",e);}
  saveLocalBackup();render();
  toast(status==="reviewed"?"Report marked as reviewed ✓":"Report status updated");
}

// ── Shift Confirmations ───────────────────────────────────────────────
async function loadConfirmationsFromSupabase(){
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),5000); // 5s timeout
    const r=await fetch(`${SB_URL}/rest/v1/shift_confirmations?select=*&limit=2000`,{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(!r.ok){console.warn("Confirmations load failed:",r.status);return;}
    const rows=await r.json();
    state.confirmations={};
    (rows||[]).forEach(row=>{
      if(!state.confirmations[row.shift_id]) state.confirmations[row.shift_id]={};
      state.confirmations[row.shift_id][row.staff_name]=row.status;
    });
    console.log("Loaded confirmations for",Object.keys(state.confirmations).length,"shifts");
  }catch(e){
    if(e.name==="AbortError"){console.warn("Confirmations load timed out");}
    else{console.warn("loadConfirmations error:",e);}
  }
}

function getConfirmationStatus(shiftId, staffName){
  return (state.confirmations[shiftId]||{})[staffName]||"pending";
}

function exportResourceRequestCSV(job,shifts,resources,notes){
  const rows=[
    ["TAVER GROUP — RESOURCE REQUEST"],
    ["Job",job.name],["Job Number",job.jobNumber||""],["Taver PO",job.po||""],
    ["Client",job.client||""],["Site",job.siteAddress||""],
    ["Contact","Drew Little — drew@tavergroup.com — 0419 408 533"],
    ["Generated",new Date().toLocaleDateString("en-AU")],
    [],
    ["SHIFTS"],
    ["Shift #","Date","Start","Finish","Site"],
    ...shifts.map((s,i)=>{
      const d=new Date(s.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
      return [`Shift ${i+1}`,d,s.startTime,s.endTime,job.siteAddress||""];
    }),
    [],
    ["RESOURCES REQUIRED"],
    ["Shift","Type","Description","Quantity","Shift Times","Notes","Response — Provider/Company Name","Response — Staff Name (if personnel)","Response — Phone","Response — RIW Number","Response — Confirmed (Y/N)"],
    ...resources.map(r=>[r.shiftRef,r.type,r.description,r.qty,r.shiftTimes||"",r.notes,"","","","",""]),
    [],
    ["ADDITIONAL NOTES"],
    [notes||"None"],
    [],
    ["RESPONSE INSTRUCTIONS"],
    ["Please complete the Response columns and return this CSV to: drew@tavergroup.com"],
    ["Taver Group Pty Ltd · ABN 99 691 866 289"]
  ];
  const csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`Resource-Request-${job.jobNumber||job.name}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();URL.revokeObjectURL(url);
}

function importSubcontractorCSV(job,csvText){
  // Parse CSV and find the response columns
  const lines=csvText.split("\n").map(l=>l.split(",").map(c=>c.replace(/^"|"$/g,"").replace(/""/g,'"').trim()));
  // Find header row
  const headerIdx=lines.findIndex(l=>l.some(c=>c.includes("Description")));
  if(headerIdx<0){toast("Could not parse CSV — make sure it's the exported format");return;}
  const headers=lines[headerIdx];
  const descCol=headers.findIndex(h=>h.includes("Description"));
  const typeCol=headers.findIndex(h=>h.includes("Type"));
  const qtyCol=headers.findIndex(h=>h.includes("Quantity"));
  const shiftCol=headers.findIndex(h=>h.toLowerCase().includes("shift")&&!h.includes("Times"));
  const providerCol=headers.findIndex(h=>h.includes("Provider"));
  const staffNameCol=headers.findIndex(h=>h.includes("Staff Name"));
  const phoneCol=headers.findIndex(h=>h.includes("Phone"));
  const riwCol=headers.findIndex(h=>h.includes("RIW"));
  const contactCol=headers.findIndex(h=>h.includes("Contact"));

  let imported=0;
  for(let i=headerIdx+1;i<lines.length;i++){
    const row=lines[i];
    if(!row||row.length<3)continue;
    const desc=row[descCol]||"";
    const provider=providerCol>=0?row[providerCol]||"":"";
    const staffName=staffNameCol>=0?row[staffNameCol]||"":"";
    const phone=phoneCol>=0?row[phoneCol]||"":"";
    const riwNumber=riwCol>=0?row[riwCol]||"":"";
    const contact=contactCol>=0?row[contactCol]||"":"";
    const shiftRef=shiftCol>=0?row[shiftCol]||"":"";
    if(!desc)continue;

    // Try to find matching TBA slot in the job
    const shiftNum=parseInt((shiftRef.match(/\d+/)||[])[0]||"1")-1;
    const targetShift=(job.shifts||[])[shiftNum]||(job.shifts||[])[0];
    if(!targetShift)continue;

    const tbaSlot=(targetShift.personnel||[]).find(p=>!p.name&&(p.role||"").toLowerCase()===desc.toLowerCase());
    if(tbaSlot){
      // Fill in the TBA slot
      tbaSlot.name=staffName||provider||"(Subcontractor)";
      tbaSlot.company=provider||tbaSlot.company||"";
      tbaSlot.phone=phone||contact||"";
      tbaSlot.riwNumber=riwNumber||tbaSlot.riwNumber||"";
      if(riwNumber) tbaSlot.riw=true;
      imported++;
    }
  }

  if(imported>0){
    pushJobToSupabase(job);
    saveData();render();
    toast(`✓ Imported ${imported} resource${imported!==1?"s":""} from CSV`);
  } else {
    toast("No matching TBA slots found — check the CSV format");
  }
}

function showParseEmailModal(){
  modal("📧 Parse Email → Job",(body,close)=>{
    body.appendChild(el("div",{style:{fontSize:13,color:"var(--mut)",marginBottom:14,lineHeight:1.6}},
      "Paste a client email or job request below. Claude will extract the job details and pre-fill the New Job form for you to review and confirm."));

    const textarea=el("textarea",{placeholder:"Paste email content here...\n\nExample:\nHi Drew, we need a crew for track maintenance at Central Station on Saturday 7 June, 06:00-14:00. We need 2 welders and 1 supervisor. PO is PO-12345. Contact is John Smith on 0412 345 678."});
    textarea.style.cssText="width:100%;min-height:200px;font-size:13px;font-family:inherit;resize:vertical;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:10px 12px;outline:none;margin-bottom:12px";
    body.appendChild(textarea);

    const statusEl=el("div",{style:{fontSize:13,minHeight:20,marginBottom:10,fontWeight:600}});
    body.appendChild(statusEl);

    const actRow=el("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}});
    actRow.appendChild(btn("Cancel","btn-s",close));

    const parseBtn=btn("✨ Parse with AI","btn-p",async()=>{
      const emailText=textarea.value.trim();
      if(!emailText){textarea.focus();return;}
      parseBtn.disabled=true;parseBtn.textContent="Parsing...";
      statusEl.style.color="var(--mut)";statusEl.textContent="Reading email...";

      try{
        // Call via Supabase Edge Function to avoid CORS
        const response=await fetch(`${SB_URL}/functions/v1/parse-email`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY},
          body:JSON.stringify({emailText})
        });

        const data=await response.json();
        if(data.error) throw new Error(data.error);
        const clean=data.result.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(clean);

        statusEl.style.color="var(--green)";statusEl.textContent="✓ Parsed successfully — review the form below";
        close();

        // Open New Job modal with pre-filled data
        setTimeout(()=>showParsedJobModal(parsed),100);

      }catch(e){
        console.error("Parse error:",e);
        statusEl.style.color="var(--danger)";
        statusEl.textContent="Parse failed: "+e.message+" — try adding more detail or create manually";
        parseBtn.disabled=false;parseBtn.textContent="✨ Parse with AI";
      }
    });
    actRow.appendChild(parseBtn);
    body.appendChild(actRow);
    textarea.focus();
  });
}

function showParsedJobModal(parsed){
  // Convert parsed dates to week numbers
  const firstDate=parsed.shifts?.[0]?.date;
  let week=state.visibleStart||47;
  if(firstDate){
    const d=new Date(firstDate+"T12:00:00");
    for(let w=47;w<=TOTAL_WEEKS;w++){
      const sat=weToSun(w);
      if(sat>=d){week=w;break;}
    }
  }

  modal("✨ Review Parsed Job",(body,close)=>{
    body.appendChild(el("div",{style:{background:"var(--acc-light)",border:"1px solid var(--bdr2)",borderRadius:"var(--radius)",padding:"10px 14px",marginBottom:14,fontSize:13,color:"var(--mid)",lineHeight:1.6}},"Review the extracted details below. Edit anything before saving."));

      const sp=el("div",{style:{background:"var(--bg3)",border:"1px solid var(--bdr)",borderRadius:"var(--radius)",padding:"10px 14px",marginBottom:14}});
      sp.appendChild(el("div",{style:{fontSize:11,fontWeight:700,color:"var(--mut)",textTransform:"uppercase",letterSpacing:".7px",marginBottom:8}},`${parsed.shifts.length} Shift${parsed.shifts.length!==1?"s":""} Detected`));
      parsed.shifts.forEach((s,i)=>{
        const d=new Date(s.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
        const row=el("div",{style:{marginBottom:4,fontSize:13}});
        row.innerHTML=`<strong>Shift ${i+1}:</strong> ${d} ${s.startTime}–${s.endTime} · ${(s.roles||[]).length} roles`;
        sp.appendChild(row);
      });
      body.appendChild(sp);
    }

    // Simple editable fields
    const fields=[
      {label:"Job Name *",key:"name",value:parsed.name||""},
      {label:"Client",key:"client",value:parsed.client||""},
      {label:"Site Contact",key:"clientContact",value:parsed.clientContact||""},
      {label:"Contact Phone",key:"clientPhone",value:parsed.clientPhone||""},
      {label:"Site Address",key:"siteAddress",value:parsed.siteAddress||""},
      {label:"PO Number",key:"po",value:parsed.po||""},
      {label:"Notes",key:"notes",value:parsed.notes||""},
    ];
    const inputs={};
    fields.forEach(f=>{
      const inp=el("input",{type:"text",value:f.value,placeholder:f.label});
      inp.style.cssText="width:100%;border:1px solid var(--bdr);border-radius:var(--radius);background:var(--bg2);color:var(--txt);padding:8px 10px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px";
      inputs[f.key]=inp;
      const lbl=el("label",{style:{fontSize:11,fontWeight:600,color:"var(--mut)",textTransform:"uppercase",letterSpacing:".6px",display:"block",marginBottom:3}},f.label);
      body.appendChild(lbl);body.appendChild(inp);
    });

    const actRow=el("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}});
    actRow.appendChild(btn("Cancel","btn-s",close));
    const saveBtn=btn("✓ Create Job","btn-p",async()=>{
      const name=inputs.name.value.trim();
      if(!name){inputs.name.focus();toast("Job name is required");return;}
      saveBtn.disabled=true;saveBtn.textContent="Creating...";

      const newJob={
        id:uid(),
        name,
        client:inputs.client.value.trim(),
        clientContact:inputs.clientContact.value.trim(),
        clientPhone:inputs.clientPhone.value.trim(),
        siteAddress:inputs.siteAddress.value.trim(),
        po:inputs.po.value.trim(),
        notes:inputs.notes.value.trim(),
        mapLink:"",week,
        color:JCOLORS[Math.floor(Math.random()*JCOLORS.length)],
        status:"quoted",jobNumber:"",
        shifts:[],createdAt:new Date().toISOString()
      };

      // Get job number using the standard function
      newJob.jobNumber = await getNextJobNumber();

      // Add shifts
      (parsed.shifts||[]).forEach(s=>{
        const shift={
          id:uid(),date:s.date,
          dayLabel:new Date(s.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short"}),
          startTime:s.startTime,endTime:s.endTime,personnel:[]
        };
        (s.roles||[]).forEach(role=>{
          shift.personnel.push({id:uid(),role,name:"",phone:"",company:"Taver Group",riw:false,riwNumber:"",shiftStart:s.startTime,shiftEnd:s.endTime});
        });
        newJob.shifts.push(shift);
      });

      try{state.jobs.push(newJob);}catch(e){console.error("push error",e);}
      try{saveData();}catch(e){console.error("save error",e);}
      try{await pushJobToSupabase(newJob);}catch(e){console.error("supabase error",e);}
      state.selectedJobId=newJob.id;
      state.view="list";
      try{close();}catch(e){console.error("close error",e);}
      try{render();}catch(e){console.error("render error",e);}
      toast(`✓ Job created: ${newJob.jobNumber} ${newJob.name}`);
    });
    actRow.appendChild(saveBtn);
    body.appendChild(actRow);
  });
}

// ── Clone Shift ───────────────────────────────────────────────────────
function showCloneShiftModal(job, sourceShift){
  modal(`Clone Shift — ${sourceShift.dayLabel} ${fmtFull(new Date(sourceShift.date+"T12:00:00"))}`,(body,close)=>{

    body.appendChild(el("div",{style:{background:"var(--acc-light)",border:"1px solid var(--bdr2)",borderRadius:"var(--radius)",padding:"10px 14px",fontSize:13,color:"var(--mid)",marginBottom:16,lineHeight:1.5}},
      `Cloning from: ${sourceShift.dayLabel} ${fmtFull(new Date(sourceShift.date+"T12:00:00"))} (${sourceShift.startTime}–${sourceShift.endTime}) with ${sourceShift.personnel.length} crew`
    ));

    // Pick target date(s) — can select multiple
    body.appendChild(el("div",{className:"section-divider",style:{marginBottom:12}},"Select target date(s)"));

    // Show the week's days as quick-pick buttons
    const weekDays=[];
    for(let off=0;off<7;off++){
      const d=new Date(sourceShift.date+"T12:00:00");
      d.setDate(d.getDate()-d.getDay()+1+off); // Mon of that week
      // Actually show 7 days from Monday of the week containing source shift
      weekDays.push(d);
    }

    // Determine the week containing the source shift
    const srcDate=new Date(sourceShift.date+"T12:00:00");
    const srcDay=srcDate.getDay(); // 0=Sun,1=Mon...
    const monday=new Date(srcDate);
    monday.setDate(srcDate.getDate()-(srcDay===0?6:srcDay-1));

    const selectedDates=new Set();
    const dayBtns=[];

    const daysRow=el("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}});
    for(let i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const dStr=ds(d);
      const isSource=dStr===sourceShift.date;
      const dayNames=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const dbtn=el("div",{
        style:{
          padding:"8px 12px",borderRadius:"var(--radius)",cursor:isSource?"not-allowed":"pointer",
          fontSize:12,fontWeight:700,textAlign:"center",transition:"all .15s",
          background:isSource?"var(--bg3)":"var(--bg2)",
          border:`1px solid ${isSource?"var(--bdr)":"var(--bdr2)"}`,
          color:isSource?"var(--mut)":"var(--txt)",
          opacity:isSource?0.5:1,minWidth:60
        }
      });
      dbtn.innerHTML=`<div>${dayNames[i]}</div><div style="font-size:10px;color:var(--mut);font-weight:400">${fmt(d)}</div>`;
      if(!isSource){
        dbtn.addEventListener("click",()=>{
          if(selectedDates.has(dStr)){
            selectedDates.delete(dStr);
            dbtn.style.background="var(--bg2)";
            dbtn.style.borderColor="var(--bdr2)";
            dbtn.style.color="var(--txt)";
          } else {
            selectedDates.add(dStr);
            dbtn.style.background="var(--acc-light)";
            dbtn.style.borderColor="var(--acc)";
            dbtn.style.color="var(--mid)";
          }
        });
      }
      daysRow.appendChild(dbtn);
      dayBtns.push({dStr,btn:dbtn,d});
    }
    body.appendChild(daysRow);

    // Also allow picking a custom date outside this week
    body.appendChild(el("div",{className:"section-divider",style:{marginBottom:12}},"Or pick a specific date"));
    const customDateField=el("div",{className:"field"});
    const customDateInput=el("input",{type:"date"});
    customDateField.appendChild(customDateInput);
    body.appendChild(customDateField);

    // Options
    body.appendChild(el("div",{className:"section-divider",style:{marginBottom:12}},"Clone options"));

    let copyTimes=true,copyCrew=true,copyCrewNames=true;

    function makeCheckRow(label,checked,onChange){
      const row=el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10,cursor:"pointer"}});
      const cb=el("input",{type:"checkbox"});
      cb.checked=checked;cb.style.cssText="width:16px;height:16px;cursor:pointer;accent-color:var(--mid)";
      cb.addEventListener("change",()=>onChange(cb.checked));
      const lbl=el("span",{style:{fontSize:13,color:"var(--txt)"}},label);
      row.appendChild(cb);row.appendChild(lbl);
      row.addEventListener("click",e=>{if(e.target!==cb){cb.checked=!cb.checked;onChange(cb.checked);}});
      return row;
    }

    body.appendChild(makeCheckRow("Copy shift times ("+sourceShift.startTime+"–"+sourceShift.endTime+")",true,v=>copyTimes=v));
    body.appendChild(makeCheckRow("Copy crew roles and structure",true,v=>copyCrew=v));
    body.appendChild(makeCheckRow("Copy crew names (uncheck to copy roles only — TBA)",true,v=>copyCrewNames=v));

    const actionRow=el("div",{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}});
    actionRow.appendChild(btn("Cancel","btn-s",close));

    const cloneBtn=btn("Clone Shift","btn-p",()=>{
      // Collect all target dates
      const targets=[...selectedDates];
      if(customDateInput.value&&!targets.includes(customDateInput.value)){
        targets.push(customDateInput.value);
      }
      if(targets.length===0){
        toast("Please select at least one target date");return;
      }

      let cloned=0;
      targets.forEach(dateStr=>{
        const targetDate=new Date(dateStr+"T12:00:00");
        const dayLabel=targetDate.toLocaleDateString("en-AU",{weekday:"short"});

        const newShift={
          id:uid(),
          date:dateStr,
          dayLabel,
          startTime:copyTimes?sourceShift.startTime:"06:00",
          endTime:copyTimes?sourceShift.endTime:"14:00",
          personnel:copyCrew?(sourceShift.personnel||[]).map(p=>({
            id:uid(),
            role:p.role,
            name:copyCrewNames?p.name:"",
            phone:copyCrewNames?p.phone:"",
            company:p.company,
            riw:p.riw,
            riwNumber:copyCrewNames?p.riwNumber:"",
            shiftStart:copyTimes?(p.shiftStart||sourceShift.startTime):"06:00",
            shiftEnd:copyTimes?(p.shiftEnd||sourceShift.endTime):"14:00"
          })):[]
        };

        job.shifts.push(newShift);
        cloned++;
      });

      job.shifts.sort((a,b)=>a.date.localeCompare(b.date));
      saveData();
      pushJobToSupabase(job).then(()=>updateSyncDot());
      render();
      toast(`${cloned} shift${cloned!==1?"s":""} cloned successfully`);
      close();
    });
    actionRow.appendChild(cloneBtn);
    body.appendChild(actionRow);
  });
}

    // Search jobs
    state.jobs.forEach(j=>{

        searchResultsEl.appendChild(row);
      });
    }
    searchWrap.appendChild(searchResultsEl);
  }

  searchInput.addEventListener("input",e=>doSearch(e.target.value.trim()));
  searchInput.addEventListener("keydown",e=>{if(e.key==="Escape"){searchInput.value="";doSearch("");}});
  document.addEventListener("click",e=>{if(!searchWrap.contains(e.target)&&searchResultsEl){searchResultsEl.remove();searchResultsEl=null;}},{capture:true,passive:true});
  rctrl.appendChild(searchWrap);

  const jumpSel=el("select",{style:{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",borderRadius:"var(--radius)",color:"#fff",padding:"6px 10px",fontSize:11,fontFamily:"inherit",outline:"none",width:130}});
  jumpSel.appendChild(el("option",{value:""},"Jump to week..."));
  ALL_WEEKS.forEach(w=>{jumpSel.appendChild(el("option",{value:w},`${weLabel(w)} — ${fmt(weToMon(w))} – ${fmt(weToSun(w))}`));});
  jumpSel.addEventListener("change",()=>{if(jumpSel.value){state.view="grid";render();}});
  // Logout button
  const logoutBtn = document.createElement("button");
  logoutBtn.className = "btn-g btn-sm";
  logoutBtn.title = "Sign out";
  logoutBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;
  logoutBtn.addEventListener("click",signOutAdmin);
  rctrl.appendChild(logoutBtn);
  rctrl.appendChild(jumpSel);

  const moreBtn=btn("⋯","btn-s btn-sm",()=>{
    const menu=el("div",{style:{position:"absolute",top:"62px",right:"16px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:"var(--radius)",padding:"6px",zIndex:300,minWidth:170,boxShadow:"var(--shadow-md)"}});
    [{l:"Export all data",fn:()=>{exportAllData();menu.remove();}},{l:"Import data",fn:()=>{const fi=el("input",{type:"file",accept:".json",style:{display:"none"}});fi.addEventListener("change",e=>{if(e.target.files[0])importData(e.target.files[0]);});document.body.appendChild(fi);fi.click();fi.remove();menu.remove();}}]
    .forEach(item=>{const b=el("div",{style:{padding:"9px 12px",cursor:"pointer",borderRadius:6,fontSize:13,color:"var(--txt)"},onClick:item.fn},item.l);b.addEventListener("mouseenter",()=>b.style.background="var(--bg3)");b.addEventListener("mouseleave",()=>b.style.background="transparent");menu.appendChild(b);});
    document.getElementById("app").appendChild(menu);
    setTimeout(()=>document.addEventListener("click",()=>menu.remove(),{once:true}),10);
  });
  rctrl.appendChild(moreBtn);
  rctrl.appendChild(btn("+ New Job","btn-p btn-sm",()=>modal("New Job",(b,close)=>buildJobForm(null,addJob,close)(b))));
  const sd=el("div",{id:"sync-dot",className:`sync-dot${state.syncStatus!=="ok"?" error":""}`,title:state.lastSaved?"Saved: "+new Date(state.lastSaved).toLocaleTimeString("en-AU"):"Not saved"});
  rctrl.appendChild(sd);topbar.appendChild(rctrl);app.appendChild(topbar);

  const main=el("div",{className:"main"});

  if(state.selectedJobId){

    if(!job){state.selectedJobId=null;render();return;}
    const backRow=el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}});
    backRow.appendChild(btn("← Back","btn-g btn-sm",()=>{state.selectedJobId=null;render();}));
    backRow.appendChild(btn("Delete Job","btn-d btn-sm",()=>deleteJob(job.id)));
    main.appendChild(backRow);
    const dc=el("div",{className:"card"});dc.appendChild(buildJobDetail(job));main.appendChild(dc);
