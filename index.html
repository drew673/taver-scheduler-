<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Brand */
  --dk:#141920;--mid:#1e2730;--lt:#2a3a4a;--acc:#ff5500;--acc-light:#e6f4ea;
  /* Backgrounds */
  --bg:#f5f7f5;--bg2:#ffffff;--bg3:#f0f4f1;--bg4:#e8efe9;
  /* Text */
  --txt:#0f1f14;--txt2:#354a3a;--mut:#6b8070;
  /* Borders */
  --bdr:#d8e2da;--bdr2:#b8ccbc;
  /* Status */
  --danger:#c0392b;--danger-bg:#fdf0f0;
  --green:#cc4400;--green-bg:#e8f5ec;
  --amber:#b86e00;--amber-bg:#fef9ec;
  --blue:#1a4f7a;--purple:#5c2d82;
  /* Geometry */
  --radius:6px;--radius-lg:10px;--radius-xl:14px;
  /* Elevation */
  --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 4px 16px rgba(0,0,0,.1),0 8px 32px rgba(0,0,0,.06);
}
html{height:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:13.5px;line-height:1.55;min-height:100%;overscroll-behavior:none;letter-spacing:-0.01em}
h1{font-size:22px;font-weight:800;letter-spacing:-0.03em}
h2{font-size:17px;font-weight:700;letter-spacing:-0.02em}
h3{font-size:14px;font-weight:600;letter-spacing:-0.01em}

/* Buttons */
button{font-family:inherit;cursor:pointer;border-radius:var(--radius);font-weight:600;font-size:13px;padding:7px 14px;transition:all 0.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;letter-spacing:-0.01em}
.btn-p{background:var(--acc);border:1px solid #cc4400;color:#fff;box-shadow:0 1px 3px rgba(255,85,0,.3)}
.btn-p:hover{background:#cc4400;transform:translateY(-1px);box-shadow:0 2px 6px rgba(255,85,0,.35)}
.btn-p:active{transform:translateY(0)}
.btn-s{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt);box-shadow:var(--shadow)}
.btn-s:hover{background:var(--bg3);border-color:var(--bdr2)}
.btn-g{background:transparent;border:1px solid transparent;color:var(--mut)}
.btn-g:hover{background:var(--bg3);color:var(--txt)}
.btn-d{background:transparent;border:1px solid #e8b0aa;color:var(--danger)}
.btn-d:hover{background:var(--danger-bg)}
.btn-email{background:#eaf4fb;border:1px solid #a9cce3;color:#1a5276}
.btn-email:hover{background:#d6eaf8}
.btn-sms{background:#fff3ee;border:1px solid #a9d5b0;color:#cc4400}
.btn-sms:hover{background:#d5f0d8}
.btn-wa{background:#e8f8ee;border:1px solid #86d497;color:#cc4400}
.btn-wa:hover{background:#d0f0dc}
.btn-cal{background:#eaf1fb;border:1px solid #90b4e8;color:#1a3a7a}
.btn-cal:hover{background:#d5e5f8}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
button:disabled{opacity:.4;cursor:not-allowed}

/* Forms */
input,select,textarea{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);color:var(--txt);padding:8px 11px;font-size:13.5px;font-family:inherit;outline:none;width:100%;transition:border-color 0.12s,box-shadow 0.12s;letter-spacing:-0.01em}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(77,140,90,.1)}
label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:4px}
.field{margin-bottom:12px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--dk);border-bottom:none;padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;min-height:54px;box-shadow:0 2px 12px rgba(26,58,42,.25)}
.logo{display:flex;align-items:center;gap:10px;margin-right:20px;padding:8px 0;text-decoration:none;flex-shrink:0}
.logo-img{height:32px;width:auto;filter:brightness(0) invert(1)}
.logo-divider{width:1px;height:24px;background:rgba(255,255,255,.2);flex-shrink:0}
.logo-text .brand{font-size:13px;font-weight:800;color:#fff;letter-spacing:-.2px;line-height:1}
.logo-text .sub{font-size:9px;color:rgba(255,255,255,.55);letter-spacing:2px;line-height:1;margin-top:2px;text-transform:uppercase}
.tabs{display:flex;gap:0;flex:1;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);padding:16px 14px;font-weight:600;font-size:12px;letter-spacing:.3px;white-space:nowrap;border-radius:0;transition:all .12s}
.tab.active{color:#fff;border-bottom-color:#ff8040;background:rgba(255,255,255,.06)}
.tab:hover:not(.active){color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.topbar-right{display:flex;gap:8px;align-items:center;margin-left:10px}
.main{flex:1;padding:18px;max-width:1320px;margin:0 auto;width:100%}

/* Hero banner (dashboard) */
.hero{background:linear-gradient(135deg,var(--dk) 0%,#1f4d30 50%,var(--mid) 100%);border-radius:var(--radius-lg);padding:22px 26px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;box-shadow:var(--shadow-md)}
.hero-left h2{color:#fff;font-size:19px;margin-bottom:4px}
.hero-left p{color:rgba(255,255,255,.6);font-size:12.5px}
.hero-logo{height:44px;width:auto;opacity:.85;filter:brightness(0) invert(1)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.card-hdr{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg3)}
.card-body{padding:12px 14px}

/* Stats */
.stats-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 16px;flex:1;min-width:80px;box-shadow:var(--shadow)}
.stat-val{font-size:20px;font-weight:800;line-height:1.1;letter-spacing:-0.03em}
.stat-lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;font-weight:600}

/* Badge */
.badge{display:inline-flex;align-items:center;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;white-space:nowrap;line-height:1.4;letter-spacing:.1px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(2px)}
@media(min-width:600px){.overlay{align-items:center;padding:20px}}
.modal{background:var(--bg2);border:1px solid var(--bdr);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0;box-shadow:var(--shadow-lg)}
@media(min-width:600px){.modal{border-radius:var(--radius-xl)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-body{padding:16px 18px 32px}
@media(min-width:600px){.modal-body{padding-bottom:20px}}

/* Week grid */
.week-grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.week-grid{min-width:580px}
.wg-header{display:grid;grid-template-columns:100px repeat(7,1fr);gap:3px;margin-bottom:3px}
.wg-row{display:grid;grid-template-columns:100px repeat(7,1fr);gap:3px;margin-bottom:4px}
.wg-day-hdr{padding:6px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;border-radius:5px}
.wg-day-hdr.today{color:var(--acc);background:var(--acc-light);font-weight:800}
.wg-cell{min-height:64px;background:var(--bg3);border-radius:5px;padding:4px;display:flex;flex-direction:column;gap:3px;border:1px solid var(--bdr)}
.wg-chip{border-radius:5px;padding:5px 7px;cursor:pointer;transition:all .12s}
.wg-job-label{display:flex;flex-direction:column;align-items:flex-start;overflow:hidden;cursor:pointer;padding:6px 8px;gap:2px}

/* Personnel */
.pax-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;background:var(--bg3);margin-bottom:6px;border:1px solid var(--bdr)}
.pax-row.conf-confirmed{background:#f0faf2!important;border-left:3px solid var(--green)!important}
.pax-row.conf-declined{background:#fdf0f0!important;border-left:3px solid var(--danger)!important}
.pax-row.conf-pending{background:#fffbf0!important;border-left:3px solid var(--amber)!important}
.pax-bar{width:3px;border-radius:2px;align-self:stretch;min-height:28px;flex-shrink:0;margin-top:2px}
.pax-details{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.pax-detail{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--mut)}

/* Job list */
.job-row{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:12px;margin-bottom:8px;transition:all .15s;border:1px solid var(--bdr);box-shadow:var(--shadow)}
.job-row:hover{background:var(--bg3);box-shadow:var(--shadow-md);transform:translateY(-1px)}

/* Resources */
.pax-card{background:var(--bg3);border-radius:6px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;border:1px solid var(--bdr)}
.pax-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:12px}

/* Colour picker */
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.color-dot.selected{border-color:var(--dk);transform:scale(1.15)}

/* Nav */
.nav-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.nav-label{font-size:12px;color:var(--mut);flex:1;text-align:center;font-weight:600}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;animation:tin .2s ease;box-shadow:var(--shadow-md);pointer-events:none;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Empty */
.empty{text-align:center;color:var(--mut);padding:48px 20px;font-size:14px}

/* Export modal tabs */
.export-tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.export-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mut);padding:10px 16px;font-weight:600;font-size:13px;border-radius:0}
.export-tab.active{color:var(--mid);border-bottom-color:var(--mid)}

/* Sync dot */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.error{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* Section divider */
.section-divider{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;padding:12px 0 6px;border-bottom:1px solid var(--bdr);margin-bottom:12px}

/* Staff directory */
.staff-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:14px}
.staff-avatar{width:42px;height:42px;border-radius:50%;background:var(--mid);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;letter-spacing:-.5px}
.staff-info{flex:1;min-width:0}
.staff-name{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:2px}
.staff-meta{font-size:12px;color:var(--mut);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.staff-actions{display:flex;gap:6px;flex-shrink:0}
/* Staff search dropdown */
.staff-search-wrap{position:relative}
.staff-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bdr2);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:200;max-height:220px;overflow-y:auto;box-shadow:var(--shadow-md)}
.staff-opt{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .1s}
.staff-opt:last-child{border-bottom:none}
.staff-opt:hover{background:var(--acc-light)}
.staff-opt-name{font-weight:600;font-size:13px;color:var(--txt)}
.staff-opt-meta{font-size:11px;color:var(--mut);margin-top:1px}

/* Conflict alerts */
.conflict-banner{background:#fff8e1;border:1px solid #f9a825;border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px}
.conflict-banner-hdr{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:#7a5500;margin-bottom:10px}
.conflict-item{background:#fff;border:1px solid #fdd835;border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;font-size:13px}
.conflict-name{font-weight:700;color:#5a3a00;margin-bottom:4px}
.conflict-jobs{display:flex;flex-direction:column;gap:3px}
.conflict-job{display:flex;align-items:center;gap:7px;font-size:12px;color:#5a4500}
.conflict-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pax-row.has-conflict{background:#fff8e1!important;border-color:#f9a825!important}
.conflict-badge{background:#fff3e0;border:1px solid #f9a825;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:700;color:#7a4f00}
@media(max-width:480px){
  .topbar{padding:0 12px;min-height:52px}
  .main{padding:12px}
  .tab{padding:15px 10px;font-size:11px}
  .stats-row{gap:6px}
  .stat{padding:10px 12px;min-width:60px}
  .stat-val{font-size:18px}
  .hero{padding:18px 20px}
  .hero-logo{height:36px}
  .field-row3{grid-template-columns:1fr 1fr}
  .logo-text{display:none}
  .logo-divider{display:none}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* ── At a Glance panel ───────────────────────────────────────────────── */
.glance-wrap{margin-bottom:18px}
.glance-title{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.glance-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.glance-inner{display:flex;gap:8px;min-width:max-content}
.glance-week{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:12px 14px;width:172px;flex-shrink:0;box-shadow:var(--shadow);position:relative;overflow:hidden}
.glance-week.current-week{border:2px solid var(--acc)}
.glance-week.current-week::before{content:"NOW";position:absolute;top:0;right:0;background:var(--acc);color:#fff;font-size:8px;font-weight:800;padding:2px 6px;border-radius:0 var(--radius-lg) 0 4px;letter-spacing:.8px}
.glance-we{font-size:12px;font-weight:800;color:var(--mid);letter-spacing:.3px;margin-bottom:1px}
.glance-dates{font-size:10px;color:var(--mut);margin-bottom:10px}
.glance-jobs{display:flex;flex-direction:column;gap:4px}
.glance-job-row{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 6px;border-radius:5px;transition:background .12s;margin:0 -6px}
.glance-job-row:hover{background:var(--bg3)}
.glance-color{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.glance-job-name{font-size:11px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.glance-badges{display:flex;gap:3px;flex-shrink:0}
.gb{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap}
.gb-shifts{background:var(--acc-light);color:var(--mid)}
.gb-warn{background:#fff3e0;color:#b06000}
.gb-empty{background:#fdf0f0;color:var(--danger)}
.glance-empty{font-size:11px;color:var(--mut);font-style:italic;padding:2px 0}
.glance-staffbar-wrap{margin-top:9px;padding-top:9px;border-top:1px solid var(--bdr)}
.glance-staffbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:3px}
.glance-staffbar-fill{height:100%;border-radius:3px}
.glance-stafflabel{font-size:9px;color:var(--mut);display:flex;justify-content:space-between}
.glance-nowork{background:var(--bg3);border:1px dashed var(--bdr);border-radius:var(--radius-lg);padding:12px 14px;width:172px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.glance-nowork span{font-size:10px;color:var(--mut)}

/* ── Today / Daily Briefing ──────────────────────────────────────────── */
.today-crew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
@media(max-width:480px){.today-crew-grid{grid-template-columns:1fr 1fr}}
.docket-section{margin-bottom:16px}
.docket-section-title{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;border-bottom:1px solid var(--bdr);margin-bottom:10px}
.docket-crew-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:6px;flex-wrap:wrap}
.docket-crew-name{font-weight:600;font-size:13px;color:var(--txt);min-width:130px}
.docket-crew-role{font-size:11px;color:var(--mut);min-width:90px}
.docket-hours-input{width:72px!important;text-align:center;padding:5px 8px!important;font-size:13px!important}
.sig-pad-wrap{border:1px solid var(--bdr);border-radius:var(--radius);background:#fff;position:relative;margin-top:4px}
.sig-pad-canvas{display:block;width:100%;height:120px;cursor:crosshair;border-radius:var(--radius);touch-action:none}
.sig-clear-btn{position:absolute;top:6px;right:8px;background:rgba(255,255,255,.85);border:1px solid var(--bdr);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;color:var(--mut)}
.sig-clear-btn:hover{color:var(--danger)}
.docket-history-item{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.btn-docket{background:#f0f4ff;border:1px solid #a0b0e8;color:#2a3a8a}
.btn-docket:hover{background:#e0e8ff}

/* ── Password screen ─────────────────────────────────────────────── */
.pw-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0d1f14 0%,#141920 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.pw-card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.pw-logo{text-align:center;margin-bottom:24px}
.pw-title{font-size:22px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;font-family:'Orbitron',sans-serif;letter-spacing:3px}
.pw-sub{font-size:13px;color:#7a907a;text-align:center;margin-bottom:28px}
.pw-input{width:100%;padding:13px 16px;font-size:16px;border:2px solid #c8d8c8;border-radius:10px;outline:none;font-family:inherit;color:#1a2a1a;background:#f4f6f4;letter-spacing:2px;text-align:center;transition:border-color .2s}
.pw-input:focus{border-color:#1e2730;background:#fff}
.pw-btn{width:100%;margin-top:14px;padding:14px;background:#1e2730;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.pw-btn:hover{background:#4a6741}
.pw-error{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;min-height:18px;font-weight:600}
.pw-hint{font-size:11px;color:#a8c0a8;text-align:center;margin-top:16px}

/* Status filter pills */
.status-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.status-pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.status-pill.active{border-color:var(--dk)}
.status-pill:hover{opacity:.85}
/* Status selector in job detail */
.status-selector{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.status-opt{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;opacity:.6}
.status-opt:hover{opacity:.85}

// Base fetch — handles GET, POST (insert/upsert), DELETE, PATCH
async function sbFetch(path, method="GET", body=null, extraHeaders={}){
  const headers={
    "apikey": SB_KEY,
    "Authorization": "Bearer "+SB_KEY,
    "Content-Type": "application/json",
    ...extraHeaders
  };
  const opts={method, headers};
  if(body!==null) opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+"/rest/v1/"+path, opts);
  if(!r.ok){
    const t=await r.text();
    throw new Error("Supabase "+method+" "+path+" → "+r.status+": "+t);
  }
  if(r.status===204) return null;
  const ct=r.headers.get("content-type")||"";
  return ct.includes("json")?r.json():null;
}

// Upsert: POST with Prefer: resolution=merge-duplicates
async function sbUpsert(table, rows){
  if(!rows||rows.length===0) return;
  return sbFetch(table, "POST", rows, {"Prefer":"resolution=merge-duplicates"});
}

// Delete by filter e.g. "job_id=eq.xxx"
async function sbDelete(table, filter){
  return sbFetch(table+"?"+filter, "DELETE");
}

// Select
async function sbSelect(table, query="select=*"){
  return sbFetch(table+"?"+query);
}

// ── Flatten jobs to/from DB rows ──────────────────────────────────────
function jobToRow(j){
  return{id:j.id,name:j.name,week:j.week,po:j.po||"",site_address:j.siteAddress||"",
    map_link:j.mapLink||"",client:j.client||"",client_contact:j.clientContact||"",
    client_phone:j.clientPhone||"",notes:j.notes||"",color:j.color||"#2d7a4a",
    job_number:j.jobNumber||"",created_at:j.createdAt||new Date().toISOString(),
    status:j.status||"confirmed"};
}

// ── Job number generator ──────────────────────────────────────────────
async function getNextJobNumber(){
  // Use highest existing job number + 1 (RPC has CORS issues from browser)
  const existing=state.jobs.map(j=>{
    const m=(j.jobNumber||"").match(/TG-(\d+)/);
    return m?parseInt(m[1]):0;
  });
  const next=existing.length>0?Math.max(...existing)+1:1;
  return "TG-"+String(next).padStart(3,"0");
}
function shiftToRow(s,jobId){
  return{id:s.id,job_id:jobId,date:s.date,day_label:s.dayLabel||"",
    start_time:s.startTime||"",end_time:s.endTime||""};
}
function personToRow(p,shiftId,jobId){
  return{id:p.id,shift_id:shiftId,job_id:jobId,role:p.role||"",name:p.name||"",
    phone:p.phone||"",company:p.company||"",riw:p.riw||false,
    riw_number:p.riwNumber||"",shift_start:p.shiftStart||"",shift_end:p.shiftEnd||""};
}
function staffToRow(s){
  return{id:s.id,name:s.name,phone:s.phone||"",role:s.role||"",company:s.company||"",
    riw:s.riw||false,riw_number:s.riwNumber||"",notes:s.notes||"",added_from:s.addedFrom||"manual",
    pin:s.pin||""};
}

// ── Load all data from Supabase ───────────────────────────────────────
async function loadFromSupabase(){
  try{
    const[jobRows,shiftRows,paxRows,staffRows]=await Promise.all([
      sbSelect("jobs","select=*&order=week"),
      sbSelect("shifts","select=*&order=date"),
      sbSelect("personnel","select=*"),
      sbSelect("staff","select=*&order=name"),
    ]);
    // Assemble jobs
    const jobs=jobRows.map(j=>({
      id:j.id,name:j.name,week:j.week,po:j.po,siteAddress:j.site_address,
      mapLink:j.map_link,client:j.client,clientContact:j.client_contact||"",
      clientPhone:j.client_phone||"",notes:j.notes,color:j.color,
      jobNumber:j.job_number||"",createdAt:j.created_at||"",
      status:j.status||"confirmed",shifts:[]
    }));
    const jobMap=Object.fromEntries(jobs.map(j=>[j.id,j]));
    // Assemble shifts
    const shiftMap={};
    shiftRows.forEach(s=>{
      const shift={id:s.id,date:s.date,dayLabel:s.day_label,startTime:s.start_time,
        endTime:s.end_time,personnel:[]};
      shiftMap[s.id]=shift;
      if(jobMap[s.job_id])jobMap[s.job_id].shifts.push(shift);
    });
    // Assemble personnel
    paxRows.forEach(p=>{
      const person={id:p.id,role:p.role,name:p.name,phone:p.phone,company:p.company,
        riw:p.riw,riwNumber:p.riw_number,shiftStart:p.shift_start,shiftEnd:p.shift_end};
      if(shiftMap[p.shift_id])shiftMap[p.shift_id].personnel.push(person);
    });
    // Sort shifts by date
    jobs.forEach(j=>j.shifts.sort((a,b)=>a.date.localeCompare(b.date)));
    // Staff
    const staff=staffRows.map(s=>({
      id:s.id,name:s.name,phone:s.phone,role:s.role,company:s.company,
      riw:s.riw,riwNumber:s.riw_number,notes:s.notes,addedFrom:s.added_from
    }));
    state.jobs=jobs;state.staff=staff;
    state.syncStatus="ok";SB_ONLINE=true;
    saveLocalBackup();
    console.log("Loaded from Supabase:",jobs.length,"jobs",staff.length,"staff");
    return true;
  }catch(e){
    console.warn("Supabase load failed:",e.message);
    SB_ONLINE=false;state.syncStatus="error";
    return false;
  }
}

// ── Push a full job to Supabase ───────────────────────────────────────
async function pushJobToSupabase(job){
  try{
    // Upsert job
    await sbUpsert("jobs",[jobToRow(job)]);
    // Delete existing shifts+personnel then re-insert (clean approach)
    // First delete personnel for this job's shifts
    await sbDelete("personnel","job_id=eq."+job.id);
    // Delete shifts
    await sbDelete("shifts","job_id=eq."+job.id);
    // Re-insert shifts
    if(job.shifts&&job.shifts.length>0){
      await sbFetch("shifts","POST",job.shifts.map(s=>shiftToRow(s,job.id)),{"Prefer":"return=minimal"});
      const allPax=job.shifts.flatMap(s=>(s.personnel||[]).map(p=>personToRow(p,s.id,job.id)));
      if(allPax.length>0) await sbFetch("personnel","POST",allPax,{"Prefer":"return=minimal"});
    }
    state.syncStatus="ok";SB_ONLINE=true;
    return true;
  }catch(e){
    console.error("pushJobToSupabase failed:",e.message);
    state.syncStatus="error";
    return false;
  }
}

async function deleteJobFromSupabase(jobId){
  try{
    await sbDelete("personnel","job_id=eq."+jobId);
    await sbDelete("shifts","job_id=eq."+jobId);
    await sbDelete("jobs","id=eq."+jobId);
    state.syncStatus="ok";
  }catch(e){console.error("deleteJob failed:",e.message);state.syncStatus="error";}
}

async function pushStaffToSupabase(member){
  try{
    await sbUpsert("staff",[staffToRow(member)]);

}

async function deleteStaffFromSupabase(id){

}

function saveLocalBackup(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({jobs:state.jobs,staff:state.staff,dockets:state.dockets||[],timesheets:state.timesheets||[],reports:state.reports||[],lastSaved:new Date().toISOString(),version:VERSION}));}catch(e){}
}

// ── Calendar ─────────────────────────────────────────────────────────
// WE convention: Mon–Sun. Anchor WE48 = Mon 25 May 2026 → Sun 31 May 2026
// Use noon (T12:00:00) to avoid UTC/AEST timezone boundary issues with toISOString()
function weToMon(w){const b=new Date("2026-05-25T12:00:00");b.setDate(b.getDate()+(w-48)*7);return b;}
function weToSun(w){const s=weToMon(w);s.setDate(s.getDate()+6);return s;}
function weToSat(w){return weToSun(w);}
function getDayDate(w,off){const s=weToMon(w);s.setDate(s.getDate()+off);return s;}
function fmt(d){return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short"});}
function fmtFull(d){return d.toLocaleDateString("en-AU",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}
// Use local date parts to avoid timezone shifting date string
function ds(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayDs(){return ds(new Date());}

// ── Week system ───────────────────────────────────────────────────────
// Sequence 47-104: 47-52=WE47-WE52(2026), 53-104=WE01-WE52(2027)
const TOTAL_WEEKS=104;
const ALL_WEEKS=Array.from({length:TOTAL_WEEKS-47+1},(_,i)=>i+47);
function displayWE(w){return w<=52?w:w-52;}
function weLabel(w){const dw=displayWE(w);const yr=w<=52?"2026":"2027";return `WE${String(dw).padStart(2,"0")} (${yr})`;}
// Mon=0 offset through Sun=6 offset from Monday
const DAY_OFF=[{l:"Mon",o:0},{l:"Tue",o:1},{l:"Wed",o:2},{l:"Thu",o:3},{l:"Fri",o:4},{l:"Sat",o:5},{l:"Sun",o:6}];

// ── State ─────────────────────────────────────────────────────────────
let state={jobs:[],staff:[],dockets:[],timesheets:[],reports:[],confirmations:{},statusFilter:null,view:"today",selectedJobId:null,visibleStart:48,weeksShown:3,syncStatus:"ok",lastSaved:null};

// ── Persistence ───────────────────────────────────────────────────────
function saveData(){
  // Local backup always
  saveLocalBackup();
  state.lastSaved=new Date().toISOString();
}
function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const data=JSON.parse(raw);
      state.jobs=data.jobs||[];
      state.staff=data.staff||[];
      state.dockets=data.dockets||[];
      state.lastSaved=data.lastSaved;
    }
  }catch(e){console.warn("loadData error:",e);}
  // Migrate from old key
  if(state.jobs.length===0){
    try{const old=localStorage.getItem("taver_scheduler_v1");if(old){const d=JSON.parse(old);state.jobs=d.jobs||[];}}catch(e){}
  }
  // Only seed if no Supabase configured AND nothing in local storage
  // Since we have Supabase, never inject seed — cloud will load real data
}

// ── Export/Import ─────────────────────────────────────────────────────
function exportAllData(){
  const data=JSON.stringify({jobs:state.jobs,exportedAt:new Date().toISOString(),version:VERSION},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`taver-scheduler-${ds(new Date())}.json`;a.click();
  URL.revokeObjectURL(url);toast("Data exported");
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.jobs&&Array.isArray(data.jobs)){state.jobs=data.jobs;saveData();toast("Imported — "+data.jobs.length+" jobs");render();}
      else toast("Invalid file");
    }catch{toast("Could not read file");}
  };
  reader.readAsText(file);
}

// ── DOM helpers ───────────────────────────────────────────────────────
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(9).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}
function badge(text,color){return el("span",{className:"badge",style:{background:color+"22",color,border:`1px solid ${color}44`}},text);}
function btn(text,cls,onClick){const b=el("button",{className:cls,onClick});b.textContent=text;return b;}
function field(labelText,input){const w=el("div",{className:"field"});w.appendChild(el("label",{},labelText));w.appendChild(input);return w;}
function toast(msg,dur=2500){const t=el("div",{className:"toast"},msg);document.body.appendChild(t);setTimeout(()=>t.remove(),dur);}

// ── Modal ─────────────────────────────────────────────────────────────
function modal(title,buildFn){
  const overlay=el("div",{className:"overlay",onClick:e=>{if(e.target===overlay)overlay.remove();}});
  const m=el("div",{className:"modal"});
  const hdr=el("div",{className:"modal-hdr"});
  hdr.appendChild(el("span",{style:{fontWeight:700,fontSize:16,color:"var(--txt)"}},title));
  const xb=btn("✕","btn-g btn-sm",()=>overlay.remove());
  hdr.appendChild(xb);m.appendChild(hdr);
  const body=el("div",{className:"modal-body"});
  buildFn(body,()=>overlay.remove());
  m.appendChild(body);overlay.appendChild(m);
  document.getElementById("app").appendChild(overlay);
}

// ── Calendar helpers ─────────────────────────────────────────────────
function calDateStr(date, time){
  return date.replace(/-/g,"")+"T"+time.replace(":","")+"00";
}

function buildGCalLink(person, job, shift, shiftStart, shiftEnd){
  const d = shift.date.replace(/-/g,"");
  const st = shiftStart.replace(":","")+"00";
  const et = shiftEnd.replace(":","")+"00";
  const nameKey = person.name.trim().toLowerCase();
  const sc = (shift.personnel||[]).find(p=>p.name&&(p.role==="Superintendent"||p.role==="Foreman")&&p.name.trim().toLowerCase()!==nameKey);
  const title = encodeURIComponent(`${job.name} - ${person.role}`);
  const loc   = encodeURIComponent(job.siteAddress||"");
  let details = "Taver Group";
  if(job.client)        details += ` | Client: ${job.client}`;
  if(job.po)            details += ` | PO: ${job.po}`;
  if(job.clientContact) details += ` | Client contact: ${job.clientContact}${job.clientPhone?" "+job.clientPhone:""}`;
  if(sc)                details += ` | Taver contact: ${sc.name}${sc.phone?" "+sc.phone:""}`;
  if(job.mapLink)       details += ` | Map: ${job.mapLink}`;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${d}T${st}/${d}T${et}&location=${loc}&details=${encodeURIComponent(details)}&ctz=Australia/Sydney`;
}

// ── Build and upload .ics to Supabase Storage, return public URL ──────
function buildICSContent(person, job, shift, shiftStart, shiftEnd){
  const d   = shift.date.replace(/-/g,"");
  const st  = shiftStart.replace(":","")+"00";
  const et  = shiftEnd.replace(":","")+"00";
  const now = new Date().toISOString().replace(/[-:.]/g,"").slice(0,15)+"Z";
  const nameKey = person.name.trim().toLowerCase();
  const sc  = (shift.personnel||[]).find(p=>p.name&&(p.role==="Superintendent"||p.role==="Foreman")&&p.name.trim().toLowerCase()!==nameKey);
  const crew= (shift.personnel||[]).filter(p=>p.name&&p.name.trim().toLowerCase()!==nameKey).map(p=>`${p.role}: ${p.name}`).join(", ");
  let desc  = "Taver Group";
  if(job.client)        desc += `\\nClient: ${job.client}`;
  if(job.po)            desc += `\\nPO: ${job.po}`;
  if(job.clientContact) desc += `\\nClient contact: ${job.clientContact}${job.clientPhone?" "+job.clientPhone:""}`;
  if(sc)                desc += `\\nTaver contact: ${sc.name}${sc.phone?" "+sc.phone:""}`;
  if(crew)              desc += `\\nCrew: ${crew}`;
  if(job.mapLink)       desc += `\\nMap: ${job.mapLink}`;
  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Taver Group Scheduler//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `UID:${shift.id}-${Date.now()}@taver`,
    `DTSTAMP:${now}`,
    `DTSTART;TZID=Australia/Sydney:${d}T${st}`,
    `DTEND;TZID=Australia/Sydney:${d}T${et}`,
    `SUMMARY:${job.name} - ${person.role}`,
    `LOCATION:${(job.siteAddress||"").replace(/,/g,"\\,")}`,
    `DESCRIPTION:${desc}`,
    "END:VEVENT",
    "END:VCALENDAR"
  ].join("\r\n");
}

async function uploadICS(person, job, shift, shiftStart, shiftEnd){
  try{
    const ics = buildICSContent(person, job, shift, shiftStart, shiftEnd);
    const blob = new Blob([ics], {type:"text/calendar;charset=utf-8"});
    // Filename: safe person name + shift date
    const safeName = person.name.replace(/[^a-zA-Z0-9]/g,"-").toLowerCase();
    const fileName = `${safeName}-${shift.date}-${shift.id.slice(-4)}.ics`;
    const res = await fetch(
      `${SB_URL}/storage/v1/object/shifts/${fileName}`,
      {
        method:"POST",
        headers:{
          "apikey": SB_KEY,
          "Authorization": `Bearer ${SB_KEY}`,
          "Content-Type": "text/calendar",
          "x-upsert": "true"
        },
        body: blob
      }
    );
    if(!res.ok){
      const t=await res.text();
      console.error("ICS upload failed:",t);
      return null;
    }
    // Return public URL
    return `${SB_URL}/storage/v1/object/public/shifts/${fileName}`;
  }catch(e){
    console.error("uploadICS error:",e);
    return null;
  }
}

// ── Personalised SMS — now async to upload ICS files ─────────────────
async function buildPersonalSMSAsync(person, job, allShifts){
  const firstName = person.name.split(" ")[0];
  const personNameKey = person.name.trim().toLowerCase();

  // Upload ICS for each shift and get public URLs
  const shiftData = await Promise.all(allShifts.map(async shift=>{
    const myEntry = (shift.personnel||[]).find(px=>px.name&&px.name.trim().toLowerCase()===personNameKey)||person;
    const shiftStart = myEntry.shiftStart||shift.startTime;
    const shiftEnd   = myEntry.shiftEnd||shift.endTime;
    const icsUrl = await uploadICS(person, job, shift, shiftStart, shiftEnd);
    return {shift, shiftStart, shiftEnd, icsUrl};
  }));

  const shiftBlocks = shiftData.map(({shift, shiftStart, shiftEnd, icsUrl})=>{
    const date    = fmtFull(new Date(shift.date+"T12:00:00"));
    const calLink = buildGCalLink(person, job, shift, shiftStart, shiftEnd);

    let block = `DATE: ${date}\n`;
    block += `TIME: ${shiftStart} - ${shiftEnd}\n`;
    if(job.jobNumber) block += `JOB NO: ${job.jobNumber}\n`;
    if(job.siteAddress) block += `SITE: ${job.siteAddress}\n`;
    if(job.mapLink)     block += `MAP: ${job.mapLink}\n`;
    if(job.clientContact){
      block += `CLIENT CONTACT: ${job.clientContact}`;
      if(job.clientPhone) block += ` - ${job.clientPhone}`;
      block += `\n`;
    }

    const sc = (shift.personnel||[]).find(px=>
      px.name&&(px.role==="Superintendent"||px.role==="Foreman")&&
      px.name.trim().toLowerCase()!==personNameKey
    );
    if(sc){
      block += `SITE CONTACT: ${sc.name} (${sc.role})`;
      if(sc.phone) block += ` - ${sc.phone}`;
      block += `\n`;
    }

    const crew = (shift.personnel||[]).filter(px=>
      px.name&&px.name.trim().toLowerCase()!==personNameKey
    );
    if(crew.length>0){
      block += `CREW:\n`;
      crew.forEach(px=>{
        block += `  - ${px.role}: ${px.name}`;
        if(px.phone) block += ` (${px.phone})`;
        block += `\n`;
      });
    }

    block += `ADD TO CALENDAR:\n`;
    block += `  Google: ${calLink}\n`;
    if(icsUrl) block += `  iPhone / Apple: ${icsUrl}\n`;

    return block;
  });

  let msg = `Hi ${firstName},\n\n`;
  msg += `Your upcoming shifts for ${job.name}`;
  if(job.jobNumber) msg += ` [${job.jobNumber}]`;
  if(job.po)     msg += ` (${job.po})`;
  if(job.client) msg += ` - ${job.client}`;
  msg += `:\n`;
  msg += `Job No: ${job.jobNumber||"TBA"}\n`;
  msg += `Role: ${person.role}\n`;
  // Shift summary line
  const summary = allShifts.map(shift=>{
    const myEntry2=(shift.personnel||[]).find(px=>px.name&&px.name.trim().toLowerCase()===personNameKey)||person;
    const ss=myEntry2.shiftStart||shift.startTime;
    const se=myEntry2.shiftEnd||shift.endTime;
    return `${shift.dayLabel} ${fmt(new Date(shift.date+"T12:00:00"))} ${ss}-${se}`;
  }).join(", ");
  msg += `Shifts: ${summary}\n`;
  msg += `====================\n`;
  msg += shiftBlocks.join("--------------------\n");
  msg += `====================\n`;
  msg += `Tap a calendar link to add each shift to your calendar.\n\n`;
  msg += `Please confirm receipt.\nTaver Group`;
  return msg;
}

    (shift.personnel||[]).forEach(p=>{
      if(!p.name)return;
      const key=p.name.trim().toLowerCase();
      if(!peopleMap[key]) peopleMap[key]={person:p,shifts:[]};

    window.open(`sms:?body=${encodeURIComponent(buildCrewText(job,shift,"sms"))}`);
  }));

// ── PDF Export ────────────────────────────────────────────────────────
function exportJobPDF(job){
  const sat=weToSun(job.week);const mon=weToMon(job.week);
  const totalSlots=(job.shifts||[]).reduce((a,s)=>a+(s.personnel||[]).length,0);
  const filledSlots=(job.shifts||[]).reduce((a,s)=>a+(s.personnel||[]).filter(p=>p.name).length,0);
  const riwTotal=(job.shifts||[]).reduce((a,s)=>a+(s.personnel||[]).filter(p=>p.riw).length,0);
  const genDate=new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"long",year:"numeric"});

  let shiftsHtml="";
  (job.shifts||[]).forEach((sh,idx)=>{
    const shDate=new Date(sh.date+"T12:00:00");
    const dayFull=shDate.toLocaleDateString("en-AU",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
    const riwCount=(sh.personnel||[]).filter(p=>p.riw).length;
    const namedCount=(sh.personnel||[]).filter(p=>p.name).length;
    const tbaCount=(sh.personnel||[]).length-namedCount;

    let rowsHtml="";
    (sh.personnel||[]).forEach((p,i)=>{
      const isTBA=!p.name;
      const bg=isTBA?"#fffbf0":i%2===0?"#ffffff":"#f7faf7";
      const nameStyle=isTBA?"color:#b08800;font-style:italic;font-weight:500":"font-weight:700;color:#0d1f12";
      const riwStyle=p.riw?"color:#0d6b3a;font-weight:800;font-size:11px":"color:#aaa;font-size:11px";
      rowsHtml+=`<tr style="background:${bg}">
        <td style="width:28px;text-align:center;color:#aaa;font-size:11px;padding:8px 4px;border-bottom:1px solid #e8ede8">${i+1}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;color:#2d4a2d;font-size:12px">${p.role}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;${nameStyle};font-size:13px">${p.name||"TBA — Unassigned"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;font-size:12px;color:#444">${p.phone||"—"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;font-size:12px;color:#444">${p.company||"—"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;${riwStyle}">${p.riw?(p.riwNumber||"✓ RIW"):"—"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e8ede8;font-size:12px;color:#444;white-space:nowrap">${p.shiftStart||sh.startTime}–${p.shiftEnd||sh.endTime}</td>
      </tr>`;
    });
    if((sh.personnel||[]).length===0){
      rowsHtml=`<tr><td colspan="7" style="padding:16px;text-align:center;color:#aaa;font-style:italic;font-size:12px">No personnel assigned to this shift</td></tr>`;
    }

    const pillStyle=(color,bg)=>`display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${bg};color:${color};margin-left:8px`;

    shiftsHtml+=`
    <div style="margin:0 28px 24px;break-inside:avoid">
      <div style="background:linear-gradient(135deg,#1a3a2a 0%,#2d5a3d 100%);border-radius:8px 8px 0 0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="color:#7fb069;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px">Shift ${idx+1}</span>
          <div style="color:#fff;font-size:14px;font-weight:800;margin-top:2px">${dayFull}</div>
          <div style="color:#a0c8a0;font-size:12px;margin-top:2px">${sh.startTime} – ${sh.endTime}</div>
        </div>
        <div style="text-align:right">
          <span style="${pillStyle("#0d6b3a","#eaf5ec")}">${riwCount} RIW</span>
          <span style="${pillStyle("#1a5276","#eaf4fb")}">${(sh.personnel||[]).length} Personnel</span>
          ${tbaCount>0?`<span style="${pillStyle("#7a5500","#fff8e1")}">${tbaCount} TBA</span>`:""}
          <div style="color:#a0c8a0;font-size:11px;margin-top:6px">${namedCount}/${(sh.personnel||[]).length} filled</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid #d0e0d0;border-top:none;border-radius:0 0 8px 8px;overflow:hidden">
        <thead>
          <tr style="background:#f0f7f0">
            <th style="padding:7px 4px;text-align:center;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0;width:28px">#</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">Role</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">Name</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">Phone</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">Company</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">RIW Card No.</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;color:#2d5a3d;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #c0d8c0">Shift Time</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
  });

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8">

function exportWeekPDF(week){
  const wjobs=state.jobs.filter(j=>j.week===week);
  if(wjobs.length===0){toast("No jobs in WE"+week);return;}
  const sun=weToSun(week),sat=weToMon(week);
  const allShifts=wjobs.flatMap(j=>(j.shifts||[]).map(s=>({...s,jobName:j.name,jobColor:j.color}))).sort((a,b)=>a.date.localeCompare(b.date));
  const total=allShifts.reduce((a,s)=>a+s.personnel.length,0);
  const filled=allShifts.reduce((a,s)=>a+s.personnel.filter(p=>p.name).length,0);
  const riw=allShifts.reduce((a,s)=>a+s.personnel.filter(p=>p.riw).length,0);
  let html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>WE${week} — Weekly Report</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;color:#111;font-size:12px}
.hdr{background:#1a3a2a;color:#fff;padding:20px 28px}.hdr h1{font-size:19px;margin-bottom:3px}.hdr p{font-size:12px;color:#a0c8a0}

.stat .v{font-size:20px;font-weight:800;color:#2d5a3d;line-height:1}.stat .l{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.job-section{margin:16px 28px 0}.job-hdr{padding:8px 12px;color:#fff;font-weight:700;font-size:12px;border-radius:4px 4px 0 0}
.sh-hdr{background:#f0f4f0;padding:6px 10px;font-size:11px;color:#2d5a3d;font-weight:700;border:1px solid #ccd;border-top:none}
table{width:100%;border-collapse:collapse;font-size:11px}th{background:#f8fbf8;text-align:left;padding:6px 8px;border:1px solid #dde8dd;color:#555;font-size:9px;text-transform:uppercase}
td{padding:5px 8px;border:1px solid #dde8dd;vertical-align:top}tr:nth-child(even) td{background:#fafcfa}
.riw{color:#1a6a4a;font-weight:700}.tba{color:#999;font-style:italic}
.footer{padding:12px 28px;border-top:1px solid #ccc;font-size:10px;color:#888;margin-top:20px;display:flex;justify-content:space-between}
@media print{@page{margin:10mm}body{margin:0}}</style></head><body>
<div class="hdr"><h1>TAVER GROUP — WEEKLY REPORT</h1><p>${weLabel(week)} &nbsp;·&nbsp; ${fmt(sun)} – ${fmt(sat)}</p></div>
<div class="stats"><div class="stat"><div class="v">${wjobs.length}</div><div class="l">Jobs</div></div><div class="stat"><div class="v">${allShifts.length}</div><div class="l">Shifts</div></div><div class="stat"><div class="v">${total}</div><div class="l">Slots</div></div><div class="stat"><div class="v">${filled}/${total}</div><div class="l">Staffed</div></div><div class="stat"><div class="v">${riw}</div><div class="l">RIW</div></div></div>`;
  wjobs.forEach(job=>{
    html+=`<div class="job-section"><div class="job-hdr" style="background:${job.color}">${job.name}${job.po?" — "+job.po:""}${job.client?" | "+job.client:""}</div>`;
    (job.shifts||[]).forEach(sh=>{

// ── At a Glance ───────────────────────────────────────────────────────
function buildAtAGlance(){
  const now=new Date();
  // Find current WE
  let curWE=47;
  for(let w=47;w<=TOTAL_WEEKS;w++){if(weToSat(w)>=now){curWE=w;break;}}

  // Show from WE47 or current week (whichever is earlier) through next 11 weeks
  const startWE=Math.min(47,curWE);
  const weeksToShow=[];
  for(let w=startWE;w<=Math.min(startWE+11,TOTAL_WEEKS);w++) weeksToShow.push(w);
  // Also prepend any week before startWE that has jobs
  if(startWE>1){
    const prevJobs=state.jobs.filter(j=>j.week===startWE-1);
    if(prevJobs.length>0) weeksToShow.unshift(startWE-1);
  }

  const wrap=el("div",{className:"glance-wrap"});
  const title=el("div",{className:"glance-title"});
  title.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> At a Glance — Upcoming ${weeksToShow.length} Weeks`;
  wrap.appendChild(title);

  const scroll=el("div",{className:"glance-scroll"});
  const inner=el("div",{className:"glance-inner"});

  weeksToShow.forEach(week=>{
    const isCurrent=week===curWE;
    const wjobs=state.jobs.filter(j=>j.week===week);
    const sun=weToSun(week),sat=weToMon(week);

    if(wjobs.length===0){
      // Show quiet week as empty placeholder
      const card=el("div",{className:"glance-nowork"});
      card.innerHTML=`<div style="text-align:center"><div style="font-size:11px;font-weight:800;color:var(--mut)">${weLabel(week)}</div><div style="font-size:9px;color:var(--bdr2);margin-top:2px">${fmt(sun)}–${fmt(sat)}</div><div style="font-size:10px;color:var(--bdr2);margin-top:6px">No jobs</div></div>`;
      inner.appendChild(card);
      return;
    }

    const card=el("div",{className:`glance-week${isCurrent?" current-week":""}`});

    // Header
    card.appendChild(el("div",{className:"glance-we"},weLabel(week)));
    card.appendChild(el("div",{className:"glance-dates"},`${fmt(sun)} – ${fmt(sat)}`));

    // Job rows
    const jobsDiv=el("div",{className:"glance-jobs"});
    wjobs.forEach(job=>{
      const totalPax=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.length||0),0);
      const filled=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.filter(p=>p.name).length||0),0);
      const hasConflict=(job.shifts||[]).some(sh=>(sh.personnel||[]).some(p=>p.name&&checkPersonConflicts(p.name,sh.date,job.id).length>0));
      const unfilled=totalPax-filled;

      const row=el("div",{className:"glance-job-row",onClick:()=>{state.selectedJobId=job.id;render();}});
      row.appendChild(el("div",{className:"glance-color",style:{background:job.color}}));
      row.appendChild(el("div",{className:"glance-job-name",title:job.name},job.name));

      const badges=el("div",{className:"glance-badges"});
      if((job.shifts||[]).length>0){
        badges.appendChild(el("span",{className:"gb gb-shifts"},(job.shifts||[]).length+"s"));
      }
      if(hasConflict){
        badges.appendChild(el("span",{className:"gb gb-warn"},"⚠"));
      }
      if(unfilled>0){
        badges.appendChild(el("span",{className:"gb gb-empty"},unfilled+" TBA"));
      }
      row.appendChild(badges);
      jobsDiv.appendChild(row);
    });
    card.appendChild(jobsDiv);

    // Staffing bar across all jobs this week
    const totalPaxWeek=wjobs.reduce((a,j)=>a+(j.shifts||[]).reduce((b,s)=>b+(s.personnel?.length||0),0),0);
    const filledWeek=wjobs.reduce((a,j)=>a+(j.shifts||[]).reduce((b,s)=>b+(s.personnel?.filter(p=>p.name).length||0),0),0);
    if(totalPaxWeek>0){
      const pct=Math.round((filledWeek/totalPaxWeek)*100);
      const barColor=pct===100?"var(--green)":pct>=60?"var(--amber)":"var(--danger)";
      const barWrap=el("div",{className:"glance-staffbar-wrap"});
      const bar=el("div",{className:"glance-staffbar"});
      const fill=el("div",{className:"glance-staffbar-fill",style:{width:pct+"%",background:barColor}});
      bar.appendChild(fill);
      const lbl=el("div",{className:"glance-stafflabel"});
      lbl.appendChild(el("span",{},`${filledWeek}/${totalPaxWeek} staffed`));
      lbl.appendChild(el("span",{style:{color:barColor,fontWeight:700}},pct+"%"));
      barWrap.appendChild(bar);barWrap.appendChild(lbl);
      card.appendChild(barWrap);
    }

    inner.appendChild(card);
  });

  scroll.appendChild(inner);
  wrap.appendChild(scroll);
  return wrap;
}

// ── Conflict detection ────────────────────────────────────────────────
// Returns array of conflict objects: {name, date, jobs:[{jobName,shiftTime},...]}
function detectConflicts(){
  const conflicts=[];
  // Build map: personName -> [{date, jobId, jobName, shiftTime, jobColor}]
  const map={};
  state.jobs.forEach(job=>{
    (job.shifts||[]).forEach(sh=>{
      (sh.personnel||[]).forEach(p=>{
        if(!p.name) return; // skip TBA
        const key=p.name.trim().toLowerCase();
        if(!map[key]) map[key]={name:p.name.trim(), slots:[]};
        map[key].slots.push({
          date:sh.date, jobId:job.id,
          jobName:job.name, jobColor:job.color,
          shiftTime:`${sh.startTime}–${sh.endTime}`,
          paxShiftTime:p.shiftStart?`${p.shiftStart}–${p.shiftEnd}`:null,
        });
      });
    });
  });
  // Find any person with 2+ slots on the same date across DIFFERENT jobs
  Object.values(map).forEach(({name,slots})=>{
    // Group by date
    const byDate={};
    slots.forEach(s=>{
      if(!byDate[s.date]) byDate[s.date]=[];
      byDate[s.date].push(s);
    });
    Object.entries(byDate).forEach(([date,daySlots])=>{
      const uniqueJobs=[...new Set(daySlots.map(s=>s.jobId))];
      if(uniqueJobs.length>1){
        conflicts.push({name, date, slots:daySlots});
      }
    });
  });
  return conflicts;
}

// Check conflicts for a specific person being added/updated to a shift
// Returns array of conflicting slot descriptions (empty = no conflict)
function checkPersonConflicts(name, date, currentJobId){
  if(!name||!date) return [];
  const key=name.trim().toLowerCase();
  const clashes=[];
  state.jobs.forEach(job=>{
    if(job.id===currentJobId) return; // same job is fine
    (job.shifts||[]).forEach(sh=>{
      if(sh.date!==date) return;
      const found=(sh.personnel||[]).find(p=>p.name&&p.name.trim().toLowerCase()===key);
      if(found){
        clashes.push({jobName:job.name, jobColor:job.color, shiftTime:`${sh.startTime}–${sh.endTime}`});
      }
    });
  });
  return clashes;
}

function addPerson(jobId,sid,data){
  const job=getJob(jobId);const sh=job?.shifts.find(s=>s.id===sid);if(!sh)return;
  if(data.name){

function updatePerson(jobId,sid,pid,data){
  const job=getJob(jobId);const sh=job?.shifts.find(s=>s.id===sid);if(!sh)return;
  if(data.name){
    const clashes=checkPersonConflicts(data.name,sh.date,jobId);
    // exclude the person's own existing entry from clash check
    const realClashes=clashes.filter(c=>c.jobName!==job.name);
    if(realClashes.length>0){
      const lines=realClashes.map(c=>`• ${c.jobName} (${c.shiftTime})`).join("\n");
      const go=confirm(`⚠️ SCHEDULING CONFLICT\n\n${data.name} is already assigned to another job on this day:\n\n${lines}\n\nSave anyway?`);
      if(!go)return;
    }
  }
  const i=sh.personnel.findIndex(p=>p.id===pid);
  if(i>=0)sh.personnel[i]={...sh.personnel[i],...data};
  saveData();render();const _upjob=getJob(jobId);if(_upjob)pushJobToSupabase(_upjob).then(()=>updateSyncDot());
}

function deletePerson(jobId,sid,pid){const job=getJob(jobId);const sh=job?.shifts.find(s=>s.id===sid);if(!sh)return;sh.personnel=sh.personnel.filter(p=>p.id!==pid);saveData();render();if(job)pushJobToSupabase(job).then(()=>updateSyncDot());}

// ── Resource Scheduler ───────────────────────────────────────────────
function buildResourceScheduler(main){
  // State
  if(!state.schedView) state.schedView='week';
  if(!state.schedOffset) state.schedOffset=0;

  // Get all unique staff across all jobs/shifts
  function getAllStaff(){
    const map=new Map();
    state.jobs.forEach(job=>{
      (job.shifts||[]).forEach(shift=>{
        (shift.personnel||[]).forEach(p=>{
          if(p.name&&p.name.trim()){
            const key=p.name.trim();
            if(!map.has(key)) map.set(key,{name:p.name.trim(),role:p.role||'',company:p.company||'',initials:p.name.trim().split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()});
          }
        });
      });
    });
    // Also include staff directory members
    (state.staff||[]).forEach(s=>{
      if(s.name&&!map.has(s.name)){
        map.set(s.name,{name:s.name,role:s.role||'',company:s.company||'',initials:s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()});
      }
    });
    return Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name));
  }

  function getCols(){
    if(state.schedView==='day') return 1;
    if(state.schedView==='week') return 7;
    if(state.schedView==='fortnight') return 14;
    return 30;
  }

  function getStartDate(){
    // Anchor to today
    const today=new Date();today.setHours(0,0,0,0);
    const cols=getCols();
    // For week, start on Monday
    if(state.schedView==='week'){
      const day=today.getDay();
      const mon=new Date(today);mon.setDate(today.getDate()-(day===0?6:day-1));
      mon.setDate(mon.getDate()+state.schedOffset*7);
      return mon;
    }
    const d=new Date(today);
    d.setDate(d.getDate()+state.schedOffset*cols);
    return d;
  }

  function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
  function toDateStr(d){return d.toISOString().slice(0,10);}
  function fmtColHdr(d,cols){
    if(cols===1) return d.toLocaleDateString('en-AU',{weekday:'long',day:'2-digit',month:'long'});
    if(cols<=7) return d.toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'});
    return d.toLocaleDateString('en-AU',{weekday:'short',day:'2-digit'});
  }
  function fmtPeriod(){
    const cols=getCols();const start=getStartDate();const end=addDays(start,cols-1);
    if(cols===1) return start.toLocaleDateString('en-AU',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    return start.toLocaleDateString('en-AU',{day:'2-digit',month:'short'})+' – '+end.toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
  }

  // Get shifts for a staff member on a specific date
  function getShiftsForStaffDate(staffName,dateStr){
    const results=[];
    state.jobs.forEach(job=>{
      (job.shifts||[]).forEach(shift=>{
        if(shift.date!==dateStr) return;
        (shift.personnel||[]).forEach((p,pi)=>{
          if(p.name&&p.name.trim()===staffName){
            results.push({job,shift,personnel:p,pIdx:pi});
          }
        });
      });
    });
    return results;
  }

  const allStaff=getAllStaff();
  const cols=getCols();
  const startDate=getStartDate();
  const today=new Date();today.setHours(0,0,0,0);

  // ── Drag state ────────────────────────────────────────────────────
  let dragData=null;

  // ── Build UI ──────────────────────────────────────────────────────
  // Toolbar
  const toolbar=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}});

  // Period nav
  const navRow=el('div',{style:{display:'flex',alignItems:'center',gap:8}});
  const prevBtn=btn('←','btn-s btn-sm',()=>{state.schedOffset--;render();});
  const nextBtn=btn('→','btn-s btn-sm',()=>{state.schedOffset++;render();});
  const todayBtn=btn('Today','btn-s btn-sm',()=>{state.schedOffset=0;render();});
  const periodLabel=el('span',{style:{fontSize:13,fontWeight:600,color:'var(--txt)',minWidth:180,textAlign:'center'}},fmtPeriod());
  navRow.appendChild(prevBtn);navRow.appendChild(periodLabel);navRow.appendChild(nextBtn);navRow.appendChild(todayBtn);
  toolbar.appendChild(navRow);

  // View toggles
  const viewBtns=el('div',{style:{display:'flex',gap:4}});
  ['day','week','fortnight','month'].forEach(v=>{
    const b=btn(v.charAt(0).toUpperCase()+v.slice(1),'btn-s btn-sm',()=>{state.schedView=v;state.schedOffset=0;render();});
    if(state.schedView===v){b.style.background='var(--acc)';b.style.color='#fff';b.style.borderColor='var(--acc)';}
    viewBtns.appendChild(b);
  });
  toolbar.appendChild(viewBtns);
  main.appendChild(toolbar);

  // ── Scheduler container ───────────────────────────────────────────
  const container=el('div',{style:{border:'1px solid var(--bdr)',borderRadius:'var(--radius)',overflow:'hidden',background:'var(--bg2)'}});

  // Column header row
  const STAFF_COL_W=160;
  const COL_W=Math.max(cols<=7?110:cols<=14?72:40,40);

  const headerRow=el('div',{style:{display:'flex',position:'sticky',top:'0',zIndex:10,background:'var(--bg3)',borderBottom:'1px solid var(--bdr)'}});
  // Staff col header
  const staffHdr=el('div',{style:{width:STAFF_COL_W+'px',flexShrink:0,padding:'8px 12px',fontSize:11,fontWeight:700,color:'var(--mut)',textTransform:'uppercase',letterSpacing:'.6px',borderRight:'1px solid var(--bdr)'}});
  staffHdr.textContent='Staff Member';
  headerRow.appendChild(staffHdr);

  // Date columns header
  const datesHdr=el('div',{style:{display:'flex',flex:1,overflow:'hidden'}});
  for(let c=0;c<cols;c++){
    const d=addDays(startDate,c);
    const isToday=toDateStr(d)===toDateStr(today);

      width:COL_W+'px',flexShrink:0,padding:'6px 4px',textAlign:'center',
      fontSize:cols>14?10:11,fontWeight:isToday?700:500,
      color:isToday?'var(--acc)':'var(--mut)',
      borderRight:'1px solid var(--bdr)',
      background:isToday?'rgba(255,85,0,.06)':''
    }});
    ch.textContent=fmtColHdr(d,cols);
    datesHdr.appendChild(ch);
  }
  headerRow.appendChild(datesHdr);
  container.appendChild(headerRow);

  // ── Staff rows ────────────────────────────────────────────────────
  const bodyWrap=el('div',{style:{overflowX:'auto',maxHeight:'calc(100vh - 280px)',overflowY:'auto'}});

  allStaff.forEach(staff=>{
    const row=el('div',{style:{display:'flex',borderBottom:'1px solid var(--bdr)',minHeight:'56px'}});

    // Staff name cell
    const nameCell=el('div',{style:{
      width:STAFF_COL_W+'px',flexShrink:0,padding:'8px 10px',
      borderRight:'1px solid var(--bdr)',display:'flex',alignItems:'center',
      gap:8,background:'var(--bg2)',position:'sticky',left:0,zIndex:2
    }});
    const av=el('div',{style:{
      width:28,height:28,borderRadius:'50%',background:'var(--acc-light)',
      color:'var(--acc)',fontSize:10,fontWeight:700,display:'flex',
      alignItems:'center',justifyContent:'center',flexShrink:0
    }});
    av.textContent=staff.initials;
    const nameInfo=el('div',{style:{minWidth:0}});
    nameInfo.appendChild(el('div',{style:{fontSize:12,fontWeight:600,color:'var(--txt)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},staff.name));
    nameInfo.appendChild(el('div',{style:{fontSize:10,color:'var(--mut)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},staff.role));
    nameCell.appendChild(av);nameCell.appendChild(nameInfo);
    row.appendChild(nameCell);

    // Date cells
    const cellsWrap=el('div',{style:{display:'flex',flex:1}});
    for(let c=0;c<cols;c++){
      const d=addDays(startDate,c);
      const dateStr=toDateStr(d);
      const isToday=dateStr===toDateStr(today);
      const cell=el('div',{style:{
        width:COL_W+'px',flexShrink:0,borderRight:'1px solid var(--bdr)',
        padding:'3px',position:'relative',minHeight:'56px',
