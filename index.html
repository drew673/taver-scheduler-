    // At a Glance
    main.appendChild(buildAtAGlance());
    // Conflict banner
    const cb=buildConflictBanner();
    if(cb)main.appendChild(cb);
    main.appendChild(buildStats());

    if(state.view==="grid"){
      buildResourceScheduler(main);
    }

    if(state.view==="list"){
      // Jobs header with Parse Email button
      const jobsHdr=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}});
      jobsHdr.appendChild(el("h2",{style:{color:"var(--dk)"}},"Jobs"));
      jobsHdr.appendChild(btn("📧 Parse Email → Job","btn-s btn-sm",()=>showParseEmailModal()));
      main.appendChild(jobsHdr);

      if(state.jobs.length===0){main.appendChild(el("div",{className:"empty"},"No jobs yet. Tap + New Job to get started."));}
      else{
        // Status filter pills
        const filterRow=el("div",{className:"status-filter-row"});
        const allPill=el("div",{className:"status-pill active",style:{background:"var(--bg3)",color:"var(--txt)"},
          onClick:()=>{state.statusFilter=null;render();},"data-all":"1"},"All ("+state.jobs.length+")");
        if(!state.statusFilter)allPill.className="status-pill active";
        filterRow.appendChild(allPill);
        JOB_STATUSES.forEach(s=>{
          const count=state.jobs.filter(j=>(j.status||"confirmed")===s.id).length;
          if(count===0)return;
          const pill=el("div",{className:"status-pill"+(state.statusFilter===s.id?" active":""),
            style:{background:s.bg,color:s.color,borderColor:s.border},
            onClick:()=>{state.statusFilter=s.id;render();}},s.label+" ("+count+")");
          filterRow.appendChild(pill);
        });
        main.appendChild(filterRow);
      }
      const filteredJobs=state.statusFilter?state.jobs.filter(j=>(j.status||"confirmed")===state.statusFilter):state.jobs;
      if(filteredJobs.length===0)main.appendChild(el("div",{className:"empty"},"No "+JOB_STATUSES.find(s=>s.id===state.statusFilter)?.label+" jobs."));
      [...filteredJobs].sort((a,b)=>a.week-b.week).forEach(job=>{
        const tp=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.length||0),0);
        const fi=(job.shifts||[]).reduce((a,s)=>a+(s.personnel?.filter(p=>p.name).length||0),0);
        const row=el("div",{className:"job-row",style:{borderLeft:`4px solid ${job.color}`},onClick:()=>{state.selectedJobId=job.id;render();}});
        const left=el("div",{style:{minWidth:0}});
        const tr2=el("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}});
        tr2.appendChild(el("span",{style:{fontWeight:700,fontSize:15,color:"var(--txt)"}},job.name));
        if(job.jobNumber)tr2.appendChild(badge(job.jobNumber,"var(--mid)"));
        tr2.appendChild(badge(weLabel(job.week),job.color));
        tr2.appendChild(statusBadge(job));
        if(job.po)tr2.appendChild(badge(job.po,"var(--mut)"));
        const m=el("div",{style:{fontSize:12,color:"var(--mut)",display:"flex",gap:10,flexWrap:"wrap"}});
        if(job.client)m.appendChild(el("span",{},job.client));if(job.siteAddress)m.appendChild(el("span",{},job.siteAddress));
        left.appendChild(tr2);left.appendChild(m);
        const right=el("div",{style:{display:"flex",gap:10,alignItems:"center",flexShrink:0}});
        const s1=el("div",{style:{textAlign:"center"}});s1.innerHTML=`<div style="font-size:17px;font-weight:800;color:${job.color}">${job.shifts?.length||0}</div><div style="font-size:9px;color:var(--mut);text-transform:uppercase">Shifts</div>`;
        const s2=el("div",{style:{textAlign:"center"}});s2.innerHTML=`<div style="font-size:17px;font-weight:800;color:var(--green)">${fi}/${tp}</div><div style="font-size:9px;color:var(--mut);text-transform:uppercase">Staffed</div>`;
        right.appendChild(s1);right.appendChild(s2);right.appendChild(el("span",{style:{color:"var(--mut)",fontSize:16}},"›"));
        row.appendChild(left);row.appendChild(right);main.appendChild(row);
      });
    }

    if(state.view==="resources"){
      const weeksWithJobs=[...new Set(state.jobs.map(j=>j.week))].sort((a,b)=>a-b);
      if(weeksWithJobs.length===0)main.appendChild(el("div",{className:"empty"},"No jobs scheduled yet."));
      weeksWithJobs.forEach(week=>{
        const wjobs=state.jobs.filter(j=>j.week===week);
        const sun=weToSun(week),sat=weToMon(week);
        const allShifts=wjobs.flatMap(j=>(j.shifts||[]).map(s=>({...s,jobName:j.name,jobColor:j.color}))).sort((a,b)=>a.date.localeCompare(b.date));
        const wc=el("div",{className:"card"});
        const wh=el("div",{className:"card-hdr"});
        const wi=el("div",{style:{display:"flex",alignItems:"baseline",gap:10}});
        wi.appendChild(el("span",{style:{fontWeight:800,fontSize:16,color:"var(--mid)"}},weLabel(week)));
        wi.appendChild(el("span",{style:{fontSize:12,color:"var(--mut)"}},`${fmt(sun)} – ${fmt(sat)}`));
        wh.appendChild(wi);wh.appendChild(btn("Export PDF","btn-g btn-sm",()=>exportWeekPDF(week)));
        wc.appendChild(wh);
        const wb=el("div",{style:{padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}});
        allShifts.forEach(shift=>{
          const sc=el("div",{style:{background:"var(--bg3)",border:`1px solid ${shift.jobColor}33`,borderRadius:"var(--radius)",overflow:"hidden",border:"1px solid var(--bdr)"}});
          const sh=el("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:shift.jobColor+"14",borderBottom:"1px solid var(--bdr)",flexWrap:"wrap"}});
          sh.appendChild(el("div",{style:{width:8,height:8,borderRadius:"50%",background:shift.jobColor,flexShrink:0}}));
          sh.appendChild(el("span",{style:{fontWeight:700,fontSize:13,color:"var(--txt)"}},shift.jobName));
          sh.appendChild(el("span",{style:{fontSize:12,color:"var(--mut)"}},shift.dayLabel+" "+fmtFull(new Date(shift.date+"T12:00:00"))));
          sh.appendChild(badge(`${shift.startTime}–${shift.endTime}`,shift.jobColor));
          sc.appendChild(sh);
          const pg=el("div",{className:"pax-grid"});
          if(!shift.personnel||shift.personnel.length===0)pg.appendChild(el("div",{style:{color:"var(--mut)",fontSize:12,fontStyle:"italic",padding:4}},"No personnel assigned"));
          (shift.personnel||[]).forEach(p=>{
            const pc=el("div",{className:"pax-card"});
            pc.appendChild(el("div",{style:{fontSize:10,fontWeight:700,color:shift.jobColor,textTransform:"uppercase",letterSpacing:.5}},p.role));
            pc.appendChild(el("div",{style:{fontSize:13,color:p.name?"var(--txt)":"var(--mut)",fontWeight:p.name?600:400}},p.name||"— TBA —"));
            const pi=el("div",{style:{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginTop:3}});
            pi.appendChild(el("span",{style:{fontSize:11,color:"var(--mut)"}},p.company));
            pi.appendChild(el("span",{style:{background:p.riw?"var(--green-bg)":"var(--bg4)",color:p.riw?"var(--green)":"var(--mut)",border:`1px solid ${p.riw?"#a8d8b0":"var(--bdr)"}`,borderRadius:3,padding:"1px 5px",fontSize:10,fontWeight:700}},p.riw?"RIW":"—"));
            if(p.phone)pi.appendChild(el("span",{style:{fontSize:10,color:"var(--mut)"}},p.phone));
            if(p.shiftStart)pi.appendChild(el("span",{style:{fontSize:10,color:"var(--mut)"}},p.shiftStart+"–"+p.shiftEnd));
            pc.appendChild(pi);pg.appendChild(pc);
          });
          sc.appendChild(pg);wb.appendChild(sc);
        });
        wc.appendChild(wb);main.appendChild(wc);
      });

      // Always refresh from Supabase
      loadTimesheetsFromSupabase().then(()=>{
        main.innerHTML="";buildTimesheetsView(main);
      });
    }
    if(state.view==="dockets"){
      if(state.dockets&&state.dockets.length>0){
        buildDocketsView(main);
      } else {
        main.appendChild(el("div",{style:{textAlign:"center",padding:"40px",color:"var(--mut)",fontSize:13}},"Loading dockets..."));
      }
      // Always refresh from Supabase
      loadDocketsFromSupabase().then(()=>{
        main.innerHTML="";buildDocketsView(main);
      });
    }
  }
  app.appendChild(main);
}

// ── Sync dot + status ────────────────────────────────────────────────
let pendingSync=[];  // queue of {type,id} to retry

function updateSyncDot(){
  const dot=document.getElementById("sync-dot");
  if(!dot)return;
  if(state.syncStatus==="ok"&&SB_ONLINE){
    dot.className="sync-dot";
    dot.title="Saved to cloud — "+new Date().toLocaleTimeString("en-AU");
    dot.style.background="var(--green)";
  } else if(state.syncStatus==="error"||!SB_ONLINE){
    dot.className="sync-dot error";
    dot.title="Cloud save failed — data saved locally. Tap to retry.";
    dot.style.background="var(--danger)";
    dot.style.cursor="pointer";
    dot.onclick=()=>retryPendingSync();
  } else {
    dot.className="sync-dot";
    dot.style.background="var(--amber)";
    dot.title="Syncing...";
  }
}

async function retryPendingSync(){
  if(pendingSync.length===0){
    // Re-push all jobs and staff as a full sync
    toast("Retrying cloud sync...",2000);
    let ok=true;
    for(const job of state.jobs){
      const r=await pushJobToSupabase(job);
      if(!r)ok=false;
    }
    for(const s of state.staff){
      await pushStaffToSupabase(s);
    }
    updateSyncDot();
    if(ok)toast("Cloud sync complete ☁",2000);
    else toast("Still failing — check connection",3000);
  }
}

// Expose retry on sync dot click
window.addEventListener("online",()=>{
  SB_ONLINE=true;
  retryPendingSync();
});
window.addEventListener("offline",()=>{
  SB_ONLINE=false;
  state.syncStatus="error";
  updateSyncDot();
});

const ADMIN_EMAILS=["drew@tavergroup.com","maddie@tavergroup.com","kevin.calitz@goanna.group"];
const SESSION_KEY="taver_admin_v3";
let authSession=null;

async function sbAuthPost(path,body){
  const r=await fetch(`${SB_URL}/auth/v1/${path}`,{
    method:"POST",
    headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  return r.json();
}

async function getAdminSession(){
  const stored=localStorage.getItem(SESSION_KEY);
  if(!stored)return null;
  try{
    const s=JSON.parse(stored);
    if(s.expires_at&&Date.now()/1000>s.expires_at-60){
      const ref=await sbAuthPost("token?grant_type=refresh_token",{refresh_token:s.refresh_token});
      if(ref.access_token){
        const ns={...ref,expires_at:Math.floor(Date.now()/1000)+(ref.expires_in||3600)};
        localStorage.setItem(SESSION_KEY,JSON.stringify(ns));return ns;
      }
      localStorage.removeItem(SESSION_KEY);return null;
    }
    return s;
  }catch{localStorage.removeItem(SESSION_KEY);return null;}
}

  app.appendChild(screen);
  const emailEl=document.getElementById("pw-email");
  const passEl=document.getElementById("pw-pass");
  const btnEl=document.getElementById("pw-btn");
  const errEl=document.getElementById("pw-error");

  async function signIn(){
    const email=emailEl.value.trim().toLowerCase();
    const password=passEl.value;
    if(!email||!email.includes("@")){errEl.style.color="#c0392b";errEl.textContent="Please enter your email";emailEl.focus();return;}
    if(!password){errEl.style.color="#c0392b";errEl.textContent="Please enter your password";passEl.focus();return;}
    if(!ADMIN_EMAILS.includes(email)){errEl.style.color="#c0392b";errEl.textContent="This email is not authorised for admin access";return;}
    btnEl.disabled=true;btnEl.textContent="Signing in...";errEl.textContent="";
    try{
      const res=await sbAuthPost("token?grant_type=password",{email,password});
      if(res.error){
        errEl.style.color="#c0392b";
        errEl.textContent=res.error.message==="Invalid login credentials"?"Incorrect email or password — try again":res.error.message||"Sign in failed";
        btnEl.disabled=false;btnEl.textContent="Sign In";
        passEl.value="";passEl.focus();
      } else {
        authSession={...res,expires_at:Math.floor(Date.now()/1000)+(res.expires_in||3600)};
        localStorage.setItem(SESSION_KEY,JSON.stringify(authSession));
        bootApp();
      }
    }catch(e){
      errEl.style.color="#c0392b";errEl.textContent="Connection error — try again";
      btnEl.disabled=false;btnEl.textContent="Sign In";
    }
  }

  btnEl.onclick=signIn;
  passEl.onkeydown=e=>{if(e.key==="Enter")signIn();};
  emailEl.onkeydown=e=>{if(e.key==="Enter")passEl.focus();};
  emailEl.focus();
}

function signOutAdmin(){
  if(confirm("Sign out of SiteRunner Live?")){
    if(authSession?.access_token){
      fetch(`${SB_URL}/auth/v1/logout`,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+authSession.access_token}}).catch(()=>{});
    }
    localStorage.removeItem(SESSION_KEY);
    authSession=null;
    showPasswordScreen("Signed out successfully");
  }
}

function bootApp(){
  showLoadingScreen();
  // Always load from Supabase first — localStorage is fallback only
  state.syncStatus = "syncing";
  loadFromSupabase().then(ok=>{
    if(ok){
      syncStaffFromJobs();saveData();
      state.syncStatus="ok";render();updateSyncDot();
      toast("Synced ☁",1500);
      loadDocketsFromSupabase().then(()=>render());
      loadTimesheetsFromSupabase().then(()=>render());
      loadConfirmationsFromSupabase().then(()=>render()).catch(()=>{});
    } else {
      // Supabase failed — fall back to localStorage
      state.syncStatus="error";updateSyncDot();
      render();
      toast("Using local data — check connection",3500);
    }
  });
}

// ── Boot ──────────────────────────────────────────────────────────────
loadData();
syncStaffFromJobs();

(function(){
  const now=new Date();
  state.visibleStart=47;
  for(let w=47;w<=TOTAL_WEEKS;w++){if(weToSat(w)>=now){state.visibleStart=w;break;}}
})();

async function initAuth(){
  if(!authSession) authSession=await getAdminSession();
  if(authSession){
    // Verify email is still admin
    const email=(authSession.user?.email||authSession.email||"").toLowerCase();
    if(!ADMIN_EMAILS.includes(email)){
      localStorage.removeItem(SESSION_KEY);authSession=null;
      showPasswordScreen();return;
    }
    bootApp();
  } else {
    showPasswordScreen();
  }
}

initAuth();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
